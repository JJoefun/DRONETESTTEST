<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>遙控無人機操作證 · 學科練習</title>
<style>
  :root{
    --bg:#e7ecf0; --panel:#10283b; --panel-2:#173650; --card:#ffffff;
    --ink:#16242f; --muted:#5c6d7a; --faint:#8494a0; --line:#d6dee4;
    --accent:#1f6fb2; --accent-ink:#0f4a7d;
    --good:#2f7d54; --warn:#b8770f; --bad:#b23a48; --easy:#357a9e;
    --radius:14px; --shadow:0 1px 2px rgba(16,40,59,.06),0 8px 24px rgba(16,40,59,.08);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Roboto Mono",monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,"PingFang TC","Microsoft JhengHei",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.6;
    -webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
  button{font-family:inherit}

  header{background:linear-gradient(180deg,var(--panel),var(--panel-2));color:#eaf1f6;
    padding:18px 20px 0;box-shadow:0 2px 14px rgba(16,40,59,.18);position:sticky;top:0;z-index:20}
  .wrap{max-width:720px;margin:0 auto}
  .brand{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .brand h1{font-size:1.02rem;font-weight:700;letter-spacing:.3px;margin:0}
  .brand .sub{font-size:.72rem;color:#9fb6c6;font-family:var(--mono);letter-spacing:.5px}

  .hud{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;margin-top:14px;
    background:rgba(255,255,255,.09);border-radius:10px;overflow:hidden;font-family:var(--mono)}
  .hud div{padding:9px 8px 8px;text-align:center;background:rgba(6,20,32,.28)}
  .hud .k{font-size:.58rem;letter-spacing:1.5px;color:#8fa9bb;text-transform:uppercase}
  .hud .v{font-size:1.18rem;font-weight:600;color:#f2f8fc;margin-top:1px;font-variant-numeric:tabular-nums}
  .hud .v small{font-size:.62rem;color:#8fa9bb;font-weight:400}

  .tabs{display:flex;gap:2px;margin-top:14px}
  .tabs button{flex:1;background:transparent;border:0;color:#9fb6c6;padding:11px 4px;
    font-size:.85rem;font-weight:600;cursor:pointer;border-bottom:2.5px solid transparent;letter-spacing:.5px}
  .tabs button[aria-selected="true"]{color:#fff;border-bottom-color:var(--accent)}

  main{max-width:720px;margin:0 auto;padding:18px 16px 40px}

  /* 分類切換 segmented control */
  .seg{display:flex;background:#dbe3ea;border-radius:11px;padding:3px;margin-bottom:14px;gap:3px}
  .seg button{flex:1;border:0;background:transparent;color:var(--muted);font-weight:700;
    font-size:.9rem;padding:9px 6px;border-radius:8px;cursor:pointer;transition:.12s;letter-spacing:.5px}
  .seg button[aria-pressed="true"]{background:var(--card);color:var(--accent-ink);
    box-shadow:0 1px 3px rgba(16,40,59,.12)}
  .seg button .c{font-family:var(--mono);font-size:.7rem;opacity:.65;margin-left:6px;font-weight:500}

  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--muted);padding:7px 13px;
    border-radius:999px;font-size:.8rem;cursor:pointer;font-weight:600;transition:.12s}
  .chip[aria-pressed="true"]{background:var(--accent-ink);border-color:var(--accent-ink);color:#fff}
  .chip .n{font-family:var(--mono);opacity:.7;margin-left:5px;font-size:.72rem}
  .chip[aria-pressed="true"] .n{opacity:.85}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:22px 20px}
  .qmeta{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
  .qtag{font-family:var(--mono);font-size:.7rem;letter-spacing:.3px;color:var(--faint);
    background:#f1f5f8;padding:4px 9px;border-radius:6px}
  .speak{border:1px solid var(--line);background:#fff;color:var(--muted);cursor:pointer;
    width:34px;height:34px;border-radius:9px;font-size:1rem;line-height:1;display:grid;place-items:center;flex:none}
  .speak:hover{border-color:var(--accent);color:var(--accent)}
  .qtext{font-size:1.14rem;font-weight:650;line-height:1.55;letter-spacing:.2px;margin-bottom:18px}

  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;gap:12px;align-items:flex-start;text-align:left;width:100%;background:#fbfcfd;
    border:1.5px solid var(--line);border-radius:11px;padding:13px 14px;cursor:pointer;
    font-size:.98rem;color:var(--ink);transition:.12s}
  .opt:hover:not(:disabled){border-color:var(--accent);background:#f5f9fc}
  .opt:disabled{cursor:default}
  .opt .ltr{font-family:var(--mono);font-weight:700;font-size:.82rem;flex:none;width:24px;height:24px;
    border-radius:50%;display:grid;place-items:center;background:#e8eef3;color:var(--muted);margin-top:1px}
  .opt.correct{border-color:var(--good);background:#eef7f1}
  .opt.correct .ltr{background:var(--good);color:#fff}
  .opt.wrong{border-color:var(--bad);background:#fbeef0}
  .opt.wrong .ltr{background:var(--bad);color:#fff}
  .opt .mk{margin-left:auto;font-weight:700;font-size:.8rem;align-self:center}
  .opt.correct .mk{color:var(--good)} .opt.wrong .mk{color:var(--bad)}

  .exp{margin-top:16px;border-left:3px solid var(--accent);background:#f4f8fb;border-radius:0 10px 10px 0;
    padding:12px 15px;font-size:.92rem;color:#2b3d49;animation:fade .18s ease}
  .exp b{color:var(--accent-ink)}

  /* 「不確定/用猜的」標記鈕 */
  .guess{display:block;width:100%;margin:0 0 11px;border:1.5px dashed var(--line);background:#fff;
    color:var(--faint);padding:8px 10px;border-radius:10px;font-size:.82rem;font-weight:600;cursor:pointer;transition:.12s}
  .guess:hover{border-color:var(--warn);color:var(--warn)}
  .guess[aria-pressed="true"]{border-style:solid;border-color:var(--warn);background:#fdf6e9;color:#8a5a08}

  /* 作答後的累積紀錄 */
  .rec{margin-top:10px;background:#fdf6e9;border:1px solid #f0dfc0;color:#8a5a08;
    border-radius:9px;padding:9px 13px;font-size:.82rem;font-family:var(--mono)}

  /* 錯題本 */
  .why{display:block;font-family:var(--mono);font-size:.7rem;color:var(--warn);font-weight:600;margin-top:3px}
  .weakbar{display:flex;align-items:center;gap:10px;background:#fdf6e9;border:1px solid #f0dfc0;
    color:#8a5a08;border-radius:11px;padding:9px 14px;margin-bottom:12px;font-size:.82rem;font-weight:700}
  .weakbar button{margin-left:auto;border:1px solid #e2cfa8;background:#fff;color:#8a5a08;
    padding:4px 12px;border-radius:7px;font-size:.75rem;font-weight:700;cursor:pointer}
  #weak-badge{font-family:var(--mono);font-size:.7rem;opacity:.8}

  /* 進度匯出/匯入 */
  .pbtn{background:none;border:1px solid var(--line);color:var(--faint);border-radius:7px;
    padding:3px 10px;font-size:.72rem;cursor:pointer;margin:0 3px}
  .pbtn:hover{color:var(--accent);border-color:var(--accent)}
  .pmsg{font-family:var(--mono);font-size:.72rem}
  .pmsg.ok{color:var(--good)} .pmsg.err{color:var(--bad)}
  #port-panel{max-width:480px;margin:12px auto 0;text-align:left;background:var(--card);
    border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
  #port-panel p{font-size:.78rem;color:var(--muted);margin:.2em 0 .6em}
  #port-panel textarea{display:block;width:100%;height:96px;padding:9px 11px;border:1px solid var(--line);
    border-radius:9px;font-size:.72rem;font-family:var(--mono);color:var(--ink);resize:vertical}
  #port-panel .row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  .grades{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:18px}
  .grade{border:0;border-radius:11px;padding:12px 4px 10px;cursor:pointer;color:#fff;font-weight:700;
    font-size:.92rem;line-height:1.1;transition:.12s}
  .grade small{display:block;font-family:var(--mono);font-weight:500;font-size:.62rem;opacity:.85;
    margin-top:3px;letter-spacing:.3px}
  .grade:hover{filter:brightness(1.07)}
  .g-again{background:var(--bad)} .g-hard{background:var(--warn)}
  .g-good{background:var(--good)} .g-easy{background:var(--easy)}
  .hint{text-align:center;color:var(--faint);font-size:.72rem;margin-top:11px;font-family:var(--mono)}

  .state{text-align:center;padding:46px 20px;color:var(--muted)}
  .state .big{font-size:2.6rem;margin-bottom:6px}
  .state h2{color:var(--ink);font-size:1.15rem;margin:.2em 0}
  .btn{display:inline-block;margin-top:16px;background:var(--accent-ink);color:#fff;border:0;
    padding:11px 20px;border-radius:11px;font-weight:600;cursor:pointer;font-size:.9rem}
  .btn.ghost{background:#fff;color:var(--muted);border:1px solid var(--line)}

  .search{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:11px;font-size:.92rem;
    margin-bottom:14px;background:#fff;color:var(--ink)}
  .search:focus{outline:2px solid var(--accent);border-color:var(--accent)}
  .qrow{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
  .qrow summary{padding:14px 16px;cursor:pointer;font-weight:600;font-size:.95rem;list-style:none;
    display:flex;gap:10px;align-items:flex-start}
  .qrow summary::-webkit-details-marker{display:none}
  .qrow summary .id{font-family:var(--mono);font-size:.7rem;color:var(--faint);background:#f1f5f8;
    padding:3px 7px;border-radius:5px;flex:none;margin-top:2px}
  .qbody{padding:0 16px 15px;font-size:.92rem}
  .qbody .o{padding:5px 0;color:var(--muted);display:flex;gap:9px}
  .qbody .o .ltr{font-family:var(--mono);font-weight:700;color:var(--faint)}
  .qbody .o.correct{color:var(--good);font-weight:600}
  .qbody .o.correct .ltr{color:var(--good)}
  .qbody .exp{margin-top:12px}
  .stat-note{color:var(--faint);font-size:.75rem;margin:2px 2px 14px;font-family:var(--mono)}

  footer{max-width:720px;margin:0 auto;padding:8px 16px 30px;color:var(--faint);font-size:.72rem;
    text-align:center;line-height:1.7}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="brand">
      <h1>遙控無人機 · 學科練習</h1>
      <span class="sub">SRS · SM-2</span>
    </div>
    <div class="hud" id="hud">
      <div><div class="k">待複習</div><div class="v" id="h-due">0</div></div>
      <div><div class="k">新題</div><div class="v" id="h-new">0</div></div>
      <div><div class="k">已學</div><div class="v" id="h-seen">0</div></div>
      <div><div class="k">本輪正確</div><div class="v" id="h-acc">–</div></div>
    </div>
    <div class="tabs" role="tablist">
      <button role="tab" aria-selected="true" id="tab-study" onclick="switchTab('study')">複習</button>
      <button role="tab" aria-selected="false" id="tab-weak" onclick="switchTab('weak')">錯題本 <span id="weak-badge"></span></button>
      <button role="tab" aria-selected="false" id="tab-browse" onclick="switchTab('browse')">題庫瀏覽</button>
    </div>
  </div>
</header>

<main>
  <div id="view-study">
    <div class="seg" id="study-cat"></div>
    <div class="chips" id="scope-chips"></div>
    <div id="study-area"></div>
  </div>

  <div id="view-weak" style="display:none">
    <div class="seg" id="weak-cat"></div>
    <div id="weak-actions"></div>
    <div class="stat-note" id="weak-count"></div>
    <div id="weak-list"></div>
  </div>

  <div id="view-browse" style="display:none">
    <div class="seg" id="browse-cat"></div>
    <div class="chips" id="browse-chips"></div>
    <input class="search" id="search" placeholder="搜尋題目關鍵字…（例如：罰鍰、攻角、平流霧）" oninput="renderBrowse()">
    <div class="stat-note" id="browse-count"></div>
    <div id="browse-list"></div>
  </div>
</main>

<footer>
  普通題庫 388 題、專業題庫 588 題，答案均逐題對照官方答案欄。<br>
  進度自動存於此瀏覽器（localStorage）。更新題庫時覆蓋同一個 index.html，進度即保留。<br>
  <button class="pbtn" onclick="exportProgress()">📤 匯出進度</button>
  <button class="pbtn" onclick="toggleImportPanel()">📥 匯入進度</button>
  <span class="pmsg" id="port-msg"></span>
  <div id="port-panel" style="display:none">
    <p>把另一台裝置「匯出」的整段文字貼進來（LINE 傳給自己即可）。匯入採<b>逐題取新合併</b>，不會清掉本機既有紀錄。</p>
    <textarea id="port-text" placeholder="DRONESRS1:eyJ…"></textarea>
    <div class="row">
      <button class="btn" onclick="importProgress()">合併匯入</button>
      <button class="btn ghost" onclick="toggleImportPanel()">取消</button>
    </div>
  </div>
</footer>

<script>
const Q = [{"cat": "普通", "ch": 1, "n": 1, "q": "遙控無人機如為不法份子作為犯罪工具或因不當操作而致失控墜落者，可能導致何種後果？", "opts": ["造成他人生命財產之損失", "危害公共利益", "影響飛航安全", "以上皆是"], "ans": "D", "exp": "失控墜落對地面人員財產、公共利益與飛航安全都可能造成危害，故選以上皆是。"}, {"cat": "普通", "ch": 1, "n": 2, "q": "為保障操作安全，操作人於購買遙控無人機時應留意產品何項資訊？", "opts": ["使用限制", "操作性能", "保固範圍", "以上皆是"], "ans": "D", "exp": "使用限制、性能、保固都與安全操作相關，購買前均應留意。"}, {"cat": "普通", "ch": 1, "n": 3, "q": "遙控無人機之註冊、教育宣導及操作範圍警示規定，係為達到哪個目的？", "opts": ["刁難操作人員", "打擊市場", "安全使用", "以上皆是"], "ans": "C", "exp": "各項管理規定目的在於「安全使用」，而非刁難或打擊市場。"}, {"cat": "普通", "ch": 1, "n": 4, "q": "操作證考取目的係為確保操作人於哪個階段熟悉航空知識與規範，並具操作熟練度及緊急處置能力？", "opts": ["操作前及操作時", "操作前及操作後", "操作前", "操作後"], "ans": "A", "exp": "考照要確保操作人在「操作前」有知識、「操作時」有熟練度與緊急應變能力。"}, {"cat": "普通", "ch": 1, "n": 5, "q": "外國人持有外國政府核發之註冊、操作證等文件者，須向哪個單位申請認可後始得活動？", "opts": ["外交部", "駐外單位", "民航局", "科技部"], "ans": "C", "exp": "遙控無人機主管機關為民航局，外國證照認可也向民航局申請。"}, {"cat": "普通", "ch": 1, "n": 6, "q": "操作人僅透過即時傳輸圖像功能，是否足以監控鏡頭外之周遭狀況？", "opts": ["否", "是", "視清晰度而定", "視天氣而定"], "ans": "A", "exp": "圖傳只能看到鏡頭視野內，鏡頭外的人車障礙看不到，故不足以掌握周遭，須目視。"}, {"cat": "普通", "ch": 1, "n": 7, "q": "操作人不得利用遙控無人機從事哪種行為？", "opts": ["合法行為", "非法行為", "適法行為", "法定行為"], "ans": "B", "exp": "不得作為犯罪或其他非法行為之工具。"}, {"cat": "普通", "ch": 1, "n": 8, "q": "操作人不得無故利用遙控無人機對他人進行何種行為？", "opts": ["攝錄非公開活動", "竊聽私下談話", "窺視身體隱私部位", "以上皆是"], "ans": "D", "exp": "涉及隱私之攝錄、竊聽、窺視皆不得為之，屬妨害隱私。"}, {"cat": "普通", "ch": 1, "n": 9, "q": "操作人未經同意，不得以遙控無人機對他人進行何種行為？", "opts": ["錄音", "照相、錄影", "電磁紀錄竊錄", "以上皆是"], "ans": "D", "exp": "未經同意之錄音、錄影、竊錄皆侵害他人權利，均不得為之。"}, {"cat": "普通", "ch": 1, "n": 10, "q": "操作人不得無故利用遙控無人機於哪個場所進行飛航活動？", "opts": ["私人庭院", "學校教室", "辦公室場所", "以上皆是"], "ans": "D", "exp": "這些皆屬他人私密或非公開空間，無故飛入侵害隱私。"}, {"cat": "普通", "ch": 1, "n": 11, "q": "遙控無人機於空中飛航時易伴隨較高之何種風險？", "opts": ["文化風險", "健康風險", "社會風險", "貿易風險"], "ans": "C", "exp": "墜落傷人、侵犯隱私等屬對社會公眾之風險，故為社會風險。"}, {"cat": "普通", "ch": 1, "n": 12, "q": "對違規操作人及所有人之處罰，係欲達到哪個目的？", "opts": ["維持社會秩序", "增進公共利益", "維護公共安全", "以上皆是"], "ans": "D", "exp": "處罰目的兼具維持秩序、增進公益與維護公共安全。"}, {"cat": "普通", "ch": 1, "n": 13, "q": "對違規者所處罰鍰額度，係衡量何種因素而定？", "opts": ["公眾利益及安全財產危害程度", "政府稅收及經濟指數", "國力強弱及世界局勢", "教育程度及人民素質"], "ans": "A", "exp": "罰鍰輕重依對公眾利益、安全、財產的危害程度而定。"}, {"cat": "普通", "ch": 1, "n": 14, "q": "遵守規範下從事休閒娛樂性質之活動，其活動風險以何種管理方式為主？", "opts": ["財政管理", "自我管理", "衛生管理", "健康管理"], "ans": "B", "exp": "休閒娛樂用途以操作人「自我管理」為主。"}, {"cat": "普通", "ch": 1, "n": 15, "q": "為法人從事業務之操作人，依法須強制加入何種保險？", "opts": ["積水險", "責任險", "地震險", "颱風險"], "ans": "B", "exp": "政府機關、學校或法人執行業務飛行，須依法投保「責任保險」。"}, {"cat": "普通", "ch": 1, "n": 16, "q": "遙控無人機定義為何？", "opts": ["自遙控設備以信號鏈路飛航控制之無人航空器", "以自動駕駛操作之無人航空器", "其他經民航局公告之無人航空器", "以上皆是"], "ans": "D", "exp": "定義涵蓋信號鏈路控制、自動駕駛及民航局公告之各類無人航空器。"}, {"cat": "普通", "ch": 1, "n": 17, "q": "操作人欲代地方農會執行農藥噴灑作業，下列敘述何者正確？", "opts": ["須通過學、術科測驗", "不須通過術科測驗", "執行前不需申請核准", "以上皆是"], "ans": "A", "exp": "農噴屬專業用途，須考取專業操作證（學科+術科），且飛航活動須申請核准。"}, {"cat": "普通", "ch": 1, "n": 18, "q": "於何處進行飛航活動適用民用航空法之「遙控無人機」相關規定？", "opts": ["建築物內密閉空間", "建築物外開放空間", "任何空間", "以上皆非"], "ans": "B", "exp": "民航法規範的是室外開放空間的飛航；室內密閉空間不屬其適用範圍。"}, {"cat": "普通", "ch": 1, "n": 19, "q": "活動期間所有人或操作人應負之責任為何？", "opts": ["使用安全之責", "風險管理之責", "法規遵循之責", "以上皆是"], "ans": "D", "exp": "所有人與操作人須負安全、風險管理與守法之責。"}, {"cat": "普通", "ch": 1, "n": 20, "q": "有關飛航活動，下列敘述何者正確？", "opts": ["未經許可不得飛航於禁航區", "可任意飛航於限航區", "航空站四周無相關規定", "以上皆是"], "ans": "A", "exp": "禁航區未經許可不得飛入；限航區受限制、航空站四周有距離規定，故僅A正確。"}, {"cat": "普通", "ch": 1, "n": 21, "q": "航空站或飛行場四周之一定距離範圍由哪個機關公告？", "opts": ["民航局", "衛福部", "內政部", "文化部"], "ans": "A", "exp": "航空站四周距離範圍由主管機關民航局公告。"}, {"cat": "普通", "ch": 1, "n": 22, "q": "直轄市、縣（市）政府得就其區域內進行哪些項目之公告？", "opts": ["活動區域", "活動時間", "其他管理事項", "以上皆是"], "ans": "D", "exp": "地方政府可公告活動區域、時間及其他管理事項。"}, {"cat": "普通", "ch": 1, "n": 23, "q": "中央主管機關認有禁限飛需求者，得提請所在地哪個機關公告？", "opts": ["鄉鎮區公所", "直轄市、縣（市）政府", "地方派出所", "地方農會"], "ans": "B", "exp": "由中央提請所在地之直轄市、縣（市）政府公告禁限航。"}, {"cat": "普通", "ch": 1, "n": 24, "q": "政府機關、學校或法人於禁限航區或航空站四周執行業務飛航，應申請何者會商目的事業主管機關同意？", "opts": ["鄉鎮區公所", "衛福部", "民航局", "科技部"], "ans": "C", "exp": "屬中央主管機關公告之禁限區與航空站範圍，向民航局申請並會商目的事業主管機關。"}, {"cat": "普通", "ch": 1, "n": 25, "q": "於地方政府公告之活動區域、時間等事項外執行業務飛航，應申請何者會商相關中央主管機關同意？", "opts": ["直轄市、縣（市）政府", "衛福部", "農委會", "交通部"], "ans": "A", "exp": "屬地方政府公告事項，向該直轄市、縣（市）政府申請並會商中央。"}, {"cat": "普通", "ch": 1, "n": 26, "q": "未經同意飛入禁航區、限航區，得由何者採取措施制止或排除？", "opts": ["交通警察大隊", "禁航區、限航區之管理人", "鄉鎮區公所", "地方派出所"], "ans": "B", "exp": "由該禁限航區之管理人採取適當措施制止或排除。"}, {"cat": "普通", "ch": 1, "n": 27, "q": "未經同意飛入航空站或飛行場四周範圍，經營人或管理人得會同何者取締？", "opts": ["當地里長", "地方派出所", "航空警察局", "交通警察大隊"], "ans": "C", "exp": "航空站範圍由經營／管理人會同「航空警察局」取締。"}, {"cat": "普通", "ch": 1, "n": 28, "q": "未經同意飛入地方政府公告之活動區域、時間等事項外者，得由何者取締？", "opts": ["直轄市、縣（市）政府", "鄉鎮區公所", "地方派出所", "衛福部"], "ans": "A", "exp": "屬地方公告事項，由該直轄市、縣（市）政府取締。"}, {"cat": "普通", "ch": 1, "n": 29, "q": "休閒娛樂用途之飛航實際高度不得逾距地面或水面多少高度？", "opts": ["800呎", "400呎", "200呎", "100呎"], "ans": "B", "exp": "法定上限為距地／水面 400 呎（約 120 公尺）。"}, {"cat": "普通", "ch": 1, "n": 30, "q": "非經民航局核准不得執行下列何者行為？", "opts": ["以信號鏈路飛航控制", "以自動駕駛操作", "投擲或噴灑任何物件", "其他經民航局同意之操作"], "ans": "C", "exp": "投擲、噴灑物件屬須經核准的特殊操作（如農噴）。"}, {"cat": "普通", "ch": 1, "n": 31, "q": "從事飛航活動不得裝載哪種物品？", "opts": ["光學酬載", "飛航所需燃油或電池", "民用航空法公告之危險物品", "調整重心之配重塊"], "ans": "C", "exp": "不得裝載法定公告之危險物品。"}, {"cat": "普通", "ch": 1, "n": 32, "q": "哪個機關負責訂定飛航活動應遵守之規範？", "opts": ["衛福部", "交通部", "內政部", "文化部"], "ans": "B", "exp": "民用航空之主管機關為交通部（民航局為其所屬）。"}, {"cat": "普通", "ch": 1, "n": 33, "q": "休閒娛樂用途不得於下列哪個區域飛航？", "opts": ["人群聚集或室外集會遊行上空", "經同意開放之公園綠地", "經同意開放之人煙稀少區", "經同意開放之河灘地"], "ans": "A", "exp": "禁止飛越人群聚集或室外集會遊行上空，避免墜落傷人。"}, {"cat": "普通", "ch": 1, "n": 34, "q": "休閒娛樂用途不得於下列哪個時間飛航？", "opts": ["日落後至日出前", "日出後", "正中午", "無特別規定"], "ans": "A", "exp": "夜間（日落後至日出前）能見度差，禁止休閒娛樂飛行。"}, {"cat": "普通", "ch": 1, "n": 35, "q": "從事休閒娛樂飛航時，最多得同時控制幾架？", "opts": ["1架", "2架", "5架", "10架以上"], "ans": "A", "exp": "休閒娛樂用途一次僅能操作 1 架。"}, {"cat": "普通", "ch": 1, "n": 36, "q": "飛航活動期間，操作人應留意下列何者？", "opts": ["販售包裝", "外觀造型", "飛航及其周遭狀況", "以上皆非"], "ans": "C", "exp": "操作人須全程留意無人機飛航與周遭環境狀況。"}, {"cat": "普通", "ch": 1, "n": 37, "q": "飛航活動時，應防止其與何者之接近或碰撞？", "opts": ["其他航空器", "建築物", "人群", "以上皆是"], "ans": "D", "exp": "須防止與其他航空器、建築物及人群接近或碰撞。"}, {"cat": "普通", "ch": 1, "n": 38, "q": "政府機關、學校或法人欲執行法規所訂之操作限制者，應向下列何者申請核准？", "opts": ["直轄市、縣（市）政府", "民航局", "警察機關", "衛福部"], "ans": "B", "exp": "解除操作限制（如夜航、超高、投擲等）之核准由民航局為之。"}, {"cat": "普通", "ch": 1, "n": 39, "q": "經民航局核准得於「人群聚集或室外集會上空」飛航者，其活動場地仍應取得何者同意？", "opts": ["直轄市、縣（市）政府及相關中央主管機關", "直轄市、縣（市）政府", "相關中央主管機關", "當地派出所"], "ans": "A", "exp": "場地部分仍須取得地方政府及相關中央主管機關同意。"}, {"cat": "普通", "ch": 1, "n": 40, "q": "發生下列哪種情形時，所有人應負賠償責任？", "opts": ["故意致他人死傷", "過失致他人死傷", "故意或過失毀損他人財物", "以上皆是"], "ans": "D", "exp": "不論故意或過失，致人死傷或毀損財物均應負賠償責任。"}, {"cat": "普通", "ch": 1, "n": 41, "q": "所有人將無人機交他人操作而墜落傷人，應由何人負連帶賠償責任？", "opts": ["所有人及旁觀人", "所有人及設計者", "所有人及操作人", "所有人及製造者"], "ans": "C", "exp": "由「所有人及操作人」負連帶賠償責任。"}, {"cat": "普通", "ch": 1, "n": 42, "q": "政府機關、學校或法人於核准之飛航前應投保責任保險，係依何法所定？", "opts": ["保險法", "民用航空法", "民法", "勞動基準法"], "ans": "B", "exp": "投保責任保險之規定依「民用航空法」。"}, {"cat": "普通", "ch": 1, "n": 43, "q": "違反「禁限航區及航空站四周距離範圍」規定者，除廢照沒入外，另處新臺幣多少罰鍰？", "opts": ["3萬～18萬", "5萬～28萬", "10萬～48萬", "30萬～150萬"], "ans": "D", "exp": "此為最重之違規態樣，罰鍰 30 萬～150 萬元。"}, {"cat": "普通", "ch": 1, "n": 44, "q": "違反「不得逾400呎」規定者，除廢照沒入外，另處新臺幣多少罰鍰？", "opts": ["30萬～150萬", "1萬～10萬", "20萬～50萬", "5萬～30萬"], "ans": "A", "exp": "逾高度限制之罰鍰為 30 萬～150 萬元。"}, {"cat": "普通", "ch": 1, "n": 45, "q": "違反「未領操作證而操作」者，除禁止活動、情節重大得沒入外，另處新臺幣多少罰鍰？", "opts": ["1萬～8萬", "3萬～18萬", "6萬～30萬", "8萬～38萬"], "ans": "C", "exp": "無照操作罰鍰為 6 萬～30 萬元。"}, {"cat": "普通", "ch": 1, "n": 46, "q": "違反「未投保或未足額投保責任保險」者，另處新臺幣多少罰鍰？", "opts": ["6萬～30萬", "3萬～20萬", "1萬～8萬", "8萬～50萬"], "ans": "A", "exp": "未（足額）投保責任保險罰鍰為 6 萬～30 萬元。"}, {"cat": "普通", "ch": 1, "n": 47, "q": "違反「註冊或標明註冊號碼」規定者，另處新臺幣多少罰鍰？", "opts": ["10萬～48萬", "8萬～38萬", "5萬～28萬", "3萬～15萬"], "ans": "D", "exp": "註冊／標號違規罰鍰為 3 萬～15 萬元。"}, {"cat": "普通", "ch": 1, "n": 48, "q": "違反「地方政府公告之區域、時間及管理事項」者，另處新臺幣多少罰鍰？", "opts": ["3萬～15萬", "5萬～28萬", "8萬～38萬", "15萬～30萬"], "ans": "A", "exp": "違反地方公告事項罰鍰為 3 萬～15 萬元。"}, {"cat": "普通", "ch": 1, "n": 49, "q": "違反「飛航活動應遵守之規定」者，另處新臺幣多少罰鍰？", "opts": ["10萬～48萬", "8萬～38萬", "5萬～28萬", "3萬～15萬"], "ans": "D", "exp": "違反一般飛航活動規定罰鍰為 3 萬～15 萬元。"}, {"cat": "普通", "ch": 1, "n": 50, "q": "違反「射頻識別、檢驗、認可、維修、活動許可、登錄、通報」等規定者，另處新臺幣多少罰鍰？", "opts": ["1萬～150萬", "5萬～498萬", "8萬～798萬", "10萬～998萬"], "ans": "A", "exp": "此類技術／登錄／通報違規罰鍰為 1 萬～150 萬元。"}, {"cat": "普通", "ch": 1, "n": 51, "q": "無人機與遙控設備間為操作飛行管理目的之資料鏈接，稱之？", "opts": ["網路鏈路", "通訊及控制信號鏈路", "電信鏈路", "光纖鏈路"], "ans": "B", "exp": "此連結稱「通訊及控制信號鏈路」（C2 link）。"}, {"cat": "普通", "ch": 1, "n": 52, "q": "計算最大起飛重量(MTOW)應包含下列哪些重量？", "opts": ["機體", "燃料、電池", "負載設備、酬載", "以上皆是"], "ans": "D", "exp": "MTOW 含機體、能源（燃料／電池）及負載、酬載之總和。"}, {"cat": "普通", "ch": 1, "n": 53, "q": "飛航活動期間實際操控或指揮監督飛航活動之人員稱之？", "opts": ["目視觀察員", "遙控無人機操作人", "任務協調員", "以上皆非"], "ans": "B", "exp": "此人即「操作人」。"}, {"cat": "普通", "ch": 1, "n": 54, "q": "持有操作證並於活動期間提供操作人必要飛航資訊之人員稱之？", "opts": ["設計者", "目視觀察員", "製造者", "所有人"], "ans": "B", "exp": "此即「目視觀察員」，協助操作人掌握飛航資訊。"}, {"cat": "普通", "ch": 1, "n": 55, "q": "遙控無人機依構造可分為哪幾種？", "opts": ["無人飛機", "無人直昇機", "無人多旋翼機", "以上皆是"], "ans": "D", "exp": "依構造分為無人飛機、無人直昇機、無人多旋翼機。"}, {"cat": "普通", "ch": 1, "n": 56, "q": "無人多旋翼機具有幾個以上之垂直傳動軸？", "opts": ["2個以上", "3個以上", "4個以上", "6個以上"], "ans": "B", "exp": "多旋翼機定義為 3 個以上垂直傳動軸。"}, {"cat": "普通", "ch": 1, "n": 57, "q": "何人應負飛航安全之責，妥善維護並安全飛航？", "opts": ["所有人及操作人", "設計者", "製造者", "改裝者"], "ans": "A", "exp": "維護與安全飛航之責在於「所有人及操作人」。"}, {"cat": "普通", "ch": 1, "n": 58, "q": "若飛航涉及2位以上操作者，下列敘述何者正確？", "opts": ["應指定1人為決定權人", "不須指定決定權人", "視任務性質而定", "以上皆非"], "ans": "A", "exp": "多人操作時須指定 1 人為決定權人，才可從事飛航。"}, {"cat": "普通", "ch": 1, "n": 59, "q": "何處較適合標明註冊號碼？", "opts": ["起落架上", "螺旋槳面上", "機身未遮蔽之平整面上", "電池蓋上"], "ans": "C", "exp": "應標於機身未遮蔽、平整、易辨識處。"}, {"cat": "普通", "ch": 1, "n": 60, "q": "註冊號碼標明後，於每次飛航應符合下列何項要求？", "opts": ["確保不至脫落", "保持清潔", "能明顯辨識", "以上皆是"], "ans": "D", "exp": "須不脫落、清潔且能明顯辨識。"}, {"cat": "普通", "ch": 1, "n": 61, "q": "註冊號碼之標漆位置依法應位於何處？", "opts": ["固定結構內部", "固定結構外部", "轉動機構外部", "轉動機構內部"], "ans": "B", "exp": "應標於「固定結構外部」，不可標在會轉動的部件上。"}, {"cat": "普通", "ch": 1, "n": 62, "q": "註冊號碼顏色應符合下列何項要求？", "opts": ["融入背景", "與背景相近", "與背景明顯反襯", "無特別規定"], "ans": "C", "exp": "顏色須與背景明顯反襯，肉眼可辨。"}, {"cat": "普通", "ch": 1, "n": 63, "q": "有關註冊號碼之使用，下列何者正確？", "opts": ["不得偽造", "不得變造", "不得矇領", "以上皆是"], "ans": "D", "exp": "註冊號碼不得偽造、變造或矇領。"}, {"cat": "普通", "ch": 1, "n": 64, "q": "有關註冊號碼之使用，下列何者正確？", "opts": ["不得於任何未註冊機上使用", "可於他人未註冊機上使用", "可於自己未註冊機上使用", "視型式而定"], "ans": "A", "exp": "號碼專屬對應機體，不得用於任何未註冊之無人機。"}, {"cat": "普通", "ch": 1, "n": 65, "q": "應具射頻識別功能之「一定重量」由下列哪個機關公告？", "opts": ["衛福部", "內政部", "科技部", "民航局"], "ans": "D", "exp": "由民航局公告該一定重量門檻。"}, {"cat": "普通", "ch": 1, "n": 66, "q": "遙控無人機之設計、製造、改裝，可由何者提出型式檢驗申請？", "opts": ["設計者", "製造者", "改裝者", "以上皆可"], "ans": "D", "exp": "設計者、製造者、改裝者均可申請型式檢驗。"}, {"cat": "普通", "ch": 1, "n": 67, "q": "型式檢驗應向哪個機關申請？", "opts": ["民航局", "衛福部", "內政部", "科技部"], "ans": "A", "exp": "向民航局申請型式檢驗。"}, {"cat": "普通", "ch": 1, "n": 68, "q": "自國外進口之無人機，應由何者申請型式檢驗？", "opts": ["操作人", "所有人", "進口者", "設計者"], "ans": "C", "exp": "進口者負責向民航局申請型式檢驗。"}, {"cat": "普通", "ch": 1, "n": 69, "q": "為驗證性能所需之試飛，應向哪個機關申請？", "opts": ["衛福部", "內政部", "科技部", "民航局"], "ans": "D", "exp": "試飛活動向民航局申請。"}, {"cat": "普通", "ch": 1, "n": 70, "q": "MTOW 25公斤以上之無人機，應由何者提出實體檢驗申請？", "opts": ["操作人", "所有人", "設計者", "製造者"], "ans": "B", "exp": "由所有人提出實體檢驗申請（管理規則所定）。"}, {"cat": "普通", "ch": 1, "n": 71, "q": "MTOW 25公斤以上之實體檢驗應向哪個機關申請？", "opts": ["民航局", "衛福部", "內政部", "科技部"], "ans": "A", "exp": "向民航局申請實體檢驗。"}, {"cat": "普通", "ch": 1, "n": 72, "q": "自行製造使用之25公斤以上無人機，何人可提合併型式與實體檢驗？", "opts": ["製造者", "操作人", "所有人", "設計者"], "ans": "C", "exp": "自製自用者以「所有人」身分申請合併檢驗。"}, {"cat": "普通", "ch": 1, "n": 73, "q": "自製自用之25公斤以上無人機，向哪個機關申請合併檢驗？", "opts": ["內政部", "民航局", "科技部", "衛福部"], "ans": "B", "exp": "向民航局申請。"}, {"cat": "普通", "ch": 1, "n": 74, "q": "實體檢驗合格證記載事項變更時，下列敘述何者正確？", "opts": ["製造者15日內申請換發", "設計者10日內", "操作人7日內", "所有人於事實發生日起15日內申請換發"], "ans": "D", "exp": "由所有人於事實發生日起 15 日內申請換發。"}, {"cat": "普通", "ch": 1, "n": 75, "q": "製造者與進口者申請產品資訊登錄之時機為？", "opts": ["販售或進口前", "販售或進口時", "販售或進口後", "以上皆可"], "ans": "A", "exp": "應於「販售或進口前」完成產品資訊登錄。"}, {"cat": "普通", "ch": 1, "n": 76, "q": "製造者與進口者應向哪個機關申請產品資訊登錄？", "opts": ["內政部", "科技部", "民航局", "經濟部"], "ans": "C", "exp": "向民航局登錄。"}, {"cat": "普通", "ch": 1, "n": 77, "q": "25公斤以上無人機因缺失致不安全時，下列何者為非？", "opts": ["設計者採補正", "製造者採補正", "改裝者採補正", "無須採取任何補正措施"], "ans": "D", "exp": "有不安全情況時各相關者均須補正，故「無須補正」為錯誤。"}, {"cat": "普通", "ch": 1, "n": 78, "q": "操作政府機關、學校或法人所有之無人機，操作人應持有何種證照？", "opts": ["機師檢定證", "操作證", "維修檢定證", "鑑定合格證"], "ans": "B", "exp": "須持民航局核發之「操作證」。"}, {"cat": "普通", "ch": 1, "n": 79, "q": "有關操作證之分類，下列何者為非？", "opts": ["暫時操作證", "普通操作證", "專業操作證", "學習操作證"], "ans": "A", "exp": "操作證分普通、專業、學習三類；無「暫時操作證」。"}, {"cat": "普通", "ch": 1, "n": 80, "q": "自然人以無人機從事休閒娛樂，下列考照需求何者正確？", "opts": ["操作10公斤且有導航設備者不需考照", "操作未達2公斤者不須考照", "操作15公斤以上僅需學科", "操作未達2公斤須通過學科"], "ans": "B", "exp": "休閒娛樂用途，MTOW 未達 2 公斤者免考照。"}, {"cat": "普通", "ch": 1, "n": 81, "q": "專業操作證之術科測驗應於學科通過日起多久內完成，否則重考學科？", "opts": ["3個月內", "6個月內", "9個月內", "1年內"], "ans": "D", "exp": "術科須於學科通過日起 1 年內完成。"}, {"cat": "普通", "ch": 1, "n": 82, "q": "操作人應於何時依維修指引檢查系統以符合安全飛航條件？", "opts": ["飛航活動前執行", "飛航活動後", "飛航活動中", "任何時間"], "ans": "A", "exp": "飛行前檢查（起飛前）確認安全狀態。"}, {"cat": "普通", "ch": 1, "n": 83, "q": "飛航活動前，下列何者非主要考量因素？", "opts": ["氣象條件", "空域、飛航限制", "其他空中或地面危害", "操作者家庭狀況"], "ans": "D", "exp": "家庭狀況與飛航安全無關，非考量因素。"}, {"cat": "普通", "ch": 1, "n": 84, "q": "於載具上操作無人機，下列敘述何者錯誤？", "opts": ["可於固定之導控站操作", "可於固定之車輛操作", "可於移動中之航空器操作", "可於固定之船艦操作"], "ans": "C", "exp": "不得於「移動中」之航空器上操作。"}, {"cat": "普通", "ch": 1, "n": 85, "q": "哪些單位應檢附文件向民航局申請核准後始得飛航？", "opts": ["政府機關（構）", "學校", "法人", "以上皆是"], "ans": "D", "exp": "政府機關、學校、法人執行業務飛航均須向民航局申請核准。"}, {"cat": "普通", "ch": 1, "n": 86, "q": "於地方政府公告之禁限區內飛航，應至少於活動日前多久提出申請？", "opts": ["30日前", "20日前", "15日前", "10日前"], "ans": "C", "exp": "至少於活動日前 15 日檢附計畫書申請。"}, {"cat": "普通", "ch": 1, "n": 87, "q": "MTOW 2公斤以上且有導航設備之無人機遭實質損害或失蹤，應於得知後多久內通報民航局？", "opts": ["6小時內", "12小時內", "24小時內", "48小時內"], "ans": "C", "exp": "此類事件應於 24 小時內填報通報民航局。"}, {"cat": "普通", "ch": 1, "n": 88, "q": "發生與其他航空器或障礙物接近或碰撞事故時，應於得知後多久內通報民航局？", "opts": ["6小時內", "12小時內", "24小時內", "48小時內"], "ans": "C", "exp": "接近或碰撞事故亦應於 24 小時內通報。"}, {"cat": "普通", "ch": 1, "n": 89, "q": "發生飛安相關事件時，民航局對操作人可採取哪項措施？", "opts": ["得逕為暫停其操作或飛航", "經操作人同意後暫停", "經地方政府同意後暫停", "須待調查結束並經同意始暫停"], "ans": "A", "exp": "民航局得逕行（不待同意）暫停其操作或飛航活動。"}, {"cat": "普通", "ch": 1, "n": 90, "q": "各項申請及通報作業可透過何處以電子化方式為之？", "opts": ["地方政府資訊系統", "民航局指定之資訊系統", "財政部資訊系統", "經濟部資訊系統"], "ans": "B", "exp": "透過民航局指定之資訊系統辦理。"}, {"cat": "普通", "ch": 1, "n": 91, "q": "有關距離限制，下列何者正確？", "opts": ["距高速公路10公尺以上", "距高架鐵路20公尺以上", "距建築物及障礙物30公尺以上", "以上均正確"], "ans": "C", "exp": "與建築物及障礙物應保持 30 公尺以上距離。"}, {"cat": "普通", "ch": 2, "n": 1, "q": "遙控無人機系統包含下列哪項主要次系統？", "opts": ["遙控無人機體", "遙控設備", "通訊及控制信號鏈路", "以上皆是"], "ans": "D", "exp": "系統含飛行載具、遙控設備與通訊控制鏈路三大次系統。"}, {"cat": "普通", "ch": 2, "n": 2, "q": "系統之飛行載具包括下列哪些項目？", "opts": ["機體、負載設備及酬載", "機體、燃料或電池", "機體、燃料或電池、負載設備及酬載", "機體、燃料或電池、負載設備及酬載、遙控設備"], "ans": "C", "exp": "飛行載具＝機體＋能源（燃料/電池）＋負載設備及酬載；遙控設備不算在載具內。"}, {"cat": "普通", "ch": 2, "n": 3, "q": "地面控制站的硬體設備包括下列哪個項目？", "opts": ["訊號傳輸設備", "指令傳輸設備", "資訊接收分析設備", "以上皆是"], "ans": "D", "exp": "地面站含訊號傳輸、指令傳輸與資訊接收分析設備。"}, {"cat": "普通", "ch": 2, "n": 4, "q": "無人飛機起飛時，除跑道起飛外還可運用哪項裝置？", "opts": ["火箭助推", "彈射軌道發射", "人力拋擲", "以上皆是"], "ans": "D", "exp": "可用火箭助推、彈射軌道或人力拋擲起飛。"}, {"cat": "普通", "ch": 2, "n": 5, "q": "無人飛機降落時，除跑道降落外可運用哪項方式？", "opts": ["攔截網", "纜線勾鎖", "降落傘", "以上皆是"], "ans": "D", "exp": "可用攔截網、纜線勾鎖或降落傘降落。"}, {"cat": "普通", "ch": 2, "n": 6, "q": "整體飛行過程中佔很重要一部分的因素是？", "opts": ["人為因素", "運氣因素", "社會因素", "歷史因素"], "ans": "A", "exp": "許多操控仍靠人，人為因素至關重要。"}, {"cat": "普通", "ch": 2, "n": 7, "q": "完整之飛控系統包括下列哪個部分？", "opts": ["感測器", "機載計算機", "伺服器", "以上皆是"], "ans": "D", "exp": "飛控系統含感測器、機載計算機與伺服器（作動器）。"}, {"cat": "普通", "ch": 2, "n": 8, "q": "飛控系統可實現哪項功能？", "opts": ["姿態穩定和控制", "任務管理", "緊急控制模式", "以上皆是"], "ans": "D", "exp": "可達成姿態控制、任務管理及緊急控制。"}, {"cat": "普通", "ch": 2, "n": 9, "q": "下列哪個是飛控系統的輸入裝置，用以保持控制精度？", "opts": ["機載計算機", "感測器", "伺服器", "以上皆是"], "ans": "B", "exp": "感測器為輸入端（量測姿態、位置等）。"}, {"cat": "普通", "ch": 2, "n": 10, "q": "導航系統提供哪項資訊？", "opts": ["位置", "速度", "飛行姿態", "以上皆是"], "ans": "D", "exp": "導航系統提供位置、速度與姿態資訊。"}, {"cat": "普通", "ch": 2, "n": 11, "q": "導航系統主要分為下列哪兩種？", "opts": ["非自主(如GPS)和自主(慣性導航)", "高精度和一般精度", "高抗干擾和低抗干擾", "全自動和半自動"], "ans": "A", "exp": "分為非自主（GPS 等外部訊號）與自主（慣性導航）。"}, {"cat": "普通", "ch": 2, "n": 12, "q": "非自主(GPS)導航系統的缺點是？", "opts": ["操作困難", "易受干擾", "誤差積累增大", "以上皆是"], "ans": "B", "exp": "GPS 依賴外部訊號，易受遮蔽或干擾。"}, {"cat": "普通", "ch": 2, "n": 13, "q": "自主(慣性導航)系統的缺點是？", "opts": ["操作困難", "易受干擾", "誤差積累增大", "以上皆是"], "ans": "C", "exp": "慣性導航靠積分推算，長時間會誤差累積。"}, {"cat": "普通", "ch": 2, "n": 14, "q": "無人機將朝向下列哪個方向發展？", "opts": ["高精度", "高可靠度", "高抗干擾", "以上皆是"], "ans": "D", "exp": "朝高精度、高可靠、高抗干擾發展。"}, {"cat": "普通", "ch": 2, "n": 15, "q": "導航與自動避讓系統發展包括哪項重點？", "opts": ["慣性導航", "多感應器融合、GPS", "光電系統技術整合", "以上皆是"], "ans": "D", "exp": "結合慣性、GPS、多感測融合與光電技術。"}, {"cat": "普通", "ch": 2, "n": 16, "q": "動力系統都朝向下列哪個方向發展？", "opts": ["體積小、重量輕", "成本低", "可靠度高", "以上皆是"], "ans": "D", "exp": "朝輕小、低成本、高可靠發展。"}, {"cat": "普通", "ch": 2, "n": 17, "q": "能量來源可以包括下列哪項？", "opts": ["太陽能", "氫能", "鋰電池", "以上皆是"], "ans": "D", "exp": "能源可為太陽能、氫能或鋰電池等。"}, {"cat": "普通", "ch": 2, "n": 18, "q": "負責命令與控制、資料鏈路的是哪個系統？", "opts": ["動力系統", "無線通訊系統", "導航系統", "飛行控制系統"], "ans": "B", "exp": "命令控制與資料鏈路由無線通訊系統負責。"}, {"cat": "普通", "ch": 2, "n": 19, "q": "控制鏈路為保密抗干擾已全面採行哪種方式？", "opts": ["類比化", "模組化", "數位化", "離散化"], "ans": "C", "exp": "控制鏈路已全面數位化以利保密與抗干擾。"}, {"cat": "普通", "ch": 2, "n": 20, "q": "圖傳主要資料傳輸形態有哪幾種方式？", "opts": ["高速、寬頻", "類比、數位", "單工、衛星", "雙工、衛星"], "ans": "B", "exp": "圖傳分類比與數位兩種形態。"}, {"cat": "普通", "ch": 2, "n": 21, "q": "通訊技術朝向下列哪個方向發展？", "opts": ["高速、寬頻", "保密", "抗干擾", "以上皆是"], "ans": "D", "exp": "朝高速寬頻、保密、抗干擾發展。"}, {"cat": "普通", "ch": 2, "n": 22, "q": "感測器精度與任務複雜度上升，機載處理器哪項需求提高？", "opts": ["運算需求", "保密需求", "抗干擾需求", "重量需求"], "ans": "A", "exp": "資料量增加使運算需求提高。"}, {"cat": "普通", "ch": 2, "n": 23, "q": "航空器係指藉空氣之哪種力得以飛航之器物？", "opts": ["摩擦力", "靜電力", "反作用力", "以上皆是"], "ans": "C", "exp": "航空器藉空氣之反作用力飛航。"}, {"cat": "普通", "ch": 2, "n": 24, "q": "無人機比空氣重，需要相對應的哪個項目在空中飛行？", "opts": ["能量", "機身顏色", "起落架材質", "以上皆是"], "ans": "A", "exp": "重於空氣的飛行需要能量產生升力/推力。"}, {"cat": "普通", "ch": 2, "n": 25, "q": "利用噴射推力或螺旋槳拉力使航空器產生哪種力飛行？", "opts": ["內力", "升力", "彈力", "以上皆是"], "ans": "B", "exp": "推進系統配合翼面產生升力使其飛行。"}, {"cat": "普通", "ch": 2, "n": 26, "q": "飛行速度快、酬載大、效率高、不需複雜控制即可穩定的是哪種？", "opts": ["無人直昇機", "無人飛機", "無人多旋翼機", "以上皆是"], "ans": "B", "exp": "固定翼無人飛機速度快、效率高、氣動自穩。"}, {"cat": "普通", "ch": 2, "n": 27, "q": "無人飛機缺點是需要哪個項目供起降？", "opts": ["相當的跑道高度", "相當的跑道溫度", "相當的跑道長度", "以上皆是"], "ans": "C", "exp": "固定翼多需一定跑道長度起降。"}, {"cat": "普通", "ch": 2, "n": 28, "q": "透過旋翼槳葉產生升力同時也能產生推力的是哪種？", "opts": ["無人直昇機", "無人飛機", "無人多旋翼機", "以上皆是"], "ans": "A", "exp": "直昇機主旋翼可同時提供升力與推力。"}, {"cat": "普通", "ch": 2, "n": 29, "q": "無人直昇機可以執行哪個動作？", "opts": ["自由調整姿態", "定點盤旋", "起飛與落地", "以上皆是"], "ans": "D", "exp": "直昇機可調姿態、定點懸停與垂直起降。"}, {"cat": "普通", "ch": 2, "n": 30, "q": "透過三個以上垂直旋翼協調控制姿態、可垂直起降空中懸停的是哪種？", "opts": ["無人多旋翼機", "無人直昇機", "無人飛機", "以上皆是"], "ans": "A", "exp": "此為多旋翼機的特性。"}, {"cat": "普通", "ch": 2, "n": 31, "q": "操作人在遙控器施加桿力，可改變無人機的哪些性能？", "opts": ["重量或重心", "外形或顏色", "方向或速度", "翼展與翼弦"], "ans": "C", "exp": "操縱改變的是方向與速度（姿態/運動）。"}, {"cat": "普通", "ch": 2, "n": 32, "q": "無人飛機在地面靜止，依牛頓運動定律哪個特性使其保持靜止？", "opts": ["慣性", "磁性", "氣壓", "空氣濕度"], "ans": "A", "exp": "慣性（第一定律）使靜者恆靜。"}, {"cat": "普通", "ch": 2, "n": 33, "q": "以固定空速直線行進，哪個特性使其持續穩定直線飛行？", "opts": ["磁性", "氣壓", "慣性", "空氣濕度"], "ans": "C", "exp": "慣性使等速直線運動維持。"}, {"cat": "普通", "ch": 2, "n": 34, "q": "頂風飛行時，地面速度會有哪種變化？", "opts": ["變快", "不變", "變慢", "以上皆非"], "ans": "C", "exp": "頂（逆）風時對地速度變慢。"}, {"cat": "普通", "ch": 2, "n": 35, "q": "風從前方任一方向吹來且未修正，哪個特性會受力改變？", "opts": ["重量", "重心", "航向", "推力"], "ans": "C", "exp": "側／逆風未修正會使航向偏移。"}, {"cat": "普通", "ch": 2, "n": 36, "q": "噴射機後推熱氣，相等且相反的哪種力將其前推？", "opts": ["反作用力", "摩擦力", "靜電力", "磁力"], "ans": "A", "exp": "牛頓第三定律：反作用力推進。"}, {"cat": "普通", "ch": 2, "n": 37, "q": "無人機在空中飛行受哪些力相互作用？", "opts": ["升力、推力", "推力、阻力", "阻力、重力", "以上皆是"], "ans": "D", "exp": "受升力、推力、阻力、重力四力作用。"}, {"cat": "普通", "ch": 2, "n": 38, "q": "無人飛機推力由哪個組件提供？", "opts": ["發動機", "起落架", "機翼", "機身"], "ans": "A", "exp": "推力由發動機（含螺旋槳）提供。"}, {"cat": "普通", "ch": 2, "n": 39, "q": "無人飛機阻力由哪個項目產生？", "opts": ["地心引力", "重心", "空氣", "發動機"], "ans": "C", "exp": "阻力由空氣作用產生。"}, {"cat": "普通", "ch": 2, "n": 40, "q": "無人飛機升力由哪個項目提供？", "opts": ["起落架", "機翼", "重心", "地心引力"], "ans": "B", "exp": "升力由機翼產生。"}, {"cat": "普通", "ch": 2, "n": 41, "q": "重力由哪個項目產生？", "opts": ["空氣", "地心引力", "發動機", "機翼"], "ans": "B", "exp": "重力來自地心引力。"}, {"cat": "普通", "ch": 2, "n": 42, "q": "等速直線飛行時，縱軸阻力與推力大小相同方向相反，所以？", "opts": ["Y軸合力為零，無升降起伏", "Z軸合力為零，無偏航", "X軸合力為零，速度不變", "以上皆是"], "ans": "C", "exp": "縱軸(X)合力為零，速度不變。"}, {"cat": "普通", "ch": 2, "n": 43, "q": "高度保持時，升力與重力大小相同方向相反，所以？", "opts": ["Y軸合力為零，無偏航", "Z軸合力為零，無升降起伏", "X軸合力為零，速度不變", "以上皆是"], "ans": "B", "exp": "垂直軸(Z)合力為零，無升降起伏。"}, {"cat": "普通", "ch": 2, "n": 44, "q": "連續性定理闡述流體流動中，哪些項目之間的關係？", "opts": ["流速和管道切面", "流速和溫度", "管道切面和溫度", "溫度和壓力"], "ans": "A", "exp": "連續方程式：流速與管道截面積相關（截面小流速快）。"}, {"cat": "普通", "ch": 2, "n": 45, "q": "連續性定理中，流速和管道切面相關，且哪些也相關？", "opts": ["流速和壓力", "流速和溫度", "管道切面和溫度", "溫度和壓力"], "ans": "A", "exp": "結合柏努利，流速與壓力相關。"}, {"cat": "普通", "ch": 2, "n": 46, "q": "柏努利定律說明流體流動時有哪種現象？", "opts": ["流速大壓力大", "流速大壓力大、流速小壓力也大", "流速大壓力小、流速小壓力大", "流速大壓力小、流速小壓力也小"], "ans": "C", "exp": "流速大處壓力小、流速小處壓力大。"}, {"cat": "普通", "ch": 2, "n": 47, "q": "柏努利定律闡述流體流動中哪些項目間的關係？", "opts": ["流速和溫度", "流速和壓力", "溫度和壓力", "以上皆非"], "ans": "B", "exp": "描述流速與壓力的關係。"}, {"cat": "普通", "ch": 2, "n": 48, "q": "柏努利定律中流體速度越快，壓力會？", "opts": ["越小", "越大", "不變", "有時大有時小"], "ans": "A", "exp": "流速越快壓力越小。"}, {"cat": "普通", "ch": 2, "n": 49, "q": "機翼或旋翼是哪種外力主要產生的地方？", "opts": ["阻力", "升力", "推力", "重力"], "ans": "B", "exp": "翼面主要產生升力。"}, {"cat": "普通", "ch": 2, "n": 50, "q": "基於連續性定理與柏努利定律，機翼上下表面會出現哪種現象？", "opts": ["溫度差", "壓力差", "濕度差", "比熱差"], "ans": "B", "exp": "上表面流速快壓力小、下表面壓力大，形成壓力差。"}, {"cat": "普通", "ch": 2, "n": 51, "q": "垂直於相對氣流方向的壓力差之總和是哪種外力？", "opts": ["攻角設計", "空氣阻力", "機翼升力", "地心引力"], "ans": "C", "exp": "垂直相對氣流的壓力差合力即升力。"}, {"cat": "普通", "ch": 2, "n": 52, "q": "螺旋槳產生的推力是藉由哪個項目而成？", "opts": ["攻角設計", "轉速", "以上皆是", "以上皆非"], "ans": "C", "exp": "推力由槳葉攻角設計配合轉速產生。"}, {"cat": "普通", "ch": 2, "n": 53, "q": "螺旋槳轉速通常以哪個項目表示？", "opts": ["rad/s", "RPM", "Hz", "rad/min"], "ans": "B", "exp": "轉速常以每分鐘轉數 RPM 表示。"}, {"cat": "普通", "ch": 2, "n": 54, "q": "一般螺旋槳攻角最大的位置在槳葉哪個位置？", "opts": ["槳葉根部", "槳葉葉尖", "槳葉中尖", "以上皆是"], "ans": "A", "exp": "越靠根部線速度小，需較大攻角，故根部攻角最大。"}, {"cat": "普通", "ch": 2, "n": 55, "q": "原廠設計槳葉角度時，係依發動機及飛機哪些特性為基礎？", "opts": ["銷量和價格", "耗油量和扭力", "壓縮比和衝程", "轉速和空速"], "ans": "D", "exp": "依轉速與空速設計最佳槳葉角度。"}, {"cat": "普通", "ch": 2, "n": 56, "q": "航空器於飛行中在空氣裡會有哪種外力？", "opts": ["各種彈力", "各種阻力", "各種磁力", "各種正向力"], "ans": "B", "exp": "飛行中受各種空氣阻力。"}, {"cat": "普通", "ch": 2, "n": 57, "q": "與飛機運動方向相反、阻礙前進的空氣動力是哪種外力？", "opts": ["阻力", "升力", "重力", "推力"], "ans": "A", "exp": "與運動方向相反者為阻力。"}, {"cat": "普通", "ch": 2, "n": 58, "q": "寄生阻力可分為哪幾種？", "opts": ["摩擦阻力", "形狀阻力", "干擾阻力", "以上皆是"], "ans": "D", "exp": "寄生阻力含摩擦、形狀、干擾阻力。"}, {"cat": "普通", "ch": 2, "n": 59, "q": "高速無人機除既有阻力外，還會另外產生哪種阻力？", "opts": ["震波阻力", "布斯曼阻力", "達倫伯特阻力", "雷諾阻力"], "ans": "A", "exp": "接近音速時產生震波阻力。"}, {"cat": "普通", "ch": 2, "n": 60, "q": "哪個項目是空氣產生摩擦力的主要物理特性？", "opts": ["粘性", "低汙染", "PM2.5", "高揮發性"], "ans": "A", "exp": "空氣的黏性造成摩擦阻力。"}, {"cat": "普通", "ch": 2, "n": 61, "q": "空氣流經表面摩擦、阻止前進的力是哪種阻力？", "opts": ["形狀阻力", "誘導阻力", "摩擦阻力", "干擾阻力"], "ans": "C", "exp": "表面摩擦所生為摩擦阻力。"}, {"cat": "普通", "ch": 2, "n": 62, "q": "摩擦阻力大小決定於哪個特性？", "opts": ["空氣粘性", "飛機表面狀況", "接觸表面積", "以上皆是"], "ans": "D", "exp": "取決於黏性、表面粗糙度與接觸面積。"}, {"cat": "普通", "ch": 2, "n": 63, "q": "空氣粘性越大，摩擦阻力會？", "opts": ["越小", "越大", "不變", "以上皆非"], "ans": "B", "exp": "黏性越大摩擦阻力越大。"}, {"cat": "普通", "ch": 2, "n": 64, "q": "飛機表面越粗糙，摩擦阻力會？", "opts": ["越小", "不變", "越大", "以上皆非"], "ans": "C", "exp": "越粗糙摩擦阻力越大。"}, {"cat": "普通", "ch": 2, "n": 65, "q": "飛機表面積越大，摩擦阻力會？", "opts": ["越大", "越小", " 拔、高溫、高濕都降低性能（高密度高度）。"}, {"cat": "普通", "ch": 2, "n": 149, "q": "重力的著力點稱為哪個項目？", "opts": ["形心", "氣動力中心", "重心", "升力中心"], "ans": "C", "exp": "重力著力點為重心。"}, {"cat": "普通", "ch": 2, "n": 150, "q": "哪個項目與穩定性有很大關聯？", "opts": ["外觀", "重心", "大小", "顏色"], "ans": "B", "exp": "重心位置與穩定性密切相關。"}, {"cat": "普通", "ch": 2, "n": 151, "q": "重心位置超出允許範圍時可能導致哪種情形？", "opts": ["無法穩定起飛", "無法穩定落地", "失速", "以上皆是"], "ans": "D", "exp": "重心失當可能無法穩定起降甚至失速。"}, {"cat": "普通", "ch": 2, "n": 152, "q": "飛行產生各種姿態時，作用於機身的力為哪種情形？", "opts": ["升力通常較重量大", "升力通常較重量小", "有時大有時小", "以上皆非"], "ans": "A", "exp": "操縱機動時升力通常大於重量。"}, {"cat": "普通", "ch": 2, "n": 153, "q": "轉彎率因速度不同而異，是為抵銷所增加的哪種力以保持負載係數不變？", "opts": ["向心力", "離心力", "正向力", "扭力"], "ans": "B", "exp": "轉彎時抵銷離心力以維持負載係數。"}, {"cat": "普通", "ch": 2, "n": 154, "q": "轉彎時需執行哪個動作以補償升力不足？", "opts": ["增加正向力", "增加攻角", "增加扭力", "增加離心力"], "ans": "B", "exp": "傾斜轉彎升力垂直分量減少，需增加攻角補償。"}, {"cat": "普通", "ch": 2, "n": 155, "q": "重心靠前時，為維持俯仰平衡需要尾翼提供哪種力？", "opts": ["更大向前推力", "更大向上升力", "更大向下升力", "更大向外離心力"], "ans": "C", "exp": "重心前移，需尾翼提供向下的力平衡。"}, {"cat": "普通", "ch": 2, "n": 156, "q": "重心靠前機頭沉重，起飛離地時有哪種情形？", "opts": ["較為困難", "較為容易", "有時容易有時困難", "以上皆非"], "ans": "A", "exp": "機頭重，仰轉離地較困難。"}, {"cat": "普通", "ch": 2, "n": 157, "q": "重心靠前時會有哪種情形？", "opts": ["減少誘導阻力", "增大誘導阻力", "誘導阻力不變", "以上皆非"], "ans": "B", "exp": "須較大攻角平衡，誘導阻力增大。"}, {"cat": "普通", "ch": 2, "n": 158, "q": "重心靠前時會有哪種情形？", "opts": ["油耗增加", "航程距離降低", "以上皆是", "以上皆非"], "ans": "C", "exp": "阻力增加使油耗增加、航程降低。"}, {"cat": "普通", "ch": 2, "n": 159, "q": "重心靠前時提高了哪種風險？", "opts": ["不穩定進場", "穩定進場", "非精確進場", "精確進場"], "ans": "A", "exp": "機頭偏重提高不穩定進場風險。"}, {"cat": "普通", "ch": 2, "n": 160, "q": "重心後移機頭較輕，起飛時可能發生哪種情形？", "opts": ["偏離跑道", "左右搖擺", "提前仰轉", "延後離地"], "ans": "C", "exp": "機頭輕易提前仰轉。"}, {"cat": "普通", "ch": 2, "n": 161, "q": "重心後移起飛爬升時仰角過大，造成哪種情形？", "opts": ["起飛速度增加", "起飛重量降低", "失速與機尾擦地", "以上皆是"], "ans": "C", "exp": "仰角過大導致失速與機尾擦地。"}, {"cat": "普通", "ch": 2, "n": 162, "q": "重心後移配平及總阻力減小，導致哪種情形？", "opts": ["油耗減少", "續航能力增加", "失速速度減小", "以上皆是"], "ans": "D", "exp": "阻力小→省油、續航增、失速速度降。"}, {"cat": "普通", "ch": 2, "n": 163, "q": "直昇機重心太靠後，會影響哪種性能？", "opts": ["高速前飛性能及穩定", "從地面到正常起飛", "平直飛行", "以上皆是"], "ans": "A", "exp": "重心後移主要影響高速前飛性能與穩定。"}, {"cat": "普通", "ch": 2, "n": 164, "q": "多旋翼機重心移動可能造成哪種結果？", "opts": ["升力增加", "操控較為困難", "阻力減少", "以上皆是"], "ans": "B", "exp": "重心偏移使操控變困難。"}, {"cat": "普通", "ch": 2, "n": 165, "q": "重量增加對起飛速度造成哪種結果？", "opts": ["降低起飛速度", "起飛速度不變", "提高起飛速度", "以上皆非"], "ans": "C", "exp": "越重需越快才能離地，起飛速度提高。"}, {"cat": "普通", "ch": 2, "n": 166, "q": "重量增加對滑行距離造成哪種結果？", "opts": ["縮短起飛滑行距離", "加長起飛滑行距離", "不變", "以上皆非"], "ans": "B", "exp": "越重滑行距離越長。"}, {"cat": "普通", "ch": 2, "n": 167, "q": "重量增加對爬升率及爬升角造成哪種結果？", "opts": ["降低爬升率和角度", "增加爬升率和角度", "不變", "以上皆非"], "ans": "A", "exp": "越重爬升率與角度都降低。"}, {"cat": "普通", "ch": 2, "n": 168, "q": "重量增加對飛航最高高度造成哪種結果？", "opts": ["降低飛航最高高度", "增加", "不變", "以上皆非"], "ans": "A", "exp": "越重升限（最高高度）降低。"}, {"cat": "普通", "ch": 2, "n": 169, "q": "重量增加對操作性能造成哪種結果？", "opts": ["不變", "增加", "降低操作性能", "以上皆非"], "ans": "C", "exp": "越重操作性能下降。"}, {"cat": "普通", "ch": 2, "n": 170, "q": "重量增加對進場及降落速度造成哪種結果？", "opts": ["降低進場和降落速度", "提高進場和降落速度", "不變", "以上皆非"], "ans": "B", "exp": "越重進場降落速度須提高。"}, {"cat": "普通", "ch": 2, "n": 171, "q": "重量增加對降落滾行距離造成哪種結果？", "opts": ["加長降落滾行距離", "縮短", "不變", "以上皆非"], "ans": "A", "exp": "越重降落滾行距離越長。"}, {"cat": "普通", "ch": 2, "n": 172, "q": "為確保飛行安全，須審慎確認哪個特性？", "opts": ["外觀", "重量與載重平衡", "價格", "以上皆是"], "ans": "B", "exp": "須確認重量與載重平衡（W&B）。"}, {"cat": "普通", "ch": 3, "n": 1, "q": "當空氣密度增加時，對飛機升力的影響為何？", "opts": ["升力增加", "升力降低", "升力不變", "有時增加有時降低"], "ans": "A", "exp": "密度大，同速下升力增加。"}, {"cat": "普通", "ch": 3, "n": 2, "q": "下列何者非影響空氣密度之因素？", "opts": ["高度", "溫度", "濕度", "應力"], "ans": "D", "exp": "密度受高度、溫度、濕度影響；應力與密度無關。"}, {"cat": "普通", "ch": 3, "n": 3, "q": "空氣中分子較少且稀薄，表示其密度高度為何？", "opts": ["越高", "越低", "可能高也可能低", "無法判斷"], "ans": "A", "exp": "空氣稀薄＝密度高度越高。"}, {"cat": "普通", "ch": 3, "n": 4, "q": "空氣中分子較多且濃厚，表示其密度高度為何？", "opts": ["越高", "越低", "可能高也可能低", "無法判斷"], "ans": "B", "exp": "空氣濃厚＝密度高度越低。"}, {"cat": "普通", "ch": 3, "n": 5, "q": "高密度高度之環境比較不會出現於下列何處？", "opts": ["低海拔處", "高溫處", "非常潮濕之處", "低大氣壓力之處"], "ans": "A", "exp": "低海拔空氣濃、密度高度低，故高密度高度不易出現於低海拔。"}, {"cat": "普通", "ch": 3, "n": 6, "q": "低密度高度之環境比較不會出現於下列何處？", "opts": ["大氣壓力極高之處", "低海拔處", "乾燥處", "高溫處"], "ans": "D", "exp": "高溫使空氣稀、密度高度升高，故高溫處不易出現低密度高度。"}, {"cat": "普通", "ch": 3, "n": 7, "q": "空氣可藉外界作功達到哪種效果？", "opts": ["加工成形", "染色", "壓縮及膨脹", "以上皆是"], "ans": "C", "exp": "空氣可被壓縮及膨脹。"}, {"cat": "普通", "ch": 3, "n": 8, "q": "固定體積下，升溫時密度減少，降溫時該體積空氣密度為哪種變化？", "opts": ["增加", "減少", "不變", "有時增有時減"], "ans": "A", "exp": "降溫使分子聚集，密度增加。"}, {"cat": "普通", "ch": 3, "n": 9, "q": "對流層裡，溫度及壓力均隨高度增加而有哪種變化？", "opts": ["降低", "增加", "不變", "有時增有時降"], "ans": "A", "exp": "對流層溫度與壓力隨高度上升而降低。"}, {"cat": "普通", "ch": 3, "n": 10, "q": "下列有關大氣壓力量測之敘述，何者錯誤？", "opts": ["ISA為公認校正基準", "海平面壓力29.92inHg", "一標準大氣壓等於1017.2毫巴", "每上升1000呎氣壓約減1inHg"], "ans": "C", "exp": "一標準大氣壓約 1013.2 毫巴，非 1017.2，故此敘述錯誤。"}, {"cat": "普通", "ch": 3, "n": 11, "q": "29.92吋汞柱換算成毫巴值為哪個數值？", "opts": ["10.132", "101.32", "1013.2", "10132"], "ans": "C", "exp": "標準大氣壓約 1013.2 hPa（毫巴）。"}, {"cat": "普通", "ch": 3, "n": 12, "q": "大氣壓力實際值與標準值存在差距，係由哪項因素影響？", "opts": ["壓力錶廠牌差異", "地面溫度不平均", "讀法差異", "校正值差異"], "ans": "B", "exp": "地面溫度分布不均造成實際與標準值差異。"}, {"cat": "普通", "ch": 3, "n": 13, "q": "若未修正壓力差距，可能無法精確掌握何項資訊？", "opts": ["實際高度", "實際航向", "實際滾轉角", "實際引擎轉速"], "ans": "A", "exp": "氣壓高度計未修正將無法掌握實際高度。"}, {"cat": "普通", "ch": 3, "n": 14, "q": "某區域氣壓值向上提升，代表天氣有何變化？", "opts": ["天氣轉壞", "可能轉好也可能轉壞", "天氣好轉", "以上皆非"], "ans": "C", "exp": "氣壓上升通常天氣好轉。"}, {"cat": "普通", "ch": 3, "n": 15, "q": "某區域氣壓值向下降低，代表天氣有何變化？", "opts": ["天氣好轉", "天氣轉壞", "有時晴有時壞", "以上皆非"], "ans": "B", "exp": "氣壓下降通常天氣轉壞。"}, {"cat": "普通", "ch": 3, "n": 16, "q": "空氣的水平運動稱為？", "opts": ["雲", "風", "霧", "霾"], "ans": "B", "exp": "空氣水平運動即為風。"}, {"cat": "普通", "ch": 3, "n": 17, "q": "有關風速的單位下列何者為非？", "opts": ["m/s", "km/h", "kts(海浬/時)", "kg/h"], "ans": "D", "exp": "kg/h 是質量流率單位，非風速單位。"}, {"cat": "普通", "ch": 3, "n": 18, "q": "無人機通常應於哪種風向下起降？", "opts": ["順風", "側風", "逆風", "任何風向"], "ans": "C", "exp": "逆風起降可增升力、縮短起降距離。"}, {"cat": "普通", "ch": 3, "n": 19, "q": "無人飛機於逆風起飛，不會有哪種特性？", "opts": ["增加穩定性", "增加操縱性", "減少起飛距離", "減少操縱性"], "ans": "D", "exp": "逆風增穩定、增操縱、縮短距離，故「減少操縱性」不會發生。"}, {"cat": "普通", "ch": 3, "n": 20, "q": "飛經哪個區域較易遭受亂流，且強度與周遭環境密切相關？", "opts": ["大草原區", "寬廣湖泊區", "平坦操場上空", "深山峽谷區"], "ans": "D", "exp": "峽谷地形使氣流紊亂，易生亂流。"}, {"cat": "普通", "ch": 3, "n": 21, "q": "越強勁的風吹過多山地區時，背風面風場如何變化？", "opts": ["漸趨平穩", "有時平穩有時不平穩", "漸趨不平穩", "不變"], "ans": "C", "exp": "背風面易生亂流，越強風越不平穩。"}, {"cat": "普通", "ch": 3, "n": 22, "q": "哪一項風切對無人機操控性影響最大？", "opts": ["超高空風切", "高空風切", "向量風切", "低空風切"], "ans": "D", "exp": "起降位於低空，低空風切影響最大。"}, {"cat": "普通", "ch": 3, "n": 23, "q": "起降階段突遇風速風向明顯改變，不會有哪種影響？", "opts": ["飛行姿態改變", "飛行軌跡改變", "所獲升力改變", "最大載重改變"], "ans": "D", "exp": "風切改變姿態、軌跡、升力，但不改變最大載重能力。"}, {"cat": "普通", "ch": 3, "n": 24, "q": "臺灣地區低空風切之敘述何者較正確？", "opts": ["鋒面過境溫和、西南季風強烈", "鋒面過境強烈、西南季風溫和", "均溫和", "均強烈"], "ans": "B", "exp": "鋒面過境時低空風切較強烈，西南季風時較溫和。"}, {"cat": "普通", "ch": 3, "n": 25, "q": "天氣因素可能對無人機產生何種影響？", "opts": ["外觀美感", "飛行航向", "品牌知名度", "重量大小"], "ans": "B", "exp": "風等天氣因素會影響飛行航向。"}, {"cat": "普通", "ch": 3, "n": 26, "q": "哪種天氣現象與大氣垂直運動無直接關係？", "opts": ["雷雨", "平流霧", "冰雹", "下爆氣流"], "ans": "B", "exp": "平流霧靠水平移流生成，與垂直運動無直接關係。"}, {"cat": "普通", "ch": 3, "n": 27, "q": "大氣穩定度與哪項因子有直接關係？", "opts": ["空氣流動方向", "懸浮微粒大小", "水氣飽和程度", "空氣乾燥程度"], "ans": "A", "exp": "（本題官方答案為A：空氣流動方向。）"}, {"cat": "普通", "ch": 3, "n": 28, "q": "停留時間長、水平物理性質一致之廣大空氣體稱之？", "opts": ["鋒面", "氣團", "颶風", "塔狀積雲"], "ans": "B", "exp": "此即氣團。"}, {"cat": "普通", "ch": 3, "n": 29, "q": "哪個城市較易發生午後雷陣雨？", "opts": ["東京", "新加坡", "莫斯科", "倫敦"], "ans": "B", "exp": "新加坡近赤道、高溫高濕，午後對流旺盛。"}, {"cat": "普通", "ch": 3, "n": 30, "q": "一定量空氣於一定溫度下，所能容納之何者亦有其限度？", "opts": ["PM2.5", "微生物", "水氣量", "細菌"], "ans": "C", "exp": "空氣容納水氣量有其上限（飽和）。"}, {"cat": "普通", "ch": 3, "n": 31, "q": "空氣中水氣達最高限度時，相對溼度為何？", "opts": ["0.2", "0.4", "0.8", "1"], "ans": "D", "exp": "飽和時相對濕度為 1（100%）。"}, {"cat": "普通", "ch": 3, "n": 32, "q": "空氣能容納水氣量之多寡與何者密切相關？", "opts": ["含氧量", "雜質含量", "溫度", "惰性氣體成份"], "ans": "C", "exp": "溫度越高可容納水氣越多。"}, {"cat": "普通", "ch": 3, "n": 33, "q": "已飽和水氣如遇溫度持續下降，不會產生哪種現象？", "opts": ["霧", "雲", "雨滴", "風"], "ans": "D", "exp": "降溫凝結成霧雲雨；風是氣壓差造成，與此無關。"}, {"cat": "普通", "ch": 3, "n": 34, "q": "實際水氣量與同溫下最大水氣量之百分比稱為？", "opts": ["絕對濕度", "相對濕度", "同溫濕度", "實際濕度"], "ans": "B", "exp": "此即相對濕度。"}, {"cat": "普通", "ch": 3, "n": 35, "q": "空氣中濕度越高，會導致哪種情形？", "opts": ["壓力越大", "密度越低", "升力增加", "涼爽度提高"], "ans": "B", "exp": "水氣比乾空氣輕，濕度高則空氣密度低。"}, {"cat": "普通", "ch": 3, "n": 36, "q": "當空氣溫度等於露點溫度時，即達到何種狀況？", "opts": ["水氣沸點", "水氣飽和點", "水氣熔點", "水氣蒸發點"], "ans": "B", "exp": "溫度＝露點時達水氣飽和。"}, {"cat": "普通", "ch": 3, "n": 37, "q": "水汽飽和時不會產生哪種現象？", "opts": ["雲", "霧", "雨", "雷爆"], "ans": "D", "exp": "飽和生雲霧雨；雷爆需強對流，非僅飽和即成。"}, {"cat": "普通", "ch": 3, "n": 38, "q": "「霧」的分類下列何者非常用之分類？", "opts": ["平流霧", "蒸氣霧", "鋒面霧", "高空霧"], "ans": "D", "exp": "常用分類無「高空霧」。"}, {"cat": "普通", "ch": 3, "n": 39, "q": "有關平流霧之特點，下列何者為非？", "opts": ["日出後消散快速", "相對濕度較高", "不容易消散", "可能發生於沿海"], "ans": "A", "exp": "平流霧不易消散，故「日出後消散快速」為錯誤。"}, {"cat": "普通", "ch": 3, "n": 40, "q": "哪一種情況有助於平流霧消散？", "opts": ["風速變小", "風向轉變", "溫度升高", "濕度增高"], "ans": "B", "exp": "風向轉變（帶走潮濕氣流）有助平流霧消散。"}, {"cat": "普通", "ch": 3, "n": 41, "q": "有關輻射霧之特點，下列何者為非？", "opts": ["日出後漸消散", "大都發生於冬季", "比平流霧不易消散", "地面風微弱空氣穩定"], "ans": "C", "exp": "輻射霧日出後易消散，故「比平流霧不易消散」為錯誤。"}, {"cat": "普通", "ch": 3, "n": 42, "q": "冷空氣流經溫暖水面蒸發使水氣增加而凝結成哪種霧？", "opts": ["蒸氣霧", "輻射霧", "山坡霧", "鋒面霧"], "ans": "A", "exp": "此為蒸氣霧（如寒冷水面上冒煙）。"}, {"cat": "普通", "ch": 3, "n": 43, "q": "蒸氣霧常出現於哪個季節？", "opts": ["春夏", "夏末", "秋冬", "春末"], "ans": "C", "exp": "秋冬冷空氣遇暖水面易生蒸氣霧。"}, {"cat": "普通", "ch": 3, "n": 44, "q": "高空冷空氣下移凝結於兩氣團交界所成之霧稱之？", "opts": ["鋒面霧", "山坡霧", "輻射霧", "蒸氣霧"], "ans": "A", "exp": "鋒面交界處凝結為鋒面霧。"}, {"cat": "普通", "ch": 3, "n": 45, "q": "鋒面霧多伴隨何種天氣現象發生？", "opts": ["颱風", "鋒面", "雷陣雨", "龍捲風"], "ans": "B", "exp": "鋒面霧伴隨鋒面過境發生。"}, {"cat": "普通", "ch": 3, "n": 46, "q": "平流和輻射兩過程相輔相成，造成哪種霧？", "opts": ["平流輻射霧", "山坡霧", "蒸氣霧", "鋒面霧"], "ans": "A", "exp": "兩者結合成平流輻射霧。"}, {"cat": "普通", "ch": 3, "n": 47, "q": "空氣降至低於露點，水氣凝結附著地表建物者稱之？", "opts": ["雲", "露", "霧", "霜"], "ans": "B", "exp": "凝結成水滴附著者為露。"}, {"cat": "普通", "ch": 3, "n": 48, "q": "露珠凝結成固態霜，對飛航安全有何影響？", "opts": ["有幫助", "可能造成危害", "並無影響", "有時危害有時無影響"], "ans": "B", "exp": "結霜破壞氣流、降升力，可能危害飛安。"}, {"cat": "普通", "ch": 3, "n": 49, "q": "機體表面的霜在飛行時不會產生哪種情形？", "opts": ["擾動流經機翼空氣", "降低升力", "增加阻力", "增加飛航效率"], "ans": "D", "exp": "結霜降效率，故「增加飛航效率」不會發生。"}, {"cat": "普通", "ch": 3, "n": 50, "q": "大陸型氣候深秋早晨飛行前，務必進行哪個程序？", "opts": ["暖身程序", "點名程序", "除霜程序", "冥想程序"], "ans": "C", "exp": "深秋早晨易結霜，須先除霜。"}, {"cat": "普通", "ch": 3, "n": 51, "q": "雲有哪幾種型態？", "opts": ["積狀雲", "層狀雲", "卷狀雲", "以上皆是"], "ans": "D", "exp": "雲型態分積狀、層狀、卷狀。"}, {"cat": "普通", "ch": 3, "n": 52, "q": "雲依高度可分成哪幾種？", "opts": ["高雲族", "中雲族", "低雲族", "以上皆是"], "ans": "D", "exp": "依高度分高、中、低雲族。"}, {"cat": "普通", "ch": 3, "n": 53, "q": "高雲族(約6000公尺以上)主要有哪幾種？", "opts": ["卷雲", "卷層雲", "卷積雲", "以上皆是"], "ans": "D", "exp": "高雲族含卷雲、卷層雲、卷積雲。"}, {"cat": "普通", "ch": 3, "n": 54, "q": "中雲族(約2000~6000公尺)主要有哪幾種？", "opts": ["高積雲", "高層雲", "雨層雲", "以上皆是"], "ans": "D", "exp": "中雲族含高積雲、高層雲、雨層雲。"}, {"cat": "普通", "ch": 3, "n": 55, "q": "低雲族(2000公尺以下)包含哪幾種？", "opts": ["積雲", "層雲", "層積雲", "以上皆是"], "ans": "D", "exp": "低雲族含積雲、層雲、層積雲。"}, {"cat": "普通", "ch": 3, "n": 56, "q": "下列何者為常見氣團分類方式？", "opts": ["依源地緯度高低", "依源地為大陸或海洋", "依所經地面冷暖", "以上皆是"], "ans": "D", "exp": "可依緯度、海陸源地及所經地面冷暖分類。"}, {"cat": "普通", "ch": 3, "n": 57, "q": "氣團本身冷於周遭空氣稱為？", "opts": ["暖氣團", "冷氣團", "冰氣團", "熱氣團"], "ans": "B", "exp": "冷於周遭者為冷氣團。"}, {"cat": "普通", "ch": 3, "n": 58, "q": "氣團穩定度決定其籠罩區域的哪種形態？", "opts": ["社會形態", "經濟形態", "天氣形態", "政治形態"], "ans": "C", "exp": "氣團穩定度決定天氣形態。"}, {"cat": "普通", "ch": 3, "n": 59, "q": "鋒面兩側的哪種現象通常有明顯差異？", "opts": ["溫度", "濕度", "風、天氣", "以上皆是"], "ans": "D", "exp": "鋒面兩側溫度、濕度、風與天氣皆明顯不同。"}, {"cat": "普通", "ch": 3, "n": 60, "q": "冷空氣前進迫使暖空氣後退取代原位，此鋒面稱為？", "opts": ["滯留鋒", "暖鋒", "冷鋒", "囚錮鋒"], "ans": "C", "exp": "冷氣團推進為冷鋒。"}, {"cat": "普通", "ch": 3, "n": 61, "q": "冷暖氣團勢均力敵使鋒面滯留，此鋒面稱為？", "opts": ["暖鋒", "滯留鋒", "冷鋒", "囚錮鋒"], "ans": "B", "exp": "勢均力敵者為滯留鋒。"}, {"cat": "普通", "ch": 3, "n": 62, "q": "飛經各鋒面區時，可能遭遇哪項劇烈變化？", "opts": ["溫度", "濕度", "風向", "以上皆是"], "ans": "D", "exp": "鋒面區溫度、濕度、風向皆劇烈變化。"}, {"cat": "普通", "ch": 3, "n": 63, "q": "山區遇強風，選擇何處飛行相較平順？", "opts": ["背風面", "側風面", "迎風面", "以上皆非"], "ans": "C", "exp": "迎風面氣流較平順，背風面易亂流。"}, {"cat": "普通", "ch": 3, "n": 64, "q": "山區飛行過了山巔需注意沿何方向產生之亂流？", "opts": ["側風面", "背風面", "迎風面", "以上皆非"], "ans": "B", "exp": "過山巔後背風面易生亂流（山岳波）。"}, {"cat": "普通", "ch": 3, "n": 65, "q": "飛越可見水氣時需注意哪個部位可能積冰？", "opts": ["機翼翼面", "尾翼翼面", "感測器", "以上皆是"], "ans": "D", "exp": "翼面與感測器等皆可能積冰。"}, {"cat": "普通", "ch": 3, "n": 66, "q": "飛行時哪種情形可能發生積冰？", "opts": ["氣溫攝氏零度", "零度以下", "有可見水氣", "以上皆是"], "ans": "D", "exp": "0℃或以下且有可見水氣時易積冰。"}, {"cat": "普通", "ch": 3, "n": 67, "q": "飛越結冰區域時可能發生哪種狀況？", "opts": ["影響或誤判飛行性能", "提升飛行性能", "可能變好或變壞", "不太可能發生"], "ans": "A", "exp": "積冰破壞氣動外形，影響或誤判性能。"}, {"cat": "普通", "ch": 3, "n": 68, "q": "雷雨的發展循環不包含下列何者？", "opts": ["發展期", "成熟期", "重疊期", "消散期"], "ans": "C", "exp": "雷雨分發展、成熟、消散三期；無「重疊期」。"}, {"cat": "普通", "ch": 3, "n": 69, "q": "雷雨成熟期具有的特徵為何？", "opts": ["下沉氣流", "開始降水", "打雷", "以上皆是"], "ans": "D", "exp": "成熟期有上升與下沉氣流、降水與打雷。"}, {"cat": "普通", "ch": 3, "n": 70, "q": "雷雨消散期具有的特徵為何？", "opts": ["降雨減緩", "下沉氣流減緩", "雷雨雹消散", "以上皆是"], "ans": "D", "exp": "消散期降雨與氣流趨緩、雷雨雹漸消。"}, {"cat": "普通", "ch": 3, "n": 71, "q": "臺北航空氣象中心隸屬於哪個機關？", "opts": ["觀光局飛航服務總臺", "民用航空局飛航服務總臺", "中央氣象局飛航服務總臺", "航政司飛航服務總臺"], "ans": "B", "exp": "隸屬交通部民用航空局飛航服務總臺。"}, {"cat": "普通", "ch": 3, "n": 72, "q": "可透過中央氣象局網頁取得哪項資料？", "opts": ["天氣觀測", "天氣預報", "衛星雲圖", "以上皆是"], "ans": "D", "exp": "氣象局提供觀測、預報與衛星雲圖。"}, {"cat": "普通", "ch": 3, "n": 73, "q": "可透過航空氣象服務網(AOAWS)取得哪項資料？", "opts": ["國內外主要機場即時觀測", "國內機場6小時預報", "太平洋衛星雲圖", "高空風溫圖"], "ans": "A", "exp": "AOAWS 提供國內外主要機場即時觀測資料。"}, {"cat": "普通", "ch": 3, "n": 74, "q": "操作人應具備下列何者之基礎判讀能力？", "opts": ["航空氣象報文", "國內城市氣象報文", "外國城市氣象報文", "觀光地區氣象報文"], "ans": "A", "exp": "應能判讀航空氣象報文（如 METAR/TAF）。"}, {"cat": "普通", "ch": 3, "n": 75, "q": "航空例行天氣報告中，觀測日期時間之代碼說明為何？", "opts": ["Z指示碼代表UTC時間", "L指示碼代表本地時間", "T指示碼代表UTC時間", "X指示碼代表本地時間"], "ans": "A", "exp": "報文以 Z 表示 UTC（協調世界時）。"}, {"cat": "普通", "ch": 3, "n": 76, "q": "盛行能見度值之編報方式及單位為何？", "opts": ["4碼(公尺)", "6碼(公尺)", "8碼(公尺)", "10碼(公尺)"], "ans": "A", "exp": "盛行能見度以 4 碼（公尺）編報。"}, {"cat": "普通", "ch": 3, "n": 77, "q": "觀測到1/8至2/8天空被雲遮蓋，稱為哪種雲量類別？", "opts": ["稀雲", "疏雲", "裂雲", "密雲"], "ans": "A", "exp": "1~2/8 為稀雲(FEW)。"}, {"cat": "普通", "ch": 3, "n": 78, "q": "觀測到3/8至4/8天空被雲遮蓋，稱為哪種雲量類別？", "opts": ["稀雲", "疏雲", "裂雲", "密雲"], "ans": "B", "exp": "3~4/8 為疏雲(SCT)。"}, {"cat": "普通", "ch": 3, "n": 79, "q": "觀測到5/8至7/8天空被雲遮蓋，稱為哪種雲量類別？", "opts": ["稀雲", "疏雲", "裂雲", "密雲"], "ans": "C", "exp": "5~7/8 為裂雲(BKN)。"}, {"cat": "普通", "ch": 3, "n": 80, "q": "觀測到8/8天空被雲遮蓋，稱為哪種雲量類別？", "opts": ["稀雲", "疏雲", "裂雲", "密雲"], "ans": "D", "exp": "8/8 全天遮蓋為密雲(OVC)。"}, {"cat": "普通", "ch": 3, "n": 81, "q": "航空例行天氣報告中，雲層之雲底高度單位為哪一個？", "opts": ["公尺", "公里", "呎", "浬"], "ans": "C", "exp": "雲底高度以呎為單位。"}, {"cat": "普通", "ch": 3, "n": 82, "q": "終端機場天氣觀測報中，盛行天氣現象包括哪個項目？", "opts": ["風向風速", "能見度", "天氣狀況及雲組", "以上皆是"], "ans": "D", "exp": "含風、能見度、天氣狀況及雲組等。"}, {"cat": "普通", "ch": 4, "n": 1, "q": "執行任務前及過程中，需確保成員不受哪種狀況影響？", "opts": ["娛樂圈八卦", "國內股市", "酒精及藥物", "世界經濟情勢"], "ans": "C", "exp": "須避免酒精及藥物影響操作能力。"}, {"cat": "普通", "ch": 4, "n": 2, "q": "下列哪種狀況也可能影響操作安全？", "opts": ["娛樂圈八卦", "一般成藥如抗組織胺或解除充血劑", "國內股市", "世界經濟情勢"], "ans": "B", "exp": "抗組織胺等成藥可能造成嗜睡、影響安全。"}, {"cat": "普通", "ch": 4, "n": 3, "q": "可能影響安全操作的因素主要有哪種狀況？", "opts": ["過度換氣、壓力、疲勞", "脫水、熱中暑", "酒精與藥物", "以上皆是"], "ans": "D", "exp": "生理心理各項狀況都可能影響操作。"}, {"cat": "普通", "ch": 4, "n": 4, "q": "過度換氣若無法控制，可能讓操作人進入哪個狀態？", "opts": ["神經緊張", "意識不清", "心情鬱悶", "懷疑心重"], "ans": "B", "exp": "過度換氣可能導致意識不清。"}, {"cat": "普通", "ch": 4, "n": 5, "q": "過度換氣的常見症狀有哪種狀況？", "opts": ["視界窄化、意識不清", "輕快暈眩、末稍刺痛", "對冷熱敏感、肌肉痙攣", "以上皆是"], "ans": "D", "exp": "上述皆為過度換氣症狀。"}, {"cat": "普通", "ch": 4, "n": 6, "q": "過度換氣的改善方法是哪種方式？", "opts": ["多閱讀聽音樂", "適當飲食", "使血中二氧化碳恢復正常", "擴展社交"], "ans": "C", "exp": "恢復血中 CO₂ 濃度即可改善。"}, {"cat": "普通", "ch": 4, "n": 7, "q": "最好的預防及矯治過度換氣方法是哪種方式？", "opts": ["讓呼吸正常、朝紙袋呼吸或大聲交談", "多閱讀聽音樂", "適當飲食", "擴展社交"], "ans": "A", "exp": "放慢呼吸、對紙袋呼吸或交談可提高 CO₂。"}, {"cat": "普通", "ch": 4, "n": 8, "q": "哪種狀況是人體對生理及心理需求所做出的反應？", "opts": ["脫水", "壓力", "熱中暑", "酒醉"], "ans": "B", "exp": "壓力是身心對需求的反應。"}, {"cat": "普通", "ch": 4, "n": 9, "q": "壓力源包括哪種狀況？", "opts": ["物理壓力(噪音振動)", "生理壓力(疲勞)", "心理壓力(工作情緒)", "以上皆是"], "ans": "D", "exp": "壓力源含物理、生理、心理。"}, {"cat": "普通", "ch": 4, "n": 10, "q": "持續性的急性壓力可能發展成哪種狀況？", "opts": ["不定期過度換氣壓力", "不定期疲勞壓力", "長期慢性壓力", "不定期酒精壓力"], "ans": "C", "exp": "急性壓力累積成慢性壓力。"}, {"cat": "普通", "ch": 4, "n": 11, "q": "慢性壓力長期累積或壓抑下，會導致哪種狀況？", "opts": ["能力大幅提升", "時好時壞", "能力大幅下滑", "保持不變"], "ans": "C", "exp": "慢性壓力使能力大幅下滑。"}, {"cat": "普通", "ch": 4, "n": 12, "q": "操作人若體驗到壓力導致能力下滑時應採取哪種作為？", "opts": ["暫停任務、適當休息", "堅持繼續", "順其自然", "邊聽音樂邊執行"], "ans": "A", "exp": "應暫停任務並適當休息。"}, {"cat": "普通", "ch": 4, "n": 13, "q": "狀況警覺是對哪些風險元素的認知與瞭解？", "opts": ["飛行作業", "操作人、航空器", "環境及任務種類", "以上皆是"], "ans": "D", "exp": "涵蓋作業、人、機、環境與任務。"}, {"cat": "普通", "ch": 4, "n": 14, "q": "哪種狀況可能使操作人過度集中於某事而失去整體掌握？", "opts": ["疲勞", "壓力", "工作量過多", "以上皆是"], "ans": "D", "exp": "疲勞、壓力、工作量過多都會造成注意力窄化。"}, {"cat": "普通", "ch": 4, "n": 15, "q": "藉哪些有效的工作量管理確保任務安全？", "opts": ["計畫", "整理", "排序工作任務", "以上皆是"], "ans": "D", "exp": "計畫、整理、排序皆為工作量管理。"}, {"cat": "普通", "ch": 4, "n": 16, "q": "疲勞可分為哪幾種？", "opts": ["生理性疲勞", "心理性疲勞", "急性與慢性疲勞", "以上皆是"], "ans": "D", "exp": "疲勞含生理、心理與急/慢性。"}, {"cat": "普通", "ch": 4, "n": 17, "q": "疲勞會導致哪幾種症狀影響判斷力？", "opts": ["注意力渙散", "專注力下降", "協調溝通降低", "以上皆是"], "ans": "D", "exp": "疲勞使注意、專注、協調溝通都下降。"}, {"cat": "普通", "ch": 4, "n": 18, "q": "急性疲勞通常是哪一種？", "opts": ["短期", "長期", "有時長有時短", "以上皆非"], "ans": "A", "exp": "急性疲勞為短期性。"}, {"cat": "普通", "ch": 4, "n": 19, "q": "若未及時改善急性疲勞，會進一步造成哪種狀況？", "opts": ["過度疲勞", "慢性疲勞", "中度疲勞", "低度疲勞"], "ans": "B", "exp": "急性疲勞未改善會轉為慢性疲勞。"}, {"cat": "普通", "ch": 4, "n": 20, "q": "慢性疲勞可能出現的症狀包括哪種狀況？", "opts": ["虛弱、強烈疲倦倦怠", "心悸、呼吸不順、頭痛", "身體不適及沮喪焦慮", "以上皆是"], "ans": "D", "exp": "上述皆為慢性疲勞可能症狀。"}, {"cat": "普通", "ch": 4, "n": 21, "q": "急性疲勞中，主要影響時機掌握混亂及視域過度聚焦的特殊情況稱為？", "opts": ["社會性疲勞", "經濟性疲勞", "技能疲勞", "教育性疲勞"], "ans": "C", "exp": "此為技能疲勞。"}, {"cat": "普通", "ch": 4, "n": 22, "q": "哪種狀況是身體組織水分不足？", "opts": ["脫水", "失眠", "低血糖", "缺氧"], "ans": "A", "exp": "水分不足即脫水。"}, {"cat": "普通", "ch": 4, "n": 23, "q": "哪種狀況可能造成水分補充不及導致脫水？", "opts": ["長時間高溫高溼高海拔", "心理壓力", "飲用過多刺激性飲料", "以上皆是"], "ans": "D", "exp": "上述皆可能導致脫水。"}, {"cat": "普通", "ch": 4, "n": 24, "q": "脫水最先出現的症狀是哪種狀況？", "opts": ["口乾", "舌燥", "較強的疲勞感", "以上皆是"], "ans": "D", "exp": "口乾、舌燥、疲勞感皆為初期症狀。"}, {"cat": "普通", "ch": 4, "n": 25, "q": "為避免脫水，應採取哪個動作？", "opts": ["隨時閱讀", "適時補充水分", "適時上廁所", "隨時聽音樂"], "ans": "B", "exp": "適時補充水分可避免脫水。"}, {"cat": "普通", "ch": 4, "n": 26, "q": "哪種狀況是指身體無法對體溫進行控制？", "opts": ["缺氧", "低血糖", "熱中暑", "失眠"], "ans": "C", "exp": "體溫調節失控為熱中暑。"}, {"cat": "普通", "ch": 4, "n": 27, "q": "熱中暑原因是哪種狀況？", "opts": ["身體的熱無法排出", "飲酒過量", "失眠", "低血糖"], "ans": "A", "exp": "體熱無法排出導致熱中暑。"}, {"cat": "普通", "ch": 4, "n": 28, "q": "避免熱中暑的方法是採取哪個動作？", "opts": ["勿飲酒過量", "充分睡眠", "規律攝取足量水份", "按時用餐"], "ans": "C", "exp": "規律補充足量水分可避免熱中暑。"}, {"cat": "普通", "ch": 4, "n": 29, "q": "服用哪種藥物可能產生暈眩或感知功能不全？", "opts": ["成藥", "抗組織胺", "解除充血劑", "以上皆是"], "ans": "D", "exp": "上述藥物皆可能造成暈眩或感知障礙。"}, {"cat": "普通", "ch": 4, "n": 30, "q": "酒精可能對哪種狀況造成影響？", "opts": ["影響操作判斷、難掌握環境", "協調性差、視界窄化", "降低邏輯與注意力", "以上皆是"], "ans": "D", "exp": "酒精影響判斷、協調、視野與注意力。"}, {"cat": "普通", "ch": 4, "n": 31, "q": "操作人應於哪個時機進行起飛前檢查？", "opts": ["每次操作前", "有明顯異狀時", "天氣變壞時", "感覺不對時"], "ans": "A", "exp": "每次操作前都應執行起飛前檢查。"}, {"cat": "普通", "ch": 4, "n": 32, "q": "起飛前檢查發現異常，應採取哪個動作？", "opts": ["忽略繼續操作", "立即修正確保安全", "記錄後繼續", "看任務重要與否"], "ans": "B", "exp": "發現異常應立即修正後再飛。"}, {"cat": "普通", "ch": 4, "n": 33, "q": "緊急落地可依類型區分為哪幾種？", "opts": ["迫降", "預防性緊急著陸", "水上迫降", "以上皆是"], "ans": "D", "exp": "含迫降、預防性緊急著陸與水上迫降。"}, {"cat": "普通", "ch": 4, "n": 34, "q": "平時沒熟悉緊急處置程序，面對緊急狀況時可能陷入哪種情境？", "opts": ["無人機即將墜地", "不會出事", "狀況自動消失", "自動處理"], "ans": "A", "exp": "未熟悉程序恐致無人機墜地。"}, {"cat": "普通", "ch": 4, "n": 35, "q": "發生異常或緊急事件時，穩定操作、掌握位置高度後，再採取哪個動作？", "opts": ["通報有關機關", "依檢查表啟閉裝備", "尋找最佳緊急落地處", "以上皆是"], "ans": "C", "exp": "穩定並掌握位置高度後，優先尋找最佳緊急落地處。"}, {"cat": "普通", "ch": 4, "n": 36, "q": "飛行決策著重於哪種決策方案？", "opts": ["學習決策方案", "評估決策方案", "選擇決策方案", "以上皆是"], "ans": "D", "exp": "含學習、評估與選擇決策方案。"}, {"cat": "普通", "ch": 4, "n": 37, "q": "風險管理透過哪個手段將危害降低到可接受程度？", "opts": ["迴避", "減少", "隔離", "以上皆是"], "ans": "D", "exp": "以迴避、減少、隔離等手段降低風險。"}, {"cat": "普通", "ch": 4, "n": 38, "q": "飛行決策應掌握哪個基本原則？", "opts": ["不接受非相關風險、設定合適層級", "獲益超過危害時接受風險", "將風險管理整合於各階段計畫", "以上皆是"], "ans": "D", "exp": "上述皆為風險管理基本原則。"}, {"cat": "普通", "ch": 4, "n": 39, "q": "哪種心態干擾會降低飛行決策品質？", "opts": ["反威權、衝動及僥倖", "衝動、僥倖及服從", "英雄主義及積極順應", "以上皆是"], "ans": "A", "exp": "反威權、衝動、僥倖等為危害心態(hazardous attitudes)。"}, {"cat": "普通", "ch": 4, "n": 40, "q": "降低風險的方法包括哪種？", "opts": ["辨識己身風險", "預知己身風險", "覺察己身風險", "以上皆是"], "ans": "D", "exp": "含辨識、預知與覺察風險。"}, {"cat": "普通", "ch": 4, "n": 41, "q": "哪個因素與飛安密切相關，成為維修及飛航管理關切焦點？", "opts": ["政治因素", "人為因素", "社會因素", "經濟因素"], "ans": "B", "exp": "人為因素為飛安關切焦點。"}, {"cat": "普通", "ch": 4, "n": 42, "q": "自動決策模式為反射性模式，形成的重要基礎是哪種方式？", "opts": ["大量訓練及經驗", "擴大參與人數", "正確政治指導", "高深哲學思想"], "ans": "A", "exp": "自動決策建立於大量訓練與經驗。"}, {"cat": "普通", "ch": 4, "n": 43, "q": "自動決策模式常用於哪種情況？", "opts": ["緊急情況", "無法預作分析", "無法沙盤推演", "以上皆是"], "ans": "D", "exp": "常用於緊急、無法預先分析或推演的情況。"}, {"cat": "專業", "ch": 1, "n": 1, "q": "遙控無人機如為不法份子作為犯罪工具或因不當操作而致失控墜落者，可能導致何種後果？", "opts": ["造成他人生命財產之損失", "危害公共利益", "影響飛航安全", "以上皆是"], "ans": "D", "exp": "失控墜落對地面人員財產、公共利益與飛航安全都可能造成危害，故選以上皆是。"}, {"cat": "專業", "ch": 1, "n": 2, "q": "市面上遙控無人機類型繁多，為保障操作安全，操作人於購買時應留意產品何項資訊？", "opts": ["使用限制", "操作性能", "保固範圍", "以上皆是"], "ans": "D", "exp": "使用限制、性能、保固都與安全操作相關，購買前均應留意。"}, {"cat": "專業", "ch": 1, "n": 3, "q": "遙控無人機之註冊、針對操作人員進行教育宣導及操作範圍警示之規定，係為達到哪個目的？", "opts": ["刁難操作人員", "打擊遙控無人機市場", "安全使用", "以上皆是"], "ans": "C", "exp": "各項管理規定目的在於「安全使用」，而非刁難或打擊市場。"}, {"cat": "專業", "ch": 1, "n": 4, "q": "操作證考取目的係為確保操作人於哪個階段能熟悉相關航空知識與管理規範，並具備一定操作熟練度及緊急處置能力？", "opts": ["操作前及操作時", "操作前及操作後", "操作前", "操作後"], "ans": "A", "exp": "考照要確保操作人在「操作前」有知識、「操作時」有熟練度與緊急應變能力。"}, {"cat": "專業", "ch": 1, "n": 5, "q": "外國人領有外國政府對於所持有遙控無人機之註冊、操作證及檢驗合格等證明文件者，必須向哪個單位申請認可後，於遵守我國相關法令下從事遙控無人機活動？", "opts": ["外交部", "駐外單位", "民航局", "科技部"], "ans": "C", "exp": "遙控無人機主管機關為民航局，外國證照認可也向民航局申請。"}, {"cat": "專業", "ch": 1, "n": 6, "q": "操作人僅透過遙控無人機即時傳輸圖像功能，是否即足以監控鏡頭外之周遭狀況？", "opts": ["否", "是", "視傳輸圖像清晰度而定", "視天氣狀況而定"], "ans": "A", "exp": "圖傳只能看到鏡頭視野內，鏡頭外的人車障礙看不到，故不足以掌握周遭，仍須目視。"}, {"cat": "專業", "ch": 1, "n": 7, "q": "操作人不得利用遙控無人機從事哪種行為？", "opts": ["合法行為", "非法行為", "適法行為", "法定行為"], "ans": "B", "exp": "不得作為犯罪或其他非法行為之工具。"}, {"cat": "專業", "ch": 1, "n": 8, "q": "操作人不得無故利用遙控無人機對他人進行何種行為？", "opts": ["攝錄非公開活動", "竊聽私下談話", "窺視身體隱私部位", "以上皆是"], "ans": "D", "exp": "涉及隱私之攝錄、竊聽、窺視皆不得為之，屬妨害隱私。"}, {"cat": "專業", "ch": 1, "n": 9, "q": "操作人未經同意，不得以遙控無人機對他人進行何種行為？", "opts": ["錄音", "照相、錄影", "電磁紀錄竊錄", "以上皆是"], "ans": "D", "exp": "未經同意之錄音、錄影、竊錄皆侵害他人權利，均不得為之。"}, {"cat": "專業", "ch": 1, "n": 10, "q": "操作人不得無故利用遙控無人機於哪個場所進行飛航活動？", "opts": ["私人庭院", "學校教室", "辦公室場所", "以上皆是"], "ans": "D", "exp": "這些皆屬他人私密或非公開空間，無故飛入侵害隱私。"}, {"cat": "專業", "ch": 1, "n": 11, "q": "遙控無人機於空中進行飛航活動時，易伴隨較高之何種風險？", "opts": ["文化風險", "健康風險", "社會風險", "貿易風險"], "ans": "C", "exp": "墜落傷人、侵犯隱私等屬對社會公眾之風險，故為社會風險。"}, {"cat": "專業", "ch": 1, "n": 12, "q": "對違反規範之遙控無人機操作人及所有人所為之處罰，係欲達到哪個目的？", "opts": ["維持社會秩序", "增進公共利益", "維護公共安全", "以上皆是"], "ans": "D", "exp": "處罰目的兼具維持秩序、增進公益與維護公共安全。"}, {"cat": "專業", "ch": 1, "n": 13, "q": "針對違反規範之遙控無人機操作人及所有人所處以罰鍰額度，係衡量何種因素而定？", "opts": ["公眾利益及安全財產危害程度", "政府稅收及國家經濟指數", "國力強弱及世界局勢", "教育程度及人民素質等"], "ans": "A", "exp": "罰鍰輕重依對公眾利益、安全與財產的危害程度而定。"}, {"cat": "專業", "ch": 1, "n": 14, "q": "操作人於遵守相關規範下從事屬休閒娛樂性質之遙控無人機活動，其活動風險以何種管理方式為主？", "opts": ["財政管理", "自我管理", "衛生管理", "健康管理"], "ans": "B", "exp": "休閒娛樂用途以操作人「自我管理」為主。"}, {"cat": "專業", "ch": 1, "n": 15, "q": "為法人從事業務之遙控無人機操作人，依法須強制加入何種保險？", "opts": ["積水險", "責任險", "地震險", "颱風險"], "ans": "B", "exp": "政府機關、學校或法人執行業務飛行，須依法投保「責任保險」。"}, {"cat": "專業", "ch": 1, "n": 16, "q": "遙控無人機定義為何？", "opts": ["自遙控設備以信號鏈路進行飛航控制之無人航空器", "自遙控設備以自動駕駛操作之無人航空器", "其他經民航局公告之無人航空器", "以上皆是"], "ans": "D", "exp": "定義涵蓋信號鏈路控制、自動駕駛及民航局公告之各類無人航空器，故選以上皆是。"}, {"cat": "專業", "ch": 1, "n": 17, "q": "某遙控無人機操作人欲代地方農會執行農藥噴灑作業，以下敘述何者正確？", "opts": ["該操作人須通過學、術科測驗", "該操作人不須通過術科測驗", "執行農藥噴灑作業前不需經申請核准", "以上皆是"], "ans": "A", "exp": "農噴屬專業用途，須通過學科與術科測驗，且執行前須申請核准。"}, {"cat": "專業", "ch": 1, "n": 18, "q": "於何處進行遙控無人機飛航活動適用民用航空法之「遙控無人機」相關規定？", "opts": ["建築物內密閉空間", "建築物外開放空間", "任何空間", "以上皆非"], "ans": "B", "exp": "民航法規範的是室外開放空間的飛航；室內密閉空間不屬其適用範圍。"}, {"cat": "專業", "ch": 1, "n": 19, "q": "遙控無人機活動期間，其所有人或操作人應負責任為何？", "opts": ["使用安全之責", "風險管理之責", "法規遵循之責", "以上皆是"], "ans": "D", "exp": "所有人與操作人須負安全、風險管理與守法之責。"}, {"cat": "專業", "ch": 1, "n": 20, "q": "有關遙控無人機飛航活動，下列敘述何者正確？", "opts": ["未經許可不得飛航於禁航區", "可任意飛航於限航區", "航空站四周之一定距離範圍內飛航無相關規定", "以上皆是"], "ans": "A", "exp": "禁航區未經許可不得飛入；限航區受限制、航空站四周有距離規定，故僅A正確。"}, {"cat": "專業", "ch": 1, "n": 21, "q": "航空站或飛行場四周之一定距離範圍係由哪個機關進行公告？", "opts": ["民航局", "衛福部", "內政部", "文化部"], "ans": "A", "exp": "航空站四周距離範圍由主管機關民航局公告。"}, {"cat": "專業", "ch": 1, "n": 22, "q": "直轄市、縣（市）政府依民航法第 99 條之 13 第 2 項所規範之區域內，得依公益及安全需要，進行哪些項目之公告？", "opts": ["遙控無人機活動區域", "遙控無人機活動時間", "其他管理事項", "以上皆是"], "ans": "D", "exp": "地方政府得公告活動區域、時間及其他管理事項。"}, {"cat": "專業", "ch": 1, "n": 23, "q": "中央主管機關認有禁止或限制遙控無人機飛航活動需求者，得提請所在地哪個機關進行公告？", "opts": ["鄉鎮區公所", "直轄市、縣（市）政府", "地方派出所", "地方農會"], "ans": "B", "exp": "由中央提請所在地之直轄市、縣（市）政府公告禁限航。"}, {"cat": "專業", "ch": 1, "n": 24, "q": "政府機關（構）、學校或法人因執行業務需於禁、限航區及航空站或飛行場四周一定距離範圍內從事遙控無人機飛航活動者，應申請何者會商目的事業主管機關同意後，始得為之？", "opts": ["鄉鎮區公所", "衛福部", "民航局", "科技部"], "ans": "C", "exp": "屬中央主管機關公告之禁限區與航空站範圍，向民航局申請並會商目的事業主管機關。"}, {"cat": "專業", "ch": 1, "n": 25, "q": "政府機關（構）、學校或法人因執行業務需於直轄市、縣（市）政府所公告之遙控無人機活動區域、時間及其他管理事項外從事飛航活動者，應申請何者會商相關中央主管機關同意後，始得為之？", "opts": ["直轄市、縣（市）政府", "衛福部", "農委會", "交通部"], "ans": "A", "exp": "屬地方政府公告事項，向該直轄市、縣（市）政府申請並會商中央。"}, {"cat": "專業", "ch": 1, "n": 26, "q": "遙控無人機未經同意飛入禁航區、限航區，得由何者採取適當措施予以制止或排除？", "opts": ["交通警察大隊", "禁航區、限航區之管理人", "鄉鎮區公所", "地方派出所"], "ans": "B", "exp": "由該禁限航區之管理人採取適當措施制止或排除。"}, {"cat": "專業", "ch": 1, "n": 27, "q": "遙控無人機未經同意飛入航空站或飛行場四周之一定距離範圍內者，航空站、飛行場之經營人或管理人得會同何者予以取締？", "opts": ["當地里長", "地方派出所", "航空警察局", "交通警察大隊"], "ans": "C", "exp": "航空站範圍由經營／管理人會同「航空警察局」取締。"}, {"cat": "專業", "ch": 1, "n": 28, "q": "遙控無人機未經同意飛入直轄市、縣（市）政府所公告之活動區域、時間及其他管理事項外者，得由何者進行取締？", "opts": ["直轄市、縣（市）政府", "鄉鎮區公所", "地方派出所", "衛福部"], "ans": "A", "exp": "屬地方公告事項，由該直轄市、縣（市）政府取締。"}, {"cat": "專業", "ch": 1, "n": 29, "q": "從事休閒娛樂用途之遙控無人機活動，其飛航實際高度不得逾距地面或水面多少高度？", "opts": ["800 呎", "400 呎", "200 呎", "100 呎"], "ans": "B", "exp": "法定上限為距地／水面 400 呎（約 120 公尺）。"}, {"cat": "專業", "ch": 1, "n": 30, "q": "從事遙控無人機飛航活動，非經民航局核准不得執行下列何者行為？", "opts": ["以信號鏈路進行飛航控制", "以自動駕駛操作", "投擲或噴灑任何物件", "其他經民航局同意之操作"], "ans": "C", "exp": "投擲或噴灑物件屬須經民航局核准之特殊操作。"}, {"cat": "專業", "ch": 1, "n": 31, "q": "從事遙控無人機飛航活動，不得裝載哪種物品？", "opts": ["光學酬載", "飛航所需燃油或電池", "民用航空法所公告之危險物品", "調整重心所需之配重塊"], "ans": "C", "exp": "不得裝載民用航空法所公告之危險物品。"}, {"cat": "專業", "ch": 1, "n": 32, "q": "哪個機關負責訂定從事遙控無人機飛航活動所應遵守之規範？", "opts": ["衛福部", "交通部", "內政部", "文化部"], "ans": "B", "exp": "民用航空之主管機關為交通部（民航局為其所屬）。"}, {"cat": "專業", "ch": 1, "n": 33, "q": "從事休閒娛樂用途之遙控無人機不得於下列哪個區域進行飛航活動？", "opts": ["人群聚集或室外集會遊行上空", "經地方政府同意開放無人機活動之公園綠地", "經地方政府同意開放無人機活動之人煙稀少區", "經地方政府同意開放無人機活動之河灘地"], "ans": "A", "exp": "禁止於人群聚集或室外集會遊行上空飛航，以免墜落傷人。"}, {"cat": "專業", "ch": 1, "n": 34, "q": "從事休閒娛樂用途之遙控無人機不得於下列哪個時間進行飛航活動？", "opts": ["日落後至日出前", "日出後", "正中午", "無特別規定"], "ans": "A", "exp": "夜間（日落後至日出前）能見度差，禁止休閒娛樂飛行。"}, {"cat": "專業", "ch": 1, "n": 35, "q": "操作人於從事休閒娛樂用途之遙控無人機飛航活動時，最多得同時控制幾架遙控無人機？", "opts": ["1 架", "2 架", "5 架", "10 架以上"], "ans": "A", "exp": "休閒娛樂用途一次僅能操作 1 架。"}, {"cat": "專業", "ch": 1, "n": 36, "q": "操作人於從事遙控無人機飛航活動期間，應留意下列何者？", "opts": ["遙控無人機之販售包裝", "遙控無人機之外觀造型", "遙控無人機飛航及其周遭狀況", "以上皆非"], "ans": "C", "exp": "操作人須全程留意無人機飛航與其周遭狀況。"}, {"cat": "專業", "ch": 1, "n": 37, "q": "從事遙控無人機飛航活動時，應防止其與何者之接近或碰撞？", "opts": ["其他航空器", "建築物", "人群", "以上皆是"], "ans": "D", "exp": "須防止與其他航空器、建築物及人群接近或碰撞。"}, {"cat": "專業", "ch": 1, "n": 38, "q": "政府機關（構）、學校或法人欲執行遙控無人機法規所訂之操作限制者，得檢附相關文書並向下列何者申請核准後為之？", "opts": ["直轄市、縣（市）政府", "民航局", "警察機關", "衛福部"], "ans": "B", "exp": "解除操作限制（如夜航、超高、投擲等）之核准由民航局為之。"}, {"cat": "專業", "ch": 1, "n": 39, "q": "政府機關（構）、學校或法人經民航局核准得於「人群聚集或室外集會遊行上空」進行飛航活動者，其活動場地部分仍應取得何者之同意？", "opts": ["直轄市、縣（市）政府及相關中央主管機關", "直轄市、縣（市）政府", "相關中央主管機關", "當地派出所"], "ans": "A", "exp": "場地部分仍須取得地方政府及相關中央主管機關同意。"}, {"cat": "專業", "ch": 1, "n": 40, "q": "操作遙控無人機發生下列哪種情形時，遙控無人機所有人應負賠償責任？", "opts": ["故意致他人死傷", "過失致他人死傷", "故意或過失毀損他人財物", "以上皆是"], "ans": "D", "exp": "不論故意或過失，致人死傷或毀損財物均應負賠償責任。"}, {"cat": "專業", "ch": 1, "n": 41, "q": "遙控無人機所有人將其遙控無人機交由他人進行操作而不慎墜落傷人，應由何人負連帶賠償責任？", "opts": ["所有人及旁觀人", "所有人及設計者", "所有人及操作人", "所有人及製造者"], "ans": "C", "exp": "由「所有人及操作人」負連帶賠償責任。"}, {"cat": "專業", "ch": 1, "n": 42, "q": "政府機關（構）、學校或法人於從事民航局核准之遙控無人機飛航活動前，應依法投保責任保險，係依據何法所定之內容？", "opts": ["保險法", "民用航空法", "民法", "勞動基準法"], "ans": "B", "exp": "投保責任保險之規定依「民用航空法」。"}, {"cat": "專業", "ch": 1, "n": 43, "q": "遙控無人機所有人或操作人違反「禁航區、限航區及航空站或飛行場四周之一定距離範圍內從事飛航活動」之相關規定者，民航局除廢止其操作證並得沒入遙控無人機外，另處多少新臺幣之罰鍰？", "opts": ["3 萬元以上 18 萬元以下", "5 萬元以上 28 萬元以下", "10 萬元以上 48 萬元以下", "30 萬元以上 150 萬元以下"], "ans": "D", "exp": "此為最重違規態樣，罰鍰 30 萬～150 萬元。"}, {"cat": "專業", "ch": 1, "n": 44, "q": "遙控無人機所有人或操作人違反「不得逾距地面或水面高度 400 呎從事飛航活動」之規定者，民航局除廢止其操作證並得沒入遙控無人機外，另處多少新臺幣之罰鍰？", "opts": ["30 萬元以上 150 萬元以下", "1 萬元以上 10 萬元以下", "20 萬元以上 50 萬元以下", "5 萬元以上 30 萬元以下"], "ans": "A", "exp": "逾 400 呎高度限制，罰鍰 30 萬～150 萬元。"}, {"cat": "專業", "ch": 1, "n": 45, "q": "遙控無人機之所有人或操作人違反「未領有操作證而操作遙控無人機」之規定者，除禁止其活動，情節重大者並得沒入遙控無人機外，另處多少新臺幣之罰鍰？", "opts": ["1 萬元以上 8 萬元以下", "3 萬元以上 18 萬元以下", "6 萬元以上 30 萬元以下", "8 萬元以上 38 萬元以下"], "ans": "C", "exp": "無照操作罰鍰 6 萬～30 萬元。"}, {"cat": "專業", "ch": 1, "n": 46, "q": "遙控無人機之所有人或操作人違反「未投保或未足額投保責任保險而從事遙控無人機活動」之規定者，除禁止其活動，情節重大者並得沒入遙控無人機外，另處多少新臺幣之罰鍰？", "opts": ["6 萬元以上 30 萬元以下", "3 萬元以上 20 萬元以下", "1 萬元以上 8 萬元以下", "8 萬元以上 50 萬元以下"], "ans": "A", "exp": "未（足額）投保責任保險罰鍰 6 萬～30 萬元。"}, {"cat": "專業", "ch": 1, "n": 47, "q": "遙控無人機之所有人或操作人違反「遙控無人機註冊或標明註冊號碼」之相關規定者，除禁止其活動，情節重大者並得沒入遙控無人機外，另處多少新臺幣之罰鍰？", "opts": ["10 萬元以上 48 萬元以下", "8 萬元以上 38 萬元以下", "5 萬元以上 28 萬元以下", "3 萬元以上 15 萬元以下"], "ans": "D", "exp": "註冊或標明號碼違規罰鍰 3 萬～15 萬元。"}, {"cat": "專業", "ch": 1, "n": 48, "q": "遙控無人機之所有人或操作人違反「直轄市、縣（市）政府公告之區域、時間及其他管理事項」之相關規定者，除禁止其活動，情節重大者並得沒入遙控無人機外，另處多少新臺幣之罰鍰？", "opts": ["3 萬元以上 15 萬元以下", "5 萬元以上 28 萬元以下", "8 萬元以上 38 萬元以下", "15 萬元以上 30 萬元以下"], "ans": "A", "exp": "違反地方政府公告事項罰鍰 3 萬～15 萬元。"}, {"cat": "專業", "ch": 1, "n": 49, "q": "遙控無人機之所有人或操作人違反「遙控無人機飛航活動應遵守之規定」者，除禁止其活動，情節重大者並得沒入遙控無人機外，另處多少新臺幣之罰鍰？", "opts": ["10 萬元以上 48 萬元以下", "8 萬元以上 38 萬元以下", "5 萬元以上 28 萬元以下", "3 萬元以上 15 萬元以下"], "ans": "D", "exp": "違反飛航活動應遵守規定罰鍰 3 萬～15 萬元。"}, {"cat": "專業", "ch": 1, "n": 50, "q": "違反「射頻識別、檢驗、認可、維修與檢查、飛航活動之活動許可及內容、製造者與進口者之登錄及責任、飛航安全相關事件之通報等事項」規定者，除禁止其活動，情節重大者並得沒入遙控無人機外，另處多少新臺幣之罰鍰？", "opts": ["1 萬元以上 150 萬元以下", "5 萬元以上 498 萬元以下", "8 萬元以上 798 萬元以下", "10 萬元以上 998 萬元以下"], "ans": "A", "exp": "射頻識別、檢驗、登錄、通報等事項違規罰鍰 1 萬～150 萬元。"}, {"cat": "專業", "ch": 1, "n": 51, "q": "遙控無人機和遙控設備間為操作飛行管理目的之資料鏈接，稱之？", "opts": ["網路鏈路", "通訊及控制信號鏈路", "電信鏈路", "光纖鏈路"], "ans": "B", "exp": "此連結稱「通訊及控制信號鏈路」（C2 link）。"}, {"cat": "專業", "ch": 1, "n": 52, "q": "計算遙控無人機之最大起飛重量(MTOW)，應包含下列哪些重量？", "opts": ["機體", "燃料、電池", "負載設備、酬載", "以上皆是"], "ans": "D", "exp": "MTOW 含機體、能源（燃料／電池）及負載、酬載之總和。"}, {"cat": "專業", "ch": 1, "n": 53, "q": "依據法規定義，於遙控無人機飛航活動期間，實際操控遙控無人機或指揮監督飛航活動之人員稱之？", "opts": ["目視觀察員", "遙控無人機操作人", "任務協調員", "以上皆非"], "ans": "B", "exp": "此人即「操作人」。"}, {"cat": "專業", "ch": 1, "n": 54, "q": "依據法規定義，持有遙控無人機操作證並於遙控無人機活動期間，提供實際操控遙控無人機操作人必要飛航資訊之人員稱之？", "opts": ["設計者", "目視觀察員", "製造者", "遙控無人機所有人"], "ans": "B", "exp": "活動期間提供操作人必要飛航資訊者為「目視觀察員」。"}, {"cat": "專業", "ch": 1, "n": 55, "q": "遙控無人機依其構造可分為哪幾種？", "opts": ["無人飛機", "無人直昇機", "無人多旋翼機", "以上皆是"], "ans": "D", "exp": "依構造分為無人飛機、無人直昇機、無人多旋翼機。"}, {"cat": "專業", "ch": 1, "n": 56, "q": "無人多旋翼機具有幾個以上之垂直傳動軸？", "opts": ["2 個以上", "3 個以上", "4 個以上", "6 個以上"], "ans": "B", "exp": "多旋翼機定義為 3 個以上垂直傳動軸。"}, {"cat": "專業", "ch": 1, "n": 57, "q": "何人應負飛航安全之責，對遙控無人機為妥善之維護，並從事安全飛航作業？", "opts": ["遙控無人機所有人及操作人", "遙控無人機設計者", "遙控無人機製造者", "遙控無人機改裝者"], "ans": "A", "exp": "維護與安全飛航之責在於所有人及操作人。"}, {"cat": "專業", "ch": 1, "n": 58, "q": "若遙控無人機飛航活動涉及 2 位以上之操作者，下列敘述何者正確？", "opts": ["應指定 1 人為決定權人，使得從事飛航活動", "不須指定決定權人即可從事飛航活動", "是否指定決定權人視任務性質而定", "以上皆非"], "ans": "A", "exp": "2 人以上操作時，須指定 1 人為決定權人才可從事飛航。"}, {"cat": "專業", "ch": 1, "n": 59, "q": "下列何者較適合做為遙控無人機註冊號碼之標明處所？", "opts": ["起落架上", "螺旋槳面上", "機身未遮蔽之平整面上", "電池蓋上"], "ans": "C", "exp": "應標於機身未遮蔽、平整、易辨識處。"}, {"cat": "專業", "ch": 1, "n": 60, "q": "註冊號碼應以標籤、鐫刻、噴漆或其他能辨識之方式標明，並於每次飛航時符合下列何項要求？", "opts": ["確保不至脫落", "保持清潔", "能明顯辨識", "以上皆是"], "ans": "D", "exp": "須不脫落、清潔且能明顯辨識。"}, {"cat": "專業", "ch": 1, "n": 61, "q": "遙控無人機註冊號碼之標漆位置依法應位於何處？", "opts": ["固定結構內部", "固定結構外部", "轉動機構外部", "轉動機構內部"], "ans": "B", "exp": "應標於「固定結構外部」，不可標在會轉動的部件上。"}, {"cat": "專業", "ch": 1, "n": 62, "q": "註冊號碼之顏色應以肉眼即能辨識，並應符合下列何項要求？", "opts": ["融入背景顏色", "與背景顏色相近", "與背景明顯反襯", "無特別規定"], "ans": "C", "exp": "註冊號碼顏色須與背景明顯反襯，肉眼可辨。"}, {"cat": "專業", "ch": 1, "n": 63, "q": "有關遙控無人機註冊號碼之使用，下列何者正確？", "opts": ["不得偽造", "不得變造", "不得矇領", "以上皆是"], "ans": "D", "exp": "註冊號碼不得偽造、變造或矇領。"}, {"cat": "專業", "ch": 1, "n": 64, "q": "有關遙控無人機註冊號碼之使用，下列何者正確？", "opts": ["不得於任何未註冊之遙控無人機上使用", "可於他人未註冊之遙控無人機上使用", "可於自己所有未註冊之遙控無人機上使用", "使用狀況視遙控無人機型式而定"], "ans": "A", "exp": "註冊號碼不得使用於任何未註冊之無人機。"}, {"cat": "專業", "ch": 1, "n": 65, "q": "最大起飛重量超過一定重量之遙控無人機應具有射頻識別功能，其一定重量，係由下列哪個機關公告之？", "opts": ["衛福部", "內政部", "科技部", "民航局"], "ans": "D", "exp": "試飛活動向民航局申請。"}, {"cat": "專業", "ch": 1, "n": 66, "q": "遙控無人機之設計、製造、改裝，可由何者提出型式檢驗申請？", "opts": ["設計者", "製造者", "改裝者", "以上皆可"], "ans": "D", "exp": "設計者、製造者、改裝者均可申請型式檢驗。"}, {"cat": "專業", "ch": 1, "n": 67, "q": "遙控無人機之設計、製造、改裝，應檢附申請書向哪個機關申請型式檢驗？", "opts": ["民航局", "衛福部", "內政部", "科技部"], "ans": "A", "exp": "向民航局申請實體檢驗。"}, {"cat": "專業", "ch": 1, "n": 68, "q": "自國外進口之遙控無人機，應由何者依規定向民航局申請型式檢驗？", "opts": ["操作人", "所有人", "進口者", "設計者"], "ans": "C", "exp": "進口者負責向民航局申請型式檢驗。"}, {"cat": "專業", "ch": 1, "n": 69, "q": "遙控無人機於設計、製造、改裝階段為驗證性能諸元所需之試飛，應檢附文件向哪個機關申請試飛活動？", "opts": ["衛福部", "內政部", "科技部", "民航局"], "ans": "D", "exp": "試飛活動向民航局申請。"}, {"cat": "專業", "ch": 1, "n": 70, "q": "最大起飛重量 25 公斤以上之遙控無人機，為確保其符合設計、製造、改裝之性能諸元，應由何者提出實體檢驗申請？", "opts": ["操作人", "所有人", "設計者", "製造者"], "ans": "B", "exp": "由所有人提出實體檢驗申請（管理規則所定）。"}, {"cat": "專業", "ch": 1, "n": 71, "q": "最大起飛重量 25 公斤以上之遙控無人機，為確保其符合設計、製造、改裝之性能諸元，應向哪個機關申請實體檢驗？", "opts": ["民航局", "衛福部", "內政部", "科技部"], "ans": "A", "exp": "向民航局申請實體檢驗。"}, {"cat": "專業", "ch": 1, "n": 72, "q": "自行製造、使用之最大起飛重量 25 公斤以上遙控無人機，何人可提出合併型式檢驗及實體檢驗之申請？", "opts": ["製造者", "操作人", "所有人", "設計者"], "ans": "C", "exp": "自製自用者以「所有人」身分申請合併檢驗。"}, {"cat": "專業", "ch": 1, "n": 73, "q": "自行製造、使用之最大起飛重量 25 公斤以上遙控無人機，可向哪個機關提出合併型式檢驗及實體檢驗之申請？", "opts": ["內政部", "民航局", "科技部", "衛福部"], "ans": "B", "exp": "向民航局申請。"}, {"cat": "專業", "ch": 1, "n": 74, "q": "實體檢驗合格證或特種實體檢驗合格證之記載事項如有變更時，下列敘述何者正確？", "opts": ["製造者應於事實發生日起 15 日內申請換發", "設計者應於事實發生日起 10 日內申請換發", "操作人應於事實發生日起 7 日內申請換發", "所有人應於事實發生日起 15 日內申請換發"], "ans": "D", "exp": "由所有人於事實發生日起 15 日內申請換發。"}, {"cat": "專業", "ch": 1, "n": 75, "q": "有關遙控無人機製造者與進口者申請產品資訊登錄時機，下列敘述何者正確？", "opts": ["販售或進口前", "販售或進口時", "販售或進口後", "以上皆可"], "ans": "A", "exp": "應於「販售或進口前」完成產品資訊登錄。"}, {"cat": "專業", "ch": 1, "n": 76, "q": "遙控無人機製造者與進口者應向哪個機關申請產品資訊登錄？", "opts": ["內政部", "科技部", "民航局", "經濟部"], "ans": "C", "exp": "向民航局登錄。"}, {"cat": "專業", "ch": 1, "n": 77, "q": "最大起飛重量 25 公斤以上之遙控無人機因系統設計、製造或改裝缺失而致有不安全情況時，下列何者為非？", "opts": ["設計者應針對該缺失採取補正措施", "製造者應針對該缺失採取補正措施", "改裝者應針對該缺失採取補正措施", "無須採取任何補正措施"], "ans": "D", "exp": "有不安全情況時各相關者均須補正，故「無須採取任何補正措施」為錯誤。"}, {"cat": "專業", "ch": 1, "n": 78, "q": "操作政府機關（構）、學校或法人所有遙控無人機之操作人應持有民航局發給之何種證照，始得操作？", "opts": ["機師檢定證", "操作證", "維修檢定證", "鑑定合格證"], "ans": "B", "exp": "須持民航局核發之「操作證」。"}, {"cat": "專業", "ch": 1, "n": 79, "q": "有關遙控無人機操作證之分類，下列何者為非？", "opts": ["暫時操作證", "普通操作證", "專業操作證", "學習操作證"], "ans": "A", "exp": "操作證分普通、專業、學習三類；無「暫時操作證」。"}, {"cat": "專業", "ch": 1, "n": 80, "q": "自然人欲以遙控無人機從事休閒娛樂用途，下列有關考照需求敘述何者正確？", "opts": ["操作 10 公斤且裝置導航設備之遙控無人機不需考照", "操作未達 2 公斤之遙控無人機不須考照", "操作 15 公斤以上之遙控無人機僅需通過學科測驗", "操作未達 2 公斤之遙控無人機須通過學科測驗"], "ans": "B", "exp": "休閒娛樂用途，最大起飛重量未達 2 公斤者免考照。"}, {"cat": "專業", "ch": 1, "n": 81, "q": "申請遙控無人機專業操作證者，其術科測驗應於學科測驗通過日起多久內完成，否則應重新申請學科測驗？", "opts": ["3 個月內", "6 個月內", "9 個月內", "1 年內"], "ans": "D", "exp": "術科須於學科通過日起 1 年內完成。"}, {"cat": "專業", "ch": 1, "n": 82, "q": "操作人從事遙控無人機活動，應於何時依製造者所提供之維修指引對遙控無人機系統進行檢查，以符合安全飛航條件後始得活動？", "opts": ["應於飛航活動前執行", "應於飛航活動後執行", "應於飛航活動中執行", "任何時間均可執行"], "ans": "A", "exp": "應於每次飛航活動前依維修指引檢查，確認安全飛航條件。"}, {"cat": "專業", "ch": 1, "n": 83, "q": "操作人從事遙控無人機飛航活動前，下列何者非為主要考量因素？", "opts": ["氣象條件", "空域、飛航限制", "其他空中或地面之危害因素", "操作者家庭狀況"], "ans": "D", "exp": "操作者家庭狀況與飛航安全無關，非主要考量因素。"}, {"cat": "專業", "ch": 1, "n": 84, "q": "有關操作人欲於載具上操作遙控無人機以進行飛航活動，下列敘述何者錯誤？", "opts": ["可於固定之導控站上操作", "可於固定之車輛上操作", "可於移動中之航空器上操作", "可於固定之船艦上操作"], "ans": "C", "exp": "不得於移動中之航空器上操作，故該敘述錯誤。"}, {"cat": "專業", "ch": 1, "n": 85, "q": "哪些單位應檢附文件向民航局申請核准後，始得從事遙控無人機飛航活動？", "opts": ["政府機關（構）", "學校", "法人", "以上皆是"], "ans": "D", "exp": "政府機關、學校、法人執行業務飛航均須向民航局申請核准。"}, {"cat": "專業", "ch": 1, "n": 86, "q": "政府機關（構）、學校或法人欲於直轄市、縣（市）政府公告之禁止、限制區域內從事遙控無人機飛航活動者，應至少於活動日前多久檢附計畫書提出申請？", "opts": ["30 日前", "20 日前", "15 日前", "10 日前"], "ans": "C", "exp": "至少於活動日前 15 日檢附計畫書申請。"}, {"cat": "專業", "ch": 1, "n": 87, "q": "最大起飛重量 2 公斤以上且裝置導航設備之遙控無人機遭受實質損害或失蹤時，所有人或操作人應於發生或得知消息後多久內填具飛航安全相關事件報告表通報民航局？", "opts": ["6 小時內", "12 小時內", "24 小時內", "48 小時內"], "ans": "C", "exp": "接近或碰撞事故亦應於 24 小時內通報。"}, {"cat": "專業", "ch": 1, "n": 88, "q": "當遙控無人機發生與其他航空器或障礙物接近或碰撞之事故時，所有人或操作人應於發生或得知消息後多久內填具飛航安全相關事件報告表通報民航局？", "opts": ["6 小時內", "12 小時內", "24 小時內", "48 小時內"], "ans": "C", "exp": "接近或碰撞事故亦應於 24 小時內通報。"}, {"cat": "專業", "ch": 1, "n": 89, "q": "當發生遙控無人機飛航安全相關事件時，民航局針對操作人可採取哪項措施？", "opts": ["得逕為暫停其操作或飛航活動", "經操作人同意後，得暫停其操作或飛航活動", "經所在地方政府同意後，得暫停其操作或飛航活動", "需待調查結束後並經操作人同意，使得暫停其操作或飛航活動"], "ans": "A", "exp": "民航局得逕行（不待同意）暫停其操作或飛航活動。"}, {"cat": "專業", "ch": 1, "n": 90, "q": "根據「遙控無人機管理規則」內容，各項申請及通報作業可透過何處以電子化方式為之？", "opts": ["地方政府所建置之資訊系統", "民航局所指定之資訊系統", "財政部所建置資訊系統", "經濟部所建置資訊系統"], "ans": "B", "exp": "各項申請及通報透過民航局指定之資訊系統辦理。"}, {"cat": "專業", "ch": 1, "n": 91, "q": "遙控無人機經型式檢驗合格後，除因改裝需重新辦理檢驗及註冊異動外，是否需再辦理定期檢驗？", "opts": ["仍需再辦理定期檢驗", "無需再辦理定期檢驗", "操作人認為有需要則應再辦理定期檢驗", "所有人認為有需要則應再辦理定期檢驗"], "ans": "B", "exp": "型式檢驗合格後，除改裝需重驗及註冊異動外，無需再辦定期檢驗。"}, {"cat": "專業", "ch": 1, "n": 92, "q": "遙控無人機於發生飛航安全相關事件後，何人應負責進行通報？", "opts": ["僅有所有人", "僅有操作人", "所有人或操作人", "操作人之親屬"], "ans": "C", "exp": "飛安相關事件之通報，由所有人或操作人負責。"}, {"cat": "專業", "ch": 1, "n": 93, "q": "操作人未經獲准從事視距外之遙控無人機飛航活動，除不得使用矯正鏡片外之任何工具做延伸視距飛航外，另須遵守哪項飛航範圍限制？", "opts": ["須於信號鏈路有效範圍內操作", "須於目視範圍內操作", "須於自動駕駛有效範圍內操作", "須於安全油量範圍內操作"], "ans": "B", "exp": "未獲准視距外飛航者，須於目視範圍內操作，且不得以工具（矯正鏡片除外）延伸視距。"}, {"cat": "專業", "ch": 1, "n": 94, "q": "有關政府機關（構）、學校或法人欲執行獲民航局許可之遙控無人機飛航任務，下列敘述何者正確？", "opts": ["飛航任務後應向民航局申請該次活動許可", "飛航任務時應向民航局申請該次活動許可", "飛航任務前應向民航局申請該次活動許可", "不須向民航局申請該次活動許可"], "ans": "C", "exp": "政府機關、學校或法人執行獲民航局許可之任務，仍應於「飛航任務前」向民航局申請該次活動許可。"}, {"cat": "專業", "ch": 1, "n": 95, "q": "遙控無人機管理規則針對「延伸視距飛航」之定義，下列何者為非？", "opts": ["操作人須於視距外操作", "目視觀察員須距遙控無人機半徑三百公尺範圍內", "操作人應自目視觀察員獲取必要飛航資訊", "目視觀察員不須與遙控無人機保持直接目視接觸"], "ans": "D", "exp": "延伸視距飛航中，目視觀察員仍須與無人機保持直接目視接觸，故D敘述為非。"}, {"cat": "專業", "ch": 1, "n": 96, "q": "遙控無人機管理規則如何定義「延伸視距最大範圍」？", "opts": ["以遙控無人機操作人為中心，半徑 900 公尺、相對地面或水面高度低於 400 呎內之區域", "以遙控無人機操作人為中心，半徑 600 公尺、相對地面或水面高度低於 300 呎內之區域", "以遙控無人機操作人為中心，半徑 500 公尺、相對地面或水面高度低於 200 呎內之區域", "以遙控無人機操作人為中心，半徑 1,200 公尺、相對地面或水面高度低於 200 呎內之區域"], "ans": "A", "exp": "延伸視距最大範圍：以操作人為中心、半徑 900 公尺、相對地/水面高度低於 400 呎之區域。"}, {"cat": "專業", "ch": 1, "n": 97, "q": "針對自然人所有之遙控無人機，法規明訂其最大起飛重量達多少以上，即應辦理註冊？", "opts": ["250 公克以上", "1 公斤以上", "2 公斤以上", "15 公斤以上"], "ans": "A", "exp": "自然人所有之無人機，最大起飛重量 250 公克以上即應辦理註冊。"}, {"cat": "專業", "ch": 1, "n": 98, "q": "遙控無人機發生滅失情形者，其所有人申請註銷註冊之程序為何？", "opts": ["事實發生日起 15 日內向民航局申請", "事實發生日起 20 日內向民航局申請", "事實發生日起 15 日內向所在地方政府申請", "事實發生日起 20 日內向所在地方政府申請"], "ans": "A", "exp": "滅失者，所有人應於事實發生日起 15 日內向民航局申請註銷註冊。"}, {"cat": "專業", "ch": 1, "n": 99, "q": "遙控無人機註冊號碼之有效期限為幾年？", "opts": ["1 年", "2 年", "3 年", "4 年"], "ans": "B", "exp": "註冊號碼有效期限為 2 年。"}, {"cat": "專業", "ch": 1, "n": 100, "q": "法規規定最大起飛重量達多少以上且裝置導航設備之遙控無人機，應具備防止其進入禁、限航區及航空站或飛行場四周一定距離範圍內之圖資軟體系統？", "opts": ["250 公克以上", "1 公斤以上", "2 公斤以上", "15 公斤以上"], "ans": "B", "exp": "最大起飛重量 1 公斤以上且裝導航設備者，須具備地理圍欄圖資軟體系統。"}, {"cat": "專業", "ch": 1, "n": 101, "q": "遙控無人機實體檢驗合格證之有效期限為幾年？", "opts": ["1 年", "2 年", "3 年", "4 年"], "ans": "C", "exp": "實體檢驗合格證有效期限為 3 年。"}, {"cat": "專業", "ch": 1, "n": 102, "q": "持有普通操作證之自然人，依規定得操作下列哪個重量級距之遙控無人機？", "opts": ["15 公斤以上之遙控無人機", "25 公斤以上之遙控無人機", "未達 15 公斤且裝置導航設備之遙控無人機", "30 公斤以上之遙控無人機"], "ans": "C", "exp": "普通操作證得操作未達 15 公斤且裝置導航設備之無人機。"}, {"cat": "專業", "ch": 1, "n": 103, "q": "持有普通操作證及專業操作證對於可操控之遙控無人機重量界線為何？", "opts": ["1 公斤", "2 公斤", "15 公斤", "25 公斤"], "ans": "C", "exp": "普通操作證與專業操作證之操控重量界線為 15 公斤。"}, {"cat": "專業", "ch": 1, "n": 104, "q": "針對學習操作證之敘述，下列何者為非？", "opts": ["申請者應年滿 16 歲", "持有者須於具備普通或專業操作證之操作人在旁指導監護下，使得操作", "持有者所操作遙控無人機構型不受限制", "持有者所操作遙控無人機重量不得逾 15 公斤"], "ans": "C", "exp": "學習操作證所操作之無人機構型受限，故「構型不受限制」為非。"}, {"cat": "專業", "ch": 1, "n": 105, "q": "針對專業操作證之敘述，下列何者正確？", "opts": ["分為初、中、高等 3 級", "持有者僅須通過學科測驗", "持有者得執行獲核准之法人委託業務", "持有者無須經過體格檢查"], "ans": "C", "exp": "專業操作證持有者得執行獲核准之法人委託業務。"}, {"cat": "專業", "ch": 1, "n": 106, "q": "申請遙控無人機專業操作證者，其術科測驗應於學科測驗通過日起多久內完成？", "opts": ["3 個月內", "6 個月內", "9 個月內", "1 年內"], "ans": "D", "exp": "術科須於學科通過日起 1 年內完成。"}, {"cat": "專業", "ch": 1, "n": 107, "q": "操作人操作遙控無人機時，血液中酒精濃度依法不得超過多少？", "opts": ["0.01%", "0.02%", "0.04%", "0.06%"], "ans": "B", "exp": "操作時血液中酒精濃度不得超過 0.02%。"}, {"cat": "專業", "ch": 1, "n": 108, "q": "最大起飛重量未達 25 公斤且裝置導航設備之遙控無人機，其最大飛行速度不得超過多少？", "opts": ["70 海浬/小時", "87 海浬/小時", "100 海浬/小時", "150 海浬/小時"], "ans": "B", "exp": "未達 25 公斤且裝導航設備者，最大飛行速度不得超過 87 海浬/小時。"}, {"cat": "專業", "ch": 1, "n": 109, "q": "政府機關（構）、學校或法人欲於禁、限航區及航空站或飛行場四周一定距離範圍內從事遙控無人機飛航活動者，應於活動日前多久提出申請？", "opts": ["15 日前", "10 日前", "5 日前", "3 日前"], "ans": "A", "exp": "禁限航區或航空站周邊飛航，應於活動日前 15 日提出申請。"}, {"cat": "專業", "ch": 1, "n": 110, "q": "政府機關（構
