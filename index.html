ns": "A", "exp": "危害所可能造成的後果，稱為風險。"}, {"cat": "專業", "ch": 4, "n": 54, "q": "在有限的時間壓力下，未經充分蒐集、分析利弊、僅憑直覺或經驗即執行的過程稱為下列哪種方式？", "opts": ["工程決斷", "反射抉擇", "自動決策", "兩難情境"], "ans": "C", "exp": "時間壓力下僅憑直覺或經驗即執行的過程，稱為自動決策。"}, {"cat": "專業", "ch": 4, "n": 55, "q": "無人機正在執行任務時，發現天氣明顯變化：能見度變差、相對濕度變高、陣風風速變大，請問操作人應採取下列哪一項動作？", "opts": ["當機立斷，立即將無人機返場降落，以免危及無人機性能和飛行安全", "視無人機團隊組員人數而定，如果人數夠多就繼續執行任務，不用擔心天氣影響到無人機性能和飛行安全", "視無人機機型而定，如果無人機出廠性能優異就繼續執行任務，不必在乎天氣影響到無人機性能和飛行安全", "以上皆是"], "ans": "A", "exp": "天氣明顯惡化應當機立斷、立即返場降落，以維飛安。"}, {"cat": "專業", "ch": 4, "n": 56, "q": "在作飛行規劃或操作無人機時，操作人手上有多項性能資料，每項都言之成理，但又不盡相同，甚至互相矛盾，操作人應優先使用下列哪一項？", "opts": ["航空教科書計算得出的性能資料", "之前操作人提供的經驗及建議", "無人機製造商提供的性能資料", "類似系統提供的預估性能資料"], "ans": "C", "exp": "性能資料互相矛盾時，應優先採用無人機製造商提供的資料。"}, {"cat": "專業", "ch": 4, "n": 57, "q": "請問在下列哪一種情況下，操作人可以不必執行無人機起飛前檢查？", "opts": ["前一次飛行已作過起飛前檢查，如果緊接著執行下一次飛行，就不必執行起飛前檢查", "當天第一次飛行已作過起飛前檢查，之後當天的所有飛行就都不必執行起飛前檢查", "每次飛行前都必須執行起飛前檢查，沒有任何情況可以免除", "視飛行任務而定，如果任務簡單且飛行時間短，操作人判斷起飛前檢查屬多餘，就不必執行起飛前檢查"], "ans": "C", "exp": "每次飛行前都必須執行起飛前檢查，無任何情況可免除。"}, {"cat": "專業", "ch": 4, "n": 58, "q": "下午 3 點無人機飛行時天氣愈來愈壞，氣象預報說下午有雷雨，但此時無人機正在執行一項任務，至少需要到下午 5 點才能結束返場，請問操作人應採取下列哪一項飛行決策？", "opts": ["在惡劣天氣下飛行，會增加飛航安全的風險，應避免在雷雨期間下執行任務", "無人機狀況良好，雖然氣象預報說有雷雨，但不一定會發生，就算發生也不一定會碰上，所以可繼續執行任務", "以前也不是沒碰過雷雨，只要無人機狀況良好、操作人能力優秀，克服天氣因素沒問題，所以可繼續執行任務", "因為此次任務非常重要，中途放棄會損失許多金錢和時間，所以可繼續執行任務，等碰到雷雨再說"], "ans": "A", "exp": "惡劣天氣增加飛安風險，應避免在雷雨期間執行任務。"}, {"cat": "專業", "ch": 4, "n": 59, "q": "無人機已連續飛行一段長時間，操作人全程專心操作，但因前一夜休息不足略顯疲態，操作團隊其他組員感覺該操作人反應變慢、注意力渙散、專注力下降、協調性及溝通性降低等，請問操作團隊應採取下列哪一項動作？", "opts": ["因為該操作人比較熟悉任務需求，還是由他繼續操作，其他組員多跟他講話，鼓舞精神，硬撐下去", "詢問該操作人會不會疲累、可否繼續操作；如果不會疲累就繼續操作，如果會疲累再說", "基於飛航安全的考量，應儘快返場落地；由其他合適的操作人繼續執行任務", "請該操作人將無人機至於自主飛行模式，然後閉目養神，直到精神恢復再繼續操作"], "ans": "C", "exp": "操作人明顯疲態影響操作，基於飛安應儘快返場，改由其他合適操作人接手。"}, {"cat": "專業", "ch": 4, "n": 60, "q": "無人機準備下午 3 點以後執行任務，為了避免視線干擾應慎選控制站方位，請問操作人應選擇下列哪一種操作方位？", "opts": ["操作方位面向西方", "操作方位面向東方", "任一種操作方位都可以，不必擔心視線干擾", "操作方位應面對操作範圍內任何反光物體"], "ans": "B", "exp": "下午三點後太陽偏西，應面向東方操作以避免逆光干擾視線。"}, {"cat": "專業", "ch": 4, "n": 61, "q": "無人機正在飛行時，操作團隊臨時要求操作人執行原先飛行計畫沒有安排的科目，請問操作人應如何處理？", "opts": ["對原先飛行計畫沒有安排的科目，應一律拒絕執行", "既然是操作團隊要求的科目，就應配合執行", "依科目重要性而定，重要的話就不顧一切去執行，不重要的話就不執行", "快速評估可行性，包括無人機性能、個人能力及其他限制等，再決定是否執行"], "ans": "D", "exp": "臨時加入計畫外科目，應快速評估性能、能力與限制後再決定是否執行。"}, {"cat": "專業", "ch": 4, "n": 62, "q": "無人機計畫執行視距內任務，操作人預估有一段路徑無法保持目視無人機，請問操作人應如何處置？", "opts": ["使用望遠鏡來執行該段路徑無人機飛航", "只要操作人技術夠好，就不必在意該段路徑", "只要知道該段路徑沒有障礙、沒有其他無人機，就可以繼續執行任務", "改變飛行路徑，以保持目視無人機"], "ans": "D", "exp": "視距內任務若有路段無法目視，應改變飛行路徑以保持目視。"}, {"cat": "專業", "ch": 4, "n": 63, "q": "最大起飛重量二公斤以上且裝置導航裝置之遙控無人機於執行任務途中，因天氣變壞、能見度變差，最後導致無人機失控墜毀於空曠無人區域，未造成人員死傷或財物毀損，請問操作人對該無人機墜毀事件應有下列哪一項認知？", "opts": ["雖然未造成人員死傷或財物毀損，仍應將無人機殘骸撿拾乾淨再回程，而且不要跟任何單位通報，以免造成自己困擾", "應在墜毀現場檢討失事原因，檢視殘骸狀況，勿破壞現場，通報當地警察局處理", "無人機因天氣等不可抗力因素而失控墜毀，只要未造成人員死傷或財物毀損，就不必做任何善後處理或通報任何單位", "事件發生後，無人機所有人或操作人應將事件經過通報民航局"], "ans": "D", "exp": "2 公斤以上且裝導航設備之無人機發生實質損害，所有人或操作人應通報民航局。"}, {"cat": "專業", "ch": 4, "n": 64, "q": "無人機團隊正在作任務前簡報，有人聞到操作人身上有明顯的酒味，便提出質疑，操作人表示他剛剛只是喝了一小杯高粱酒，應無大礙，請問無人機團隊對該操作人的說法應有下列哪一項認知？", "opts": ["法令規定有其容忍值，但基於飛航安全的考量，在未經酒測前，應禁止操作人執行飛航活動", "應以任務執行為優先，還是讓該操作人從事飛航活動，只要無人機團隊多加留意便是", "適當的飲酒不但無害且有助視力及反應，所以不必當回事，仍依原計畫讓該操作人從事飛航活動", "依該操作人的現場狀況而定，如果該操作人看起來還好就讓他從事飛航活動，如果該操作人看起來醉醺醺就禁止他從事飛航活動"], "ans": "A", "exp": "雖有酒測容忍值，但未經酒測前基於飛安應禁止該操作人執行飛航活動。"}, {"cat": "專業", "ch": 4, "n": 65, "q": "無人機結束當天任務準備返場，又接到任務指示：「立即至另一指定地點執行下一項任務。」請問操作人對該任務指示應有下列哪一項認知？", "opts": ["既然尚未返場落地，就接受該任務指示，以滿足任務需求為優先考量", "既然當天任務已經結束，就不必理會該任務指示，趕緊返場，早點收工休息", "考量下一項任務的油量需求、人員負荷、空域、天氣及無人機狀況等，如果都沒有安全顧慮，不會對任何人或物造成危險，就接受該任務指示，否則應拒絕該任務指示，先返場整備後再執行下一項任務", "應依下一項任務的重要性而定，如果下一項任務很重要，就接受該任務指示，否則就拒絕該任務指示"], "ans": "C", "exp": "接新任務應評估油量、人員負荷、空域、天氣及機況，無安全顧慮才接受，否則先返場整備。"}, {"cat": "專業", "ch": 4, "n": 66, "q": "無人機在地面檢整，準備從事飛航活動，無人機團隊有人主張：「目視檢查無人機外觀完整，應該就沒問題，符合安全飛航條件，可以從事飛航活動。」請問操作人對該主張應有下列哪一項認知？", "opts": ["該主張正確，只要外觀完整，就可以從事飛航活動", "該主張不正確，除了外觀完整，安全飛航條件還包含：機構及動力系統穩固、飛航註冊號碼依規定標示可辨、遙控設備與無人機間之通信及控制鏈路運作正常、燃油或電力之供應符合飛航之需求等", "如果提出該主張的人經驗豐富，見多識廣，代表該主張正確，否則該主張不正確", "應依當時現場的天候狀況而定，如果天候狀況適於從事飛航活動，代表該主張正確，否則該主張不正確"], "ans": "B", "exp": "安全飛航條件不只外觀，還含機構動力、註冊號碼、通信控制鏈路、能源供應等，故該主張不正確。"}, {"cat": "專業", "ch": 4, "n": 67, "q": "無人機團隊正在作任務前簡報，氣象預報指出在任務飛行路徑無人機將進入雷雨區，無人機很可能碰到強勁的上升氣流及下降氣流，請問操作人對該氣象預報應有下列哪一項認知？", "opts": ["無人機在雷雨區飛行是很稀鬆平常的事，不必放在心上", "無人機先起飛再說，說不定雷雨區沒有氣象預報說的強勁氣流，或者根本沒有雷雨區", "應依當時任務的重要性而定，如果任務重要就繼續從事飛航活動，否則就取消", "因為操作區域氣象條件惡劣，應審慎評估從事飛航活動的風險，必要時應建議無人機團隊延期執行任務"], "ans": "D", "exp": "操作區域氣象惡劣（雷雨、強烈上下沉氣流），應審慎評估風險，必要時建議延期。"}, {"cat": "專業", "ch": 4, "n": 68, "q": "無人機因操作人操作不當導致失控墜毀於外海，通報民航局備查後，操作人情緒激動，久久不能平復，要求無人機團隊立即讓他操作另一架同型無人機來完成沒有作完的任務，請問無人機團隊對該要求應有下列哪一項認知？", "opts": ["操作人情緒不穩定，宜暫停從事無人機之飛航活動，所以應拒絕該要求", "「操作不當」的不良紀錄會導致操作人聲譽受損，讓操作人繼續執行無人機任務有助他扳回面子，所以應同意該要求", "應視當時的天氣狀況而定，如果天氣好就同意該要求，否則就拒絕該要求", "應視另一架同型無人機的機務狀況而定，如果機務狀況好就同意該要求，否則就拒絕該要求"], "ans": "A", "exp": "操作人情緒不穩定，宜暫停其飛航活動，應拒絕該要求。"}, {"cat": "專業", "ch": 4, "n": 69, "q": "無人機團隊在作任務前簡報，針對此次任務可能的緊急狀況及其處置，團隊中有人主張到時碰到再看事辦事，隨機應變即可，不用管什麼程序，請問操作人對該主張應有下列哪一項認知？", "opts": ["無人機操作人的經驗最重要，只要操作人自認有把握，就可以同意該主張", "應依無人機團隊的共識而定，如果有共識就同意該主張，否則就不同意該主張", "應依無人機任務的重要性而定，如果任務重要就同意該主張，否則就不同意該主張", "操作人應完全熟悉並遵守無人機飛行手冊/操作人操作手冊所規定的程序作緊急處置，不可以同意該主張"], "ans": "D", "exp": "應完全熟悉並遵守飛行/操作手冊所規定之緊急處置程序，不可隨機應變便宜行事。"}, {"cat": "專業", "ch": 4, "n": 70, "q": "操作人正在作無人機飛行前檢查，發現螺槳上有刮傷刻痕，請問操作人對該刻痕應有下列哪一項認知？", "opts": ["螺槳上有刮傷刻痕很平常，知道就好，不必大驚小怪", "螺槳上有刮傷刻痕極為危險，應立即更換螺槳才可以啟動引擎", "先執行無人機任務要緊，任務完成後再由無人機團隊共同研商該刻痕之對策", "操作人應針對該刻痕依據廠商手冊或相關資料作風險評估，判斷該刻痕所產生風險的嚴重性及可能性是否可以接受"], "ans": "D", "exp": "應依廠商手冊或相關資料對刻痕作風險評估，判斷其嚴重性與可能性是否可接受。"}, {"cat": "專業", "ch": 4, "n": 71, "q": "無人機正在機場的南方空域飛行時，航管通知有飛機準備從 06 跑道進場，要求無人機必須避開進場航線，請問操作人應採取下列哪一項動作？", "opts": ["避開目前飛行空域的西方和北方", "避開目前飛行空域的東方和北方", "避開目前飛行空域的西方和南方", "避開目前飛行空域的東方和南方"], "ans": "A", "exp": "對 06 跑道進場之飛機，其進場航線位於場站西南方；南方空域之無人機應避開西方與北方。"}, {"cat": "專業", "ch": 4, "n": 72, "q": "無人機在溫暖天氣低空飛行時常會有對流的氣流造成上下起伏的亂流空氣，請問操作人應採取下列哪一項動作來避免這些亂流情形？", "opts": ["維持穩定速度飛行；視情況爬升高度", "增加空速，衝過亂流區域", "展現優異的無人機操作技巧，不必在乎亂流空氣", "降低飛行高度，消除亂流空氣的影響"], "ans": "A", "exp": "低空對流亂流時，應維持穩定速度飛行，並視情況爬升高度以避開。"}, {"cat": "專業", "ch": 4, "n": 73, "q": "無人機正在執行任務，操作人發現動力系統警示紅燈會不定時亮起來一段時間，然後又熄滅，且一再重現，請問操作人對該現象應有下列哪一項認知？", "opts": ["只要無人機還能正常飛行，不必在意該現象，繼續執行任務", "該現象表示動力系統可能有緊急情況會發生，操作人應立即將無人機返航落地", "無人機團隊應針對該現象共同研商出一個因應措施，尊重大家的意見，不是操作人或任何其他個人就可以決定", "應視警示紅燈亮起來的時間長短及頻率而定，如果時間長、頻率高就注意該現象，否則就忽略該現象"], "ans": "B", "exp": "動力警示燈間歇亮起表示可能有緊急情況，應立即返航落地。"}, {"cat": "專業", "ch": 4, "n": 74, "q": "無人飛機頂風起飛離地後引擎失效，請問操作人對該狀況應有下列哪一項認知？", "opts": ["立即確立適當的無人飛機飄降姿態，並直線往前或稍微偏離起飛路徑作降落", "立即以大角度轉彎將無人飛機轉回本場作降落", "立即反映無人飛機團隊，請大家集思廣益，提出對策", "立即查閱無人飛機飛行手冊/操作人操作手冊所規定的程序，再作緊急處置"], "ans": "A", "exp": "頂風起飛後引擎失效，應立即建立飄降姿態，直線往前或稍偏離起飛路徑降落。"}, {"cat": "專業", "ch": 4, "n": 75, "q": "無人機正在執行任務，下列狀況幾乎同時發生：GPS 信號失效、天氣變壞及圖傳遭受干擾等，請問操作人對該等狀況應有下列哪一項認知？", "opts": ["應以達成任務為優先考慮，暫時忽略該等狀況", "對該等狀況無法預作分析及沙盤推演，操作人應憑經驗果斷作成自動決策", "應與無人機團隊共同研商該等狀況之對策，從容找出最佳方案", "應仔細查閱無人機飛行手冊/操作人操作手冊所規定的程序，再依其中規定的處置措施逐步執行"], "ans": "B", "exp": "GPS失效、天氣變壞、圖傳干擾同時發生，無法預作分析，應憑經驗果斷作自動決策。"}, {"cat": "專業", "ch": 4, "n": 76, "q": "某無人飛機飄降比為 10 比 1，正在距離機場約 2 公里、高度 1,000 英呎執行任務，此時為靜風，引擎忽然故障熄火，請問操作人應採取下列哪一項動作？", "opts": ["不管無人飛機高度可否提供足夠飄降距離，因為無人機太重要，立即不顧一切執行飄降返場", "判斷無人飛機高度可提供足夠飄降距離，立即執行飄降返場", "判斷無人飛機高度無法提供足夠飄降距離，立即執行場外迫降", "雖然無人飛機高度無法提供足夠飄降距離，因為操作人信心滿滿、技藝超群，仍執行飄降返場"], "ans": "B", "exp": "飄降比 10:1、高度 1,000 呎可飄降約 10,000 呎（約 3 公里）＞2 公里，可判斷高度足夠，執行飄降返場。"}, {"cat": "專業", "ch": 4, "n": 77, "q": "無人飛機正在執行任務，操作人發現動力系統警示紅燈亮起，燈號顯示燃油或電量已不足以安全返場落地，飄降距離也顯然太遠，請問操作人對該緊急狀況應有下列哪一項認知？", "opts": ["盡量堅持下去，往本場飛，能飛多久是多久", "盡量延伸飄降距離，不必考慮最低空速，最好能到達「理想的」落地區域", "在操作人仍可繼續操作無人機時，儘快執行「預防性緊急著陸」", "反正已不可能安全返場落地，放棄任何努力，聽天由命"], "ans": "C", "exp": "能源不足且飄降距離太遠，應趁仍可操作時儘快執行「預防性緊急著陸」。"}, {"cat": "專業", "ch": 4, "n": 78, "q": "A、B 兩架無人機在同一區域執行任務，A 機操作人接到一通重要電話，於是商請 B 機操作人暫時同時幫忙操作 A 機，請問操作人對該要求應有下列哪一項認知？", "opts": ["拒絕該要求", "視當時的天氣狀況而定，如果天氣狀況良好就同意該要求，否則就拒絕該要求", "視該電話的重要性而定，如果該電話真的很重要就同意該要求，否則就拒絕該要求", "視 A 機的油量而定，如果油量充足就同意該要求，否則就拒絕該要求"], "ans": "A", "exp": "一人不得同時操作兩架無人機，應拒絕該要求。"}, {"cat": "專業", "ch": 4, "n": 79, "q": "無人機團隊受某媒體委託執行空拍任務，執行任務過程中委託單位要求無人機飛出核准區域以取得更好的畫面，無人機團隊其他成員認為該要求合理，應予執行，但是操作人認為該要求有安全疑慮，應予拒絕，請問操作人對此情形應有下列哪一項認知？", "opts": ["聽從無人機團隊領隊的指示，領隊說執行就執行，到時有問題由領隊負責", "聽從無人機團隊大多數人的意見，到時有問題大家一起負責", "無人機於飛航活動期間，操作人對無人機之處置有最後決定權", "如果委託單位願意負責就執行該要求，否則就拒絕該要求"], "ans": "C", "exp": "飛航活動期間，操作人對無人機之處置有最後決定權，有安全疑慮應拒絕。"}];
Q.forEach(q => q.id = (q.cat==="專業"?"P":"") + q.ch + "-" + q.n);  // 普通題保持 "1-1"，進度不失
const CH_NAMES = {1:"第一章 法規", 2:"第二章 飛行原理", 3:"第三章 氣象", 4:"第四章 緊急處置"};
const CATS = ["普通","專業"];
const LETTERS = ["A","B","C","D"];

const STORE_KEY = "drone_srs_v1";
const SET_KEY   = "drone_srs_settings_v1";
let store = load(STORE_KEY, {});
let settings = load(SET_KEY, {cat:"普通", scope:"all", newPerSession:20, browseCat:"普通", browseCh:"all"});
if(!settings.cat) settings.cat="普通";
if(!settings.browseCat) settings.browseCat="普通";
if(!settings.weakCat) settings.weakCat="全部";
let weakOnly = false;           // 弱點複習模式（不寫入設定，換頁即重置）
let guessFlag = false;          // 本題是否標記「不確定」

/* 弱點判定：答錯過、標記過不確定，或曾按「再一次」 */
function isWeak(id){
  const s = store[id];
  return !!s && ((s.wrong>0) || (s.guess>0) || (s.lapses>0));
}
function weakList(cat){
  return Q.filter(q => isWeak(q.id) && (cat==="全部" || q.cat===cat));
}
function load(k,d){ try{return JSON.parse(localStorage.getItem(k))||d}catch(e){return d} }
function save(){ localStorage.setItem(STORE_KEY,JSON.stringify(store));
                 localStorage.setItem(SET_KEY,JSON.stringify(settings)); }

const DAY = 86400000;
function cardState(id){ return store[id] || null; }

function schedule(id, grade){
  const now = Date.now();
  let s = store[id] || {ef:2.5, iv:0, reps:0, due:now, lapses:0};
  if(grade === "again"){
    s.reps=0; s.lapses++; s.ef=Math.max(1.3, s.ef-0.2); s.iv=0; s.due=now; s.relearn=true;
  } else {
    const q = grade==="hard"?3 : grade==="good"?4 : 5;
    s.ef = Math.max(1.3, s.ef + (0.1 - (5-q)*(0.08 + (5-q)*0.02)));
    if(s.reps===0)      s.iv = grade==="easy"?4 : 1;
    else if(s.reps===1) s.iv = grade==="hard"?3 : grade==="easy"?7 : 6;
    else{
      let base=s.iv*s.ef;
      if(grade==="hard") base=s.iv*1.2;
      if(grade==="easy") base=s.iv*s.ef*1.3;
      s.iv=Math.max(1,Math.round(base));
    }
    s.reps++; s.relearn=false; s.due=now + s.iv*DAY;
  }
  s.seen=true; store[id]=s; save();
}

let queue=[], session={right:0,total:0,relearn:[]};
function scopeList(){
  return Q.filter(q=> q.cat===settings.cat && (settings.scope==="all" || q.ch==+settings.scope));
}
function buildQueue(){
  const now=Date.now(); const list=scopeList(); const due=[], fresh=[];
  for(const q of list){
    const s=store[q.id];
    if(!s||!s.seen) fresh.push(q);
    else if(s.due<=now) due.push(q);
  }
  due.sort((a,b)=> store[a.id].due - store[b.id].due);
  const lim = settings.newPerSession==="all" ? fresh.length : settings.newPerSession;
  queue=[...due, ...fresh.slice(0,lim)];
  session={right:0,total:0,relearn:[]};
}
function stats(){
  const now=Date.now(); const list=scopeList(); let due=0,fresh=0,seen=0;
  for(const q of list){ const s=store[q.id];
    if(!s||!s.seen) fresh++; else{ seen++; if(s.due<=now) due++; } }
  return {due,fresh,seen,total:list.length};
}
const h_due=document.getElementById("h-due"), h_new=document.getElementById("h-new"),
      h_seen=document.getElementById("h-seen"), h_acc=document.getElementById("h-acc");
function refreshHUD(){
  if(weakOnly){
    h_due.textContent = queue.length + (session.relearn.length? "+"+session.relearn.length:"");
    h_new.textContent = "—";
    h_seen.innerHTML  = session.total + "<small>/本輪</small>";
    h_acc.textContent = session.total? Math.round(session.right/session.total*100)+"%" : "–";
    updateWeakBadge();
    return;
  }
  const st=stats();
  h_due.textContent = st.due + (session.relearn.length? "+"+session.relearn.length:"");
  h_new.textContent = st.fresh;
  h_seen.innerHTML  = st.seen + "<small>/"+st.total+"</small>";
  h_acc.textContent = session.total? Math.round(session.right/session.total*100)+"%" : "–";
  updateWeakBadge();
}

function catRow(el, current, onPick){
  el.innerHTML = CATS.map(c=>{
    const n = Q.filter(q=>q.cat===c).length;
    return `<button aria-pressed="${current===c}" data-c="${c}">${c}題庫<span class="c">${n}</span></button>`;
  }).join("");
  el.querySelectorAll("button").forEach(b=> b.onclick=()=>onPick(b.dataset.c));
}
function chipRow(el, cat, current, onPick){
  const counts={all:0,1:0,2:0,3:0,4:0};
  Q.filter(q=>q.cat===cat).forEach(q=>{counts.all++;counts[q.ch]++});
  const defs=[["all","全部"],["1","第一章 法規"],["2","第二章 飛行原理"],["3","第三章 氣象"],["4","第四章 緊急處置"]];
  el.innerHTML=defs.map(([v,label])=>
    `<button class="chip" aria-pressed="${current===v}" data-v="${v}">${label}<span class="n">${counts[v]}</span></button>`).join("");
  el.querySelectorAll(".chip").forEach(b=> b.onclick=()=>onPick(b.dataset.v));
}

let cur=null, answered=false;
function startStudy(){
  catRow(document.getElementById("study-cat"), settings.cat, c=>{
    settings.cat=c; settings.scope="all"; save(); startStudy();
  });
  chipRow(document.getElementById("scope-chips"), settings.cat, settings.scope, v=>{
    settings.scope=v; save(); buildQueue(); nextCard();
  });
  buildQueue(); nextCard();
}
function nextCard(){
  refreshHUD(); answered=false;
  const area=document.getElementById("study-area");
  if(queue.length===0 && session.relearn.length){ queue=session.relearn; session.relearn=[]; }
  if(queue.length===0){
    if(weakOnly){
      area.innerHTML = `
        <div class="state"><div class="big">🎯</div>
          <h2>弱點複習完成</h2>
          <p>${session.total? `本輪 ${session.total} 題，正確率 ${Math.round(session.right/session.total*100)}%。`:""}</p>
          <button class="btn" onclick="switchTab('weak')">回到錯題本</button>
          <button class="btn ghost" onclick="exitWeakReview()">回到一般複習</button>
        </div>`;
      updateWeakBadge();
      return;
    }
    const st=stats();
    area.innerHTML = st.total===0 ? "" : `
      <div class="state"><div class="big">✈︎</div>
        <h2>此範圍今日已完成</h2>
        <p>${session.total? `本輪 ${session.total} 題，正確率 ${Math.round(session.right/session.total*100)}%。`:"目前沒有到期或新題。"}</p>
        <button class="btn ghost" onclick="settings.newPerSession='all';save();buildQueue();nextCard()">載入全部剩餘新題</button>
      </div>`;
    return;
  }
  cur=queue.shift();
  guessFlag=false;
  const s=cardState(cur.id);
  const badge = s ? (s.relearn?"重新學習":(s.seen?"複習 · 間隔 "+s.iv+"天":"新題")) : "新題";
  area.innerHTML=`
    ${weakOnly? `<div class="weakbar">🎯 弱點複習中 · 剩 ${queue.length+1} 題
      <button onclick="exitWeakReview()">結束</button></div>` : ""}
    <div class="card">
      <div class="qmeta">
        <span class="qtag">${cur.cat}｜${cur.ch}-${cur.n} · ${CH_NAMES[cur.ch]} · ${badge}</span>
        <button class="speak" title="朗讀題目" onclick="speak()">🔊</button>
      </div>
      <div class="qtext">${esc(cur.q)}</div>
      <button class="guess" id="guessBtn" aria-pressed="false" onclick="toggleGuess()">🤔 這題我不確定 / 用猜的</button>
      <div class="opts" id="opts">
        ${cur.opts.map((o,i)=>`<button class="opt" data-l="${LETTERS[i]}" onclick="answer('${LETTERS[i]}')">
          <span class="ltr">${LETTERS[i]}</span><span>${esc(o)}</span></button>`).join("")}
      </div>
      <div id="post"></div>
    </div>`;
}
function answer(letter){
  if(answered) return; answered=true;
  const correct=cur.ans, ok=letter===correct;
  session.total++; if(ok) session.right++;
  // 記錄弱點資料
  const s = store[cur.id] || {ef:2.5, iv:0, reps:0, due:Date.now(), lapses:0};
  s.wrong = s.wrong || 0; s.guess = s.guess || 0;
  if(!ok){ s.wrong++; s.lastWrong = Date.now(); }
  if(guessFlag){ s.guess++; }
  s.lastSeen = Date.now();
  store[cur.id] = s; save();
  document.querySelectorAll("#opts .opt").forEach(b=>{
    b.disabled=true; const l=b.dataset.l;
    if(l===correct){ b.classList.add("correct"); addMk(b,"✓ 正解"); }
    if(l===letter && !ok){ b.classList.add("wrong"); addMk(b,"✕ 你選的"); }
  });
  const expHtml=`<div class="exp"><b>解析</b>　${esc(cur.exp)}</div><div id="recHolder"></div>`;
  const grades=`
    <div class="grades">
      <button class="grade g-again" onclick="grade('again')">再一次<small>&lt;10分</small></button>
      <button class="grade g-hard"  onclick="grade('hard')">困難<small>${prevIv('hard')}</small></button>
      <button class="grade g-good"  onclick="grade('good')">良好<small>${prevIv('good')}</small></button>
      <button class="grade g-easy"  onclick="grade('easy')">簡單<small>${prevIv('easy')}</small></button>
    </div>
    <div class="hint">鍵盤：1 再一次 · 2 困難 · 3 良好 · 4 簡單${ok?"":"　（答錯建議「再一次」）"}</div>`;
  document.getElementById("post").innerHTML=expHtml+grades;
  renderRec();
  const gb=document.getElementById("guessBtn");
  if(gb) gb.innerHTML = guessFlag ? "🤔 已標記：這題是猜的（再點取消）" : "🤔 其實這題我是猜的";
  refreshHUD();
}
function toggleGuess(){
  guessFlag=!guessFlag;
  const btn=document.getElementById("guessBtn");
  if(btn){
    btn.setAttribute("aria-pressed", guessFlag);
    btn.innerHTML = answered
      ? (guessFlag ? "🤔 已標記：這題是猜的（再點取消）" : "🤔 其實這題我是猜的")
      : (guessFlag ? "🤔 已標記：不確定 / 用猜的" : "🤔 這題我不確定 / 用猜的");
  }
  if(answered){
    // 作答後才標記/取消，直接回寫紀錄
    const s=store[cur.id];
    if(!s) return;
    s.guess = Math.max(0, (s.guess||0) + (guessFlag? 1 : -1));
    store[cur.id]=s; save();
    renderRec();
    refreshHUD();
  }
}
function renderRec(){
  const holder=document.getElementById("recHolder");
  if(!holder) return;
  const s=store[cur.id]||{};
  const rec=[];
  if(s.wrong>0) rec.push(`答錯 ${s.wrong} 次`);
  if(s.guess>0) rec.push(`猜過 ${s.guess} 次`);
  if(s.lapses>0) rec.push(`重學 ${s.lapses} 次`);
  holder.innerHTML = rec.length
    ? `<div class="rec">📌 這題累積紀錄：${rec.join("　·　")}　（已在錯題本）</div>` : "";
}
function addMk(b,txt){ const s=document.createElement("span"); s.className="mk"; s.textContent=txt; b.appendChild(s); }
function prevIv(g){
  const s=store[cur.id]||{ef:2.5,iv:0,reps:0};
  if(g==="hard"){ if(s.reps===0)return "1天"; if(s.reps===1)return "3天"; return Math.max(1,Math.round(s.iv*1.2))+"天"; }
  if(g==="good"){ if(s.reps===0)return "1天"; if(s.reps===1)return "6天"; return Math.round(s.iv*s.ef)+"天"; }
  if(g==="easy"){ if(s.reps===0)return "4天"; if(s.reps===1)return "7天"; return Math.round(s.iv*s.ef*1.3)+"天"; }
}
function grade(g){
  if(!answered) return;
  schedule(cur.id, g);
  if(g==="again") session.relearn.push(cur);
  nextCard();
}
function speak(){
  if(!("speechSynthesis" in window) || !cur) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(cur.q+"。"+cur.opts.map((o,i)=>LETTERS[i]+"、"+o).join("；"));
  u.lang="zh-TW"; u.rate=0.95; speechSynthesis.speak(u);
}
document.addEventListener("keydown",e=>{
  if(document.getElementById("view-study").style.display==="none"||!cur) return;
  const k=e.key;
  if(!answered && ["1","2","3","4"].includes(k)) answer(LETTERS[+k-1]);
  else if(!answered && ["a","b","c","d","A","B","C","D"].includes(k)) answer(k.toUpperCase());
  else if(answered && ["1","2","3","4"].includes(k)) grade(["again","hard","good","easy"][+k-1]);
});

function renderBrowse(){
  catRow(document.getElementById("browse-cat"), settings.browseCat, c=>{
    settings.browseCat=c; settings.browseCh="all"; save(); renderBrowse();
  });
  chipRow(document.getElementById("browse-chips"), settings.browseCat, settings.browseCh, v=>{
    settings.browseCh=v; save(); renderBrowse();
  });
  const term=document.getElementById("search").value.trim();
  let list=Q.filter(q=> q.cat===settings.browseCat && (settings.browseCh==="all"||q.ch==+settings.browseCh));
  if(term) list=list.filter(q=> q.q.includes(term)||q.opts.some(o=>o.includes(term))||q.exp.includes(term));
  document.getElementById("browse-count").textContent=`顯示 ${list.length} 題`;
  document.getElementById("browse-list").innerHTML=list.map(q=>`
    <details class="qrow">
      <summary><span class="id">${q.ch}-${q.n}</span><span>${esc(q.q)}</span></summary>
      <div class="qbody">
        ${q.opts.map((o,i)=>`<div class="o ${LETTERS[i]===q.ans?'correct':''}">
          <span class="ltr">${LETTERS[i]}</span><span>${esc(o)}${LETTERS[i]===q.ans?'　✓':''}</span></div>`).join("")}
        <div class="exp"><b>解析</b>　${esc(q.exp)}</div>
      </div>
    </details>`).join("");
}

/* ============ 進度匯出 / 匯入（手動同步） ============ */
const PORT_MAGIC = "DRONESRS1:";

/* 逐題合併：每張卡以 lastSeen（其次 due）較新者為準 */
function mergeStores(a, b){
  const out={}, keys={};
  Object.keys(a).forEach(k=>keys[k]=1);
  Object.keys(b).forEach(k=>keys[k]=1);
  Object.keys(keys).forEach(k=>{
    const x=a[k], y=b[k];
    if(!x){ out[k]=y; return; }
    if(!y){ out[k]=x; return; }
    out[k] = ((y.lastSeen||y.due||0) >= (x.lastSeen||x.due||0)) ? y : x;
  });
  return out;
}
function portMsg(t, cls){
  const el=document.getElementById("port-msg");
  el.textContent=t; el.className="pmsg "+(cls||"");
  if(t) setTimeout(()=>{ if(el.textContent===t){ el.textContent=""; el.className="pmsg"; } }, 6000);
}
/* 匯出：base64(UTF-8 JSON)，前綴魔術字防貼錯 */
function encodeStore(){
  const json=JSON.stringify(store);
  return PORT_MAGIC + btoa(String.fromCharCode(...new TextEncoder().encode(json)));
}
function decodeStore(text){
  text=text.trim();
  if(!text.startsWith(PORT_MAGIC)) throw new Error("格式不對：開頭應為 "+PORT_MAGIC);
  const bin=atob(text.slice(PORT_MAGIC.length));
  const bytes=Uint8Array.from(bin, c=>c.charCodeAt(0));
  const obj=JSON.parse(new TextDecoder().decode(bytes));
  if(typeof obj!=="object"||Array.isArray(obj)) throw new Error("內容不是進度資料");
  return obj;
}
async function exportProgress(){
  const n=Object.keys(store).length;
  if(!n){ portMsg("目前沒有任何進度可匯出","err"); return; }
  const text=encodeStore();
  let copied=false;
  try{ await navigator.clipboard.writeText(text); copied=true; }catch(e){}
  if(!copied){
    // 剪貼簿不可用（http 或舊瀏覽器）→ 打開面板顯示文字讓使用者手動複製
    toggleImportPanel(true);
    document.getElementById("port-text").value=text;
    document.getElementById("port-text").select();
    portMsg("已產生匯出文字，請手動複製","ok");
    return;
  }
  portMsg(`已複製到剪貼簿（${n} 題紀錄）`,"ok");
}
function toggleImportPanel(forceOpen){
  const p=document.getElementById("port-panel");
  const open = forceOpen===true ? true : p.style.display==="none";
  p.style.display = open? "" : "none";
  if(open && forceOpen!==true) document.getElementById("port-text").value="";
}
function importProgress(){
  const text=document.getElementById("port-text").value;
  try{
    const incoming=decodeStore(text);
    const before=Object.keys(store).length;
    store=mergeStores(store, incoming);
    save();
    const after=Object.keys(store).length;
    toggleImportPanel();
    portMsg(`匯入完成：合併 ${Object.keys(incoming).length} 筆，本機 ${before} → ${after} 題`,"ok");
    refreshHUD(); updateWeakBadge();
    buildQueue(); nextCard();
  }catch(e){
    portMsg("匯入失敗："+(e.message||e),"err");
  }
}

function reasonText(id){
  const s=store[id]||{}; const r=[];
  if(s.wrong>0) r.push(`答錯 ${s.wrong} 次`);
  if(s.guess>0) r.push(`猜過 ${s.guess} 次`);
  if(s.lapses>0) r.push(`重學 ${s.lapses} 次`);
  return r.join("　·　");
}
function weakScore(id){   // 排序用：越弱分數越高
  const s=store[id]||{};
  return (s.wrong||0)*3 + (s.guess||0)*2 + (s.lapses||0);
}
function updateWeakBadge(){
  const n=weakList("全部").length;
  document.getElementById("weak-badge").textContent = n? `(${n})` : "";
}
function renderWeak(){
  const catsAll=["全部",...CATS];
  const el=document.getElementById("weak-cat");
  el.innerHTML=catsAll.map(c=>{
    const n=weakList(c).length;
    return `<button aria-pressed="${settings.weakCat===c}" data-c="${c}">${c==="全部"?"全部":c}<span class="c">${n}</span></button>`;
  }).join("");
  el.querySelectorAll("button").forEach(b=> b.onclick=()=>{ settings.weakCat=b.dataset.c; save(); renderWeak(); });

  let list=weakList(settings.weakCat);
  list.sort((a,b)=> weakScore(b.id)-weakScore(a.id) || a.ch-b.ch || a.n-b.n);
  document.getElementById("weak-count").textContent = list.length? `共 ${list.length} 題　（依弱點程度排序）` : "";
  document.getElementById("weak-actions").innerHTML = list.length
    ? `<button class="btn" style="margin:0 0 14px" onclick="startWeakReview()">▶︎ 只複習這 ${list.length} 題</button>`
    : "";
  document.getElementById("weak-list").innerHTML = list.length ? list.map(q=>`
    <details class="qrow">
      <summary><span class="id">${q.cat==="專業"?"專":"普"} ${q.ch}-${q.n}</span>
        <span>${esc(q.q)}<span class="why">${reasonText(q.id)}</span></span></summary>
      <div class="qbody">
        ${q.opts.map((o,i)=>`<div class="o ${LETTERS[i]===q.ans?'correct':''}">
          <span class="ltr">${LETTERS[i]}</span><span>${esc(o)}${LETTERS[i]===q.ans?'　✓':''}</span></div>`).join("")}
        <div class="exp"><b>解析</b>　${esc(q.exp)}</div>
      </div>
    </details>`).join("")
    : `<div class="state"><div class="big">✓</div><h2>錯題本目前是空的</h2>
       <p>答錯的題，或你標記「不確定 / 用猜的」的題，都會自動收進這裡。</p></div>`;
  updateWeakBadge();
}
function startWeakReview(){
  const list=weakList(settings.weakCat);
  if(!list.length) return;
  weakOnly=true;
  queue=[...list].sort((a,b)=> weakScore(b.id)-weakScore(a.id));
  session={right:0,total:0,relearn:[]};
  showTab("study");
  document.getElementById("study-cat").style.display="none";
  document.getElementById("scope-chips").style.display="none";
  nextCard();
}
function exitWeakReview(){
  weakOnly=false;
  document.getElementById("study-cat").style.display="";
  document.getElementById("scope-chips").style.display="";
  startStudy();
}

function showTab(t){
  document.getElementById("view-study").style.display  = t==="study"?"":"none";
  document.getElementById("view-weak").style.display   = t==="weak"?"":"none";
  document.getElementById("view-browse").style.display = t==="browse"?"":"none";
  document.getElementById("tab-study").setAttribute("aria-selected", t==="study");
  document.getElementById("tab-weak").setAttribute("aria-selected", t==="weak");
  document.getElementById("tab-browse").setAttribute("aria-selected", t==="browse");
}
function switchTab(t){
  showTab(t);
  if(t==="study"){ if(weakOnly) exitWeakReview(); else startStudy(); }
  else if(t==="weak"){ renderWeak(); }
  else { renderBrowse(); }
}
function esc(s){ return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

startStudy();
updateWeakBadge();
</script>
