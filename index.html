）、學校或法人於涉及軍事航空管理機關（構）管理之禁、限航區及航空站或飛行場四周一定距離範圍內從事遙控無人機飛航活動者，應於活動日前多久提出申請？", "opts": ["30 日前", "20 日前", "15 日前", "10 日前"], "ans": "A", "exp": "涉及軍事航空管理機關管理之區域者，應於活動日前 30 日提出申請（較一般更早）。"}, {"cat": "專業", "ch": 1, "n": 111, "q": "政府機關（構）、學校或法人於直轄市、縣（市）政府公告之禁止、限制區域內從事遙控無人機飛航活動時，如有跨縣市飛航情形，應向哪個機關提出申請？", "opts": ["飛經之直轄市、縣（市）政府", "起飛地點所在直轄市、縣（市）政府提出申請，經所在地及跨縣市政府同意", "降落地點所在直轄市、縣（市）政府", "降落地點所鄰近直轄市、縣（市）政府"], "ans": "B", "exp": "跨縣市飛航應向起飛地點所在縣市政府申請，並經所在地及跨縣市政府同意。"}, {"cat": "專業", "ch": 1, "n": 112, "q": "當災害發生時，欲於各級政府依災害防救法劃定之警戒區域或指定區域內從事遙控無人機飛航活動者，應聽從何者之統一指揮調度？", "opts": ["民航局局長", "當地警察局局長", "當地消防局局長", "各級政府災害應變中心指揮官"], "ans": "D", "exp": "災害警戒或指定區域內飛航，應聽從各級政府災害應變中心指揮官之統一指揮調度。"}, {"cat": "專業", "ch": 1, "n": 113, "q": "政府機關（構）、學校或法人依法應保存遙控無人機之註冊號碼、活動日期、活動區域、飛航時間、飛航性質、操作人員姓名、維護或修理、改裝等紀錄，並應保存多久？", "opts": ["1 年", "2 年", "3 年", "5 年"], "ans": "B", "exp": "相關飛航、維護、改裝等紀錄應保存 2 年。"}, {"cat": "專業", "ch": 1, "n": 114, "q": "有關外國人領有外國政府所核發遙控無人機相關證照者，應向民航局申請認可後使得於本區從事遙控無人機飛航活動之規定，是否亦適用於領有外國政府核發證照之本國人？", "opts": ["是，本國人亦適用", "否，本國人不適用", "視活動時間決定適用與否", "視活動性質決定適用與否"], "ans": "B", "exp": "外國證照認可規定僅適用外國人；領有外國證照之本國人不適用（仍依本國規定）。"}, {"cat": "專業", "ch": 1, "n": 115, "q": "某合格無人機業務團隊受委託以遙控無人機執行山區電纜線路查檢工作。惟因路況不佳，該團隊無法抵達預訂工作區域，為不影響任務進行，成員臨時決定仍將無人機飛至工作區，並以望遠鏡保持與其間之視線接觸。請問該團隊之決定是否違反無人機相關規範？", "opts": ["並無違反遙控無人機相關規範", "已違反遙控無人機相關規範", "有無違反規範視任務執行結果而定", "資訊不足，無法判斷"], "ans": "B", "exp": "以望遠鏡延伸視距屬視距外飛航，未經核准即違反規定。"}, {"cat": "專業", "ch": 1, "n": 116, "q": "某無人機團隊獲准於機場跑道上空測試某項酬載功能，有人建議飛得越高越能展現測試成果，請問操作人對於該建議應有哪項認知？", "opts": ["活動既經核准，即無飛航高度限制，想飛多高就多高", "飛航高度未經核准，仍應遵守距地表面不得逾 400 呎之規定", "飛航高度聽從現場指揮人員視任務執行狀況決定", "飛航高度視能見度好壞決定"], "ans": "B", "exp": "未經核准，仍應遵守距地表不得逾 400 呎之高度限制。"}, {"cat": "專業", "ch": 1, "n": 117, "q": "某無人機團隊正擬定拍攝一大型廟會活動之飛航計畫，請問該團隊對於其執行之任務，應有下列何種正確認知？", "opts": ["團隊技術高超，拍攝時無須特別防護工作", "為達拍攝效果，於任務中任意變換無人機飛航高度甚至接近人群是可以接受的", "重量較輕的無人機相對危害較小，故可隨意飛近目標物進行拍攝", "操作人應領有相應專業操作證，且於執行任務前應申請活動許可"], "ans": "D", "exp": "廟會屬人群聚集活動，應領相應專業操作證並於任務前申請活動許可。"}, {"cat": "專業", "ch": 1, "n": 118, "q": "無人機團隊正在作飛行前準備，臨時被告知因緊急狀況，無人機於飛航時必須裝載由民航局公告之危險物品，請問操作人該有下列哪項正確認知？", "opts": ["僅要能確保無人機飛航時之平衡及控制穩定，即同意該要求，否則拒絕該要求", "未經核准前，依規定不得以無人機裝載危險物品，應直接拒絕該要求", "如該危險物品之包裝完好且易固定，即同意該要求，否則就拒絕該要求", "因為緊急狀況，應無條件同意該要求"], "ans": "B", "exp": "未經核准不得以無人機裝載民航局公告之危險物品，應直接拒絕。"}, {"cat": "專業", "ch": 1, "n": 119, "q": "某款遙控無人機搭載攝影機及 GPS 等裝備，可利用圖傳系統於螢幕上即時傳輸圖像，請問操作人於操作該款無人機時，對於即時傳輸圖像功能應具有下列哪項正確認知？", "opts": ["可完全信賴，操作時不必再監視無人機飛航及其周遭狀況", "只要搭載攝影裝備解析度夠好，即不必再監視無人機飛航及其周遭狀況", "只要操作人技術夠純熟，即不必再監視無人機飛航及其周遭狀況", "無論是否搭載圖傳裝備，操作人仍應隨時監視無人機之飛航及其周遭狀況"], "ans": "D", "exp": "無論是否搭載圖傳，操作人仍應隨時監視無人機飛航及周遭狀況。"}, {"cat": "專業", "ch": 1, "n": 120, "q": "遙控無人機飛航活動對於其他航空器活動、地面人群及建築物所帶來之影響顯而易見，請問就操作人而言，應有下列哪項正確觀念？", "opts": ["反正其他目標物均很明顯，發現時再緊急避讓即可", "應於可操作區域進行飛航、遵守相關規定，隨時注意並防止無人機接近任何其他目標物", "只要於可操作區域內飛航，無人機是否接近其他目標物非操作者的責任", "進行無人機飛航活動時，若有目視觀察員在側，由目視觀察員全權負責無人機與其他目標物之隔離工作"], "ans": "B", "exp": "應於可操作區域飛航、遵守規定，並隨時防止無人機接近其他目標物。"}, {"cat": "專業", "ch": 1, "n": 121, "q": "某明星正在室外舉行音樂發表會，主辦單位看到現場人山人海，為擴大宣傳效果，臨時打算請某無人機團隊利用無人機於現場人群上空進行投擲紀念版 T 恤及 CD 活動，請問下列敘述何者正確？", "opts": ["法規已明訂未取得相應專業操作證及事前活動申請許可，不得以遙控無人機進行投擲作業", "主辦單位只要事先向現場人群說明活動進行方式，即可進行投擲作業", "只要主辦單位提供之 T 恤及 CD 數量能符合無人機酬載需求，即可進行投擲作業", "使用無人機投擲物件稀鬆平常，毫無安全疑慮，可以直接進行投擲作業"], "ans": "A", "exp": "未取得相應專業操作證及事前活動許可，不得以無人機於人群上空進行投擲。"}, {"cat": "專業", "ch": 1, "n": 122, "q": "某電影拍攝作業因取景需求，導演指示團隊將無人機飛入民用航空法所規範之限航區內執行空拍任務，請問下列敘述何者正確？", "opts": ["只要在限航區內不要待太久，趕緊拍攝完畢就好", "非經核准，限航區內不得從事遙控無人機飛航活動", "若限航區位處人煙罕至處，飛進去拍攝無妨", "只要有助手協助觀察限航區內狀況，即可飛入拍攝"], "ans": "B", "exp": "非經核准，限航區內不得從事無人機飛航活動。"}, {"cat": "專業", "ch": 1, "n": 123, "q": "國內某無人機團隊有名外籍成員，雖領有該國政府所核發之合格無人機操作證，惟尚未獲得本國民航局認可。針對該名外籍成員欲參與團隊於本國境內之無人機飛航活動之敘述，下列何者正確？", "opts": ["該員已領有外國政府核發證照，理當可於本國境內從事飛航活動", "如該員已具備無人機操作經歷滿 3 年以上，即可直接於本國境內從事飛航活動", "該員必須獲得本國民航局認可，使得於本國境內從事飛航活動", "只要無人機團隊有人願簽切結書擔保活動之安全，該員即可於本國境內從事飛航活動"], "ans": "C", "exp": "外籍成員須先獲我國民航局認可，始得於本國境內從事飛航活動。"}, {"cat": "專業", "ch": 1, "n": 124, "q": "王大華從某購物商場購買一台最大起飛重量 950 公克的無人多旋翼機，欲作為假日出遊紀錄小孩玩樂過程的利器，有關王大華應注意事項，下列哪項正確？", "opts": ["王大華不須為該台無人多旋翼機辦理註冊", "王大華須取得高級專業操作證後，才能操作該台無人多旋翼機", "王大華不得任意於機場周邊進行飛航操作", "王大華須為該台無人多旋翼機辦理實體檢驗"], "ans": "C", "exp": "950 公克且於機場周邊——不得任意於機場周邊飛航（未達 15 公斤免實體檢驗、逾 250 公克仍須註冊）。"}, {"cat": "專業", "ch": 1, "n": 125, "q": "某大學校慶活動，預計於該校室內體育館舉行一場無人機競技比賽，請問有關該比賽之適法性問題，下列何者為非？", "opts": ["該比賽舉辦地點於室內，非屬民航法無人機專章規範範圍", "該比賽舉辦地點雖於室內，仍屬民航法無人機專章規範範圍", "操作人於比賽過程中仍須注意在場人員之安全", "比賽過程中如因操作人操作不當而傷及他人者，操作人仍可能須負相關法律責任"], "ans": "B", "exp": "室內密閉空間非屬民航法無人機專章規範範圍，故B（仍屬規範）為非。"}, {"cat": "專業", "ch": 1, "n": 126, "q": "某無人機團隊受知名電視台委託，要利用無人機進行即時新聞事件之空拍作業，惟團隊經評估後認為該空拍作業可能存在安全顧慮，請問該團隊面對電視台之委託，採取下列何項作法較為恰當？", "opts": ["僅須視操作人經驗決定是否接受該任務", "視電視台給予酬勞多寡決定是否接受該任務", "評估有安全顧慮即應婉拒該任務，並詳細解釋其原因", "視任務活動投保額度高低決定是否接受該任務"], "ans": "C", "exp": "評估有安全顧慮即應婉拒任務並說明原因，安全優先於商業考量。"}, {"cat": "專業", "ch": 1, "n": 127, "q": "小陳為某新成立無人機業務公司負責人，目前除積極招兵買馬外，亦準備購入 20 台不同構型、重量之業務用無人機。請問小陳對於該公司所購入無人機之註冊相關規定，下列敘述何者正確？", "opts": ["所有無人機均須辦理註冊", "最大起飛重量超過 250 公克之無人機才須辦理註冊", "僅須為所採購無人機之半數辦理註冊即可", "由主管機關決定應辦理註冊之無人機數量"], "ans": "A", "exp": "公司業務用無人機（逾 250 公克）均須辦理註冊。"}, {"cat": "專業", "ch": 1, "n": 128, "q": "某公司因業務需求所購入之一批無人機剛完成向民航局申請之註冊程序，請問該公司對於註冊號碼之標註規定所應有認知，下列何者為非？", "opts": ["註冊號碼標註位置須能清楚辨識", "註冊號碼得以噴漆方式標註", "須確保註冊號碼不會於每次飛航活動中脫落", "無人機之移動結構外部最適合作為註冊號碼標註之處"], "ans": "D", "exp": "註冊號碼應標於固定結構外部；標於「移動結構外部」為錯誤。"}, {"cat": "專業", "ch": 1, "n": 129, "q": "某無人機團隊因特殊任務需求所新購之一架無人機尚未完成註冊程序，惟因任務在即，有成員建議先借用另一架已註冊無人機之註冊號碼，再向民航局報備即可。請問針對該成員之主張，下列何者為正確？", "opts": ["註冊號碼本來就可以互相借用，並無違反相關規定", "只要所借用註冊號碼同屬該團隊其他無人機所有，即無違反相關規定", "只要先向民航局報備獲准借用，即無違反相關規範", "註冊號碼不得借供於未註冊之無人機上使用，該成員之主張已明顯違反相關規範"], "ans": "D", "exp": "註冊號碼不得借供未註冊之無人機使用，該主張違反規定。"}, {"cat": "專業", "ch": 1, "n": 130, "q": "無人機團隊因任務需要，為其所有之一架已取得型式檢驗合格證之無人機進行改裝行為，請問該團隊針對無人機改裝後之應有認知，下列何者正確？", "opts": ["改裝者應檢附申請書向民航局再次申請型式檢驗", "改裝行為並不影響型式檢驗之效力，無須再進行任何檢驗", "該團隊能擔保改裝行為不影響無人機飛航性能及安全，即不須再進行任何檢驗", "由主管機關自由判定改裝行為是否須進行重新檢驗"], "ans": "A", "exp": "改裝後，改裝者應檢附申請書向民航局再次申請型式檢驗。"}, {"cat": "專業", "ch": 1, "n": 131, "q": "某團隊擁有一架最大起飛重量達 30 公斤之無人飛機逾半年之久，經過幾次任務後發現該機因某項設計缺失而恐致操作安全疑慮，請問該團隊應有下列何項認知及作為？", "opts": ["只要加強操作人技術及應付緊急狀況之能力即可，不須採取其他作為", "團隊應儘速詢求該無人機設計者，以針對設計缺失進行補正作為", "於往後每次活動區域內設置安全防護網即可，不須採取其他作為", "於往後活動前只要記得投保較高額度之保險即可，不須採取其他作為"], "ans": "B", "exp": "發現設計缺失恐致安全疑慮，應儘速請設計者針對缺失進行補正。"}, {"cat": "專業", "ch": 1, "n": 132, "q": "某電影公司欲拍攝高速公路警匪追逐場景，為求逼真效果，電影公司要求無人機團隊操作無人機近距離拍攝疾駛於高速公路上之車輛，請問操作人應有哪項正確認知？", "opts": ["這是訓練自己技術的好機會，應大膽接受任務", "看在電影公司給予高額酬勞的份上，理應接受該任務", "只要團隊多數人認為可以執行，即應接受該任務", "未經核准飛航前，無人機飛航活動應遠離高速公路至少 30 公尺以上，該任務顯違反規定，應予以拒絕"], "ans": "D", "exp": "未經核准飛航應遠離高速公路至少 30 公尺以上，該任務違規應拒絕。"}, {"cat": "專業", "ch": 1, "n": 133, "q": "某區域發生強烈地震，造成人員傷亡及財產損害嚴重，某新聞機構要求無人機團隊不待申請，立即趕赴當地執行空拍任務，以便進行獨家即時新聞報導，請問該團隊應有何種正確認知？", "opts": ["緊急情況時，應遵守災害防救法之規定，統一聽從政府災害應變中心指揮及調度，不可擅自進行拍攝", "因屬災害危難事件、人命關天，應不顧一切答應其要求，並立即前往進行拍攝", "只要取得欲拍攝區域之里長口頭同意後，即可進行拍攝任務", "只要取得欲拍攝區域之消防主管機關口頭同意後，即可進行拍攝任務"], "ans": "A", "exp": "災害發生時應依災害防救法，聽從政府災害應變中心指揮調度，不可擅自拍攝。"}, {"cat": "專業", "ch": 1, "n": 134, "q": "某大學順應潮流成立無人機社團，其成員亦將成為該校未來無人機業務執行主力。學校為擴大宣傳，臨時決定某日下午於校園空曠處進行無人機飛航展示活動，請問下列認知何者正確？", "opts": ["校園內飛航無受法規限制，可盡情執行飛航展示活動", "只要經學校同意，並於活動現場派員口頭宣導注意事項，即可任意進行飛航展示活動", "該校仍應於完成飛航活動許可申請後，始得依申請內容進行飛航操作展示", "為展示無人機性能，刻意將無人機飛越人群、教室或辦公區域是可允許的"], "ans": "C", "exp": "校園展示仍須完成飛航活動許可申請後，始得依申請內容操作。"}, {"cat": "專業", "ch": 1, "n": 135, "q": "小華為某公司無人機業務部門主管兼資深飛手，請問有關每趟飛航任務之操作紀錄、無人機維護紀錄及相關修理紀錄等處置事宜，小華應有哪項正確認知？", "opts": ["法規針對相關紀錄之處置並無明確規範，隨公司高層想怎麼處理都可以", "相關紀錄內容隨便寫寫就好，反正任務完成、機器能正常運作即可", "明知飛航任務中發生異常現象，為利團隊績效，自行研判若不嚴重，即不須特別紀錄", "公司應妥善保存每趟任務之相關紀錄，法規針對紀錄事項及保存期限等亦有相關規定"], "ans": "D", "exp": "公司應妥善保存每趟任務之操作、維護、修理等紀錄，法規對紀錄事項及保存期限有規定。"}, {"cat": "專業", "ch": 1, "n": 136, "q": "一架最大起飛重量 5 公斤且裝置導航設備之遙控無人機於海岸邊執行空拍任務時，因操作不當而致失控墜海，目視機體已明顯損壞無法繼續使用。請問操作人應採取下列哪項正確作為？", "opts": ["只要無造成人員傷亡，即不須作任何處置", "只要無造成人員傷亡，只需要把墜海的無人機拾回即可", "無論有無造成人員傷亡，應於事件發生後 24 小時內依規定通報當地消防單位", "無論有無造成人員傷亡，應於事件發生後 24 小時內依規定通報民航局"], "ans": "D", "exp": "2 公斤以上且裝導航設備之無人機發生實質損害，應於 24 小時內通報民航局。"}, {"cat": "專業", "ch": 1, "n": 137, "q": "某無人機團隊正規劃一場沙灘音樂饗宴任務，其內容包括：「日落後利用無人機於參與民眾上空噴灑彩色粉末，以製造繽紛效果」。請問下列何者為該團隊執行任務前最重要之考量因素？", "opts": ["操作者之飛航技術及膽識是否足夠", "彩色粉末之數量是否足夠活動需求", "該任務是否已經申請核准，操作者是否領有相應操作證", "現場燈光及音效設備是否良好，以營造絢麗歡樂效果"], "ans": "C", "exp": "最重要考量：任務是否已申請核准、操作者是否領有相應操作證（夜航＋人群上空＋噴灑）。"}, {"cat": "專業", "ch": 1, "n": 138, "q": "某公司無人機團隊正執行飛航任務，突接獲上層電話指示須臨時將無人機飛至前方人群密集之住宅區拍攝所需影像，並表示公司先前已獲得民航局相關安全能力審查通過，可放心飛入執行拍攝。」請問該團隊應有下列何種正確認知？", "opts": ["當然是聽從上層的要求，直接飛入住宅區進行拍攝", "活動前仍應依規定向民航局申請執行許可後，使得進行拍攝", "只要臨時通知所在地轄區派出所後，即可進行拍攝", "只要臨時通知所在地轄區里長辦公室後，即可進行拍攝"], "ans": "B", "exp": "活動前仍應依規定向民航局申請執行許可後，始得進行拍攝。"}, {"cat": "專業", "ch": 1, "n": 139, "q": "某業餘玩家利用假日至一處未被劃設禁飛區域內進行無人機試飛活動，並預劃完成數項操作科目，此時已接近日落，尚有幾個科目未完成，請問有關下列該玩家應注意事項，何者正確？", "opts": ["該區域非為禁飛區，故該玩家於日落後仍可持續進行科目操作", "該玩家於日落前即應終止其飛航科目操作", "如果天氣良好即可於日落後持續進行飛航科目操作", "只要觀察四周無人，即可於日落後持續進行飛航科目操作"], "ans": "B", "exp": "休閒娛樂飛航不得於日落後進行，該玩家應於日落前終止科目操作。"}, {"cat": "專業", "ch": 1, "n": 140, "q": "假設現有以下資訊： 1.日落時間為本地時間 18 點 46 分。 2.民用暮光時間為 19 點 12分。 3.航海暮光時間為 19 點 43 分。 4.天文暮光時間為 20 點 16 分。 請問無人機操作人應於何時終止飛航活動？", "opts": ["18 點 46 分", "19 點 12 分", "19 點 43 分", "20 點 16 分"], "ans": "A", "exp": "應於日落時間（18:46）終止飛航活動，暮光時間不算在內。"}, {"cat": "專業", "ch": 1, "n": 141, "q": "無人機團隊正評估釣客欲於近海海域使用無人機至離岸數公里處進行投放釣餌之操作需求，請問下列哪項說明為該團隊最重要之考量因素？", "opts": ["無人機裝載釣餌前後之重量與重心變化是否於其操作限制內", "無人機之動力來源是否足以支撐該項投擲任務之完成", "涉及利用無人機投擲物體之限制操作項目，應申請活動許可並應考取相關操作證", "釣客是否投保相關保險並願意簽署任務執行切結書"], "ans": "C", "exp": "投放釣餌涉及投擲操作，應申請活動許可並考取相關操作證，為最重要考量。"}, {"cat": "專業", "ch": 1, "n": 142, "q": "某雜誌社委託無人機團隊利用無人機執行一項具有相當危險性之飛航任務，負責人並保證：「於執行任務過程中若發生任何事件，導致人員死傷或財物毀損，均由雜誌社全權負責，請團隊安心進行任務。」請問有關該負責人之保證，下列敘述何者正確？", "opts": ["雜誌社要能提供書面保證及繳交足額保證金，使得作為團隊免責之依據", "只要不是故意造成人員死傷或財物毀損，任一方均不須負賠償責任", "只要活動經申請核准執行，且已作有必要防護措施者，任一方均不須負賠償責任", "操作無人機造成人員死傷或財物毀損，不論故意或過失，應由所有人及操作人負連帶賠償責任"], "ans": "D", "exp": "操作無人機致人死傷或財損，不論故意過失，由所有人及操作人負連帶賠償責任。"}, {"cat": "專業", "ch": 1, "n": 143, "q": "無人機團隊自行設計並組裝一架無人機，以因應越趨多元之任務型態，因某次任務時程緊迫，團隊雖然知道該無人機尚未通過檢驗核可，仍決議先進行任務使用，等任務結束後再趕緊完成檢驗程序。請問有關該團隊之決議，下列敘述何整正確？", "opts": ["只要於任務前先以口頭知會民航局，並於任務後儘快送檢即可", "只要於任務後以口頭知會民航局，並儘快送檢即可", "未經向民航局申請檢驗取得檢驗合格證者，不得從事飛航活動", "於任務前先以口頭知會民航局，並由民航局決定是否准予先執行任務，後續再完成檢驗程序"], "ans": "C", "exp": "未取得檢驗合格證者不得從事飛航活動，口頭知會不能代替。"}, {"cat": "專業", "ch": 1, "n": 144, "q": "某無人機團隊所有之一架無人機，於一次任務中因動力失效而墜落地面，機身經檢視受損嚴重，並經評估恐難以再修復使用。請問團隊針對該無人機應有之後續處置作為，下列敘述何者正確?", "opts": ["該無人機既已損毀，直接丟棄即可，惟應保留其註冊號碼及檢驗合格證", "再購買一架新無人機，並得直接使用原損壞無人機之註冊號碼，惟不能使用其檢驗合格證", "再購買一架新無人機，並得直接使用原損壞無人機之檢驗合格證，惟不能使用其註冊號碼", "所有人應於事實發生日起 15 日內向民航局申請註銷註冊。其註冊號碼及檢驗合格證均不得使用於其他無人機"], "ans": "D", "exp": "損毀無法修復者，所有人應於 15 日內向民航局申請註銷註冊，號碼與合格證不得移用。"}, {"cat": "專業", "ch": 1, "n": 145, "q": "某無人機團隊已獲得民航局安全能力審查核可，得於人群聚集處進行空拍任務。於某次任務執行前，團隊依規定向民航局申請活動許可，惟對於是否應向當地地方政府申請一事意見相左，請問下列敘述何者正確？", "opts": ["法律為民航局訂定的，當然只要向民航局申請即可", "一般而言，經民航局核准後，地方政府通常不會有意見，故不須再做申請", "除獲民航局許可外，仍應取得地方政府之同意，故還是得做申請", "是否要向地方政府申請，依執行任務之危險度或複雜度而定"], "ans": "C", "exp": "除民航局許可外，仍應取得地方政府同意，兩者皆須申請。"}, {"cat": "專業", "ch": 1, "n": 146, "q": "有關操作人從事遙控無人機飛航活動時應注意之距離限制，下列何者為正確？", "opts": ["應至少距高速公路範圍 10 公尺以上", "應至少距高架鐵路範圍 20 公尺以上", "應至少距建築物及障礙物範圍 30 公尺以上", "以上均正確"], "ans": "C", "exp": "應至少距建築物及障礙物範圍 30 公尺以上。"}, {"cat": "專業", "ch": 2, "n": 1, "q": "遙控無人機系統包含下列哪項主要次系統？", "opts": ["遙控無人機體", "遙控設備", "通訊及控制信號鏈路", "以上皆是"], "ans": "D", "exp": "系統含飛行載具、遙控設備與通訊控制鏈路三大次系統。"}, {"cat": "專業", "ch": 2, "n": 2, "q": "遙控無人機系統之飛行載具，包括下列哪些項目？", "opts": ["機體、負載設備及酬載", "機體、燃料或電池", "機體、燃料或電池、負載設備及酬載", "機體、燃料或電池、負載設備及酬載、遙控設備"], "ans": "C", "exp": "飛行載具＝機體＋能源（燃料/電池）＋負載設備及酬載；遙控設備不算在載具內。"}, {"cat": "專業", "ch": 2, "n": 3, "q": "遙控無人機系統之地面控制站的硬體設備，包括下列哪個項目？", "opts": ["訊號傳輸設備", "指令傳輸設備", "資訊接收分析設備", "以上皆是"], "ans": "D", "exp": "地面站含訊號傳輸、指令傳輸與資訊接收分析設備。"}, {"cat": "專業", "ch": 2, "n": 4, "q": "遙控無人飛機起飛時，除跑道起飛外，還可運用下列哪項裝置？", "opts": ["火箭助推", "彈射軌道發射", "人力拋擲", "以上皆是"], "ans": "D", "exp": "可用火箭助推、彈射軌道或人力拋擲起飛。"}, {"cat": "專業", "ch": 2, "n": 5, "q": "遙控無人飛機降落時，除跑道降落外，也可運用下列哪項方式？", "opts": ["攔截網", "纜線勾鎖", "降落傘", "以上皆是"], "ans": "D", "exp": "可用攔截網、纜線勾鎖或降落傘降落。"}, {"cat": "專業", "ch": 2, "n": 6, "q": "遙控無人機許多層面都還是要由人員來掌握及操控，所以下列哪個因素在整體飛行過程中佔了很重要的一部分？", "opts": ["人為因素", "運氣因素", "社會因素", "歷史因素"], "ans": "A", "exp": "許多操控仍靠人，人為因素至關重要。"}, {"cat": "專業", "ch": 2, "n": 7, "q": "完整之飛控系統包括下列哪個部分？", "opts": ["感測器", "機載計算機", "伺服器", "以上皆是"], "ans": "D", "exp": "飛控系統含感測器、機載計算機與伺服器（作動器）。"}, {"cat": "專業", "ch": 2, "n": 8, "q": "完整之飛控系統可實現遙控無人機下列哪項功能？", "opts": ["姿態穩定和控制", "任務管理", "緊急控制模式", "以上皆是"], "ans": "D", "exp": "可達成姿態控制、任務管理及緊急控制。"}, {"cat": "專業", "ch": 2, "n": 9, "q": "下列哪個是飛行控制系統的輸入裝置，用以保持控制精度？", "opts": ["機載計算機", "感測器", "伺服器", "以上皆是"], "ans": "B", "exp": "感測器為輸入端（量測姿態、位置等）。"}, {"cat": "專業", "ch": 2, "n": 10, "q": "導航系統提供遙控無人機哪項資訊？", "opts": ["位置", "速度", "飛行姿態", "以上皆是"], "ans": "D", "exp": "導航系統提供位置、速度與姿態資訊。"}, {"cat": "專業", "ch": 2, "n": 11, "q": "遙控無人機導航系統主要分為下列哪兩種？", "opts": ["非自主（如 GPS）和自主（慣性導航）", "高精度和一般精度", "高抗干擾和低抗干擾", "全自動和半自動"], "ans": "A", "exp": "分為非自主（GPS 等外部訊號）與自主（慣性導航）。"}, {"cat": "專業", "ch": 2, "n": 12, "q": "遙控無人機非自主（如 GPS）導航系統有下列哪個缺點？", "opts": ["操作困難", "易受干擾", "誤差積累增大", "以上皆是"], "ans": "B", "exp": "GPS 依賴外部訊號，易受遮蔽或干擾。"}, {"cat": "專業", "ch": 2, "n": 13, "q": "遙控無人機自主（慣性導航）導航系統有下列哪個缺點？", "opts": ["操作困難", "易受干擾", "誤差積累增大", "以上皆是"], "ans": "C", "exp": "慣性導航靠積分推算，長時間會誤差累積。"}, {"cat": "專業", "ch": 2, "n": 14, "q": "遙控無人機將朝向下列哪個方向繼續發展？", "opts": ["高精度", "高可靠度", "高抗干擾", "以上皆是"], "ans": "D", "exp": "朝高精度、高可靠、高抗干擾發展。"}, {"cat": "專業", "ch": 2, "n": 15, "q": "遙控無人機導航與自動避讓系統的發展，包括下列哪項重點？", "opts": ["慣性導航", "多感應器融合、GPS", "光電系統技術整合", "以上皆是"], "ans": "D", "exp": "結合慣性、GPS、多感測融合與光電技術。"}, {"cat": "專業", "ch": 2, "n": 16, "q": "遙控無人機的動力系統，都朝向下列哪個方向發展？", "opts": ["體積小、重量輕", "成本低", "可靠度高", "以上皆是"], "ans": "D", "exp": "朝輕小、低成本、高可靠發展。"}, {"cat": "專業", "ch": 2, "n": 17, "q": "遙控無人機的能量來源可以包括下列哪項？", "opts": ["太陽能", "氫能", "鋰電池", "以上皆是"], "ans": "D", "exp": "能源可為太陽能、氫能或鋰電池等。"}, {"cat": "專業", "ch": 2, "n": 18, "q": "負責對遙控無人機之命令與控制、資料鏈路等工作的，是下列哪個系統？", "opts": ["動力系統", "無線通訊系統", "導航系統", "飛行控制系統"], "ans": "B", "exp": "命令控制與資料鏈路由無線通訊系統負責。"}, {"cat": "專業", "ch": 2, "n": 19, "q": "遙控無人機控制鏈路為保密與抗干擾基本上已全面採行下列哪種方式？", "opts": ["類比化", "模組化", "數位化", "離散化"], "ans": "C", "exp": "控制鏈路已全面數位化以利保密與抗干擾。"}, {"cat": "專業", "ch": 2, "n": 20, "q": "遙控無人機的圖傳主要資料傳輸形態有下列哪幾種方式？", "opts": ["高速、寬頻", "類比、數位", "單工、衛星", "雙工、衛星"], "ans": "B", "exp": "圖傳分類比與數位兩種形態。"}, {"cat": "專業", "ch": 2, "n": 21, "q": "遙控無人機的通訊技術朝向下列哪個方向發展？", "opts": ["高速、寬頻", "保密", "抗干擾", "以上皆是"], "ans": "D", "exp": "朝高速寬頻、保密、抗干擾發展。"}, {"cat": "專業", "ch": 2, "n": 22, "q": "隨著機載感測器精度和任務複雜度的上升，機載處理器的下列哪項需求也將隨之提高？", "opts": ["運算需求", "保密需求", "抗干擾需求", "重量需求"], "ans": "A", "exp": "資料量增加使運算需求提高。"}, {"cat": "專業", "ch": 2, "n": 23, "q": "所謂航空器，係指任何藉空氣之下列哪種力，得以飛航於大氣中之器物？", "opts": ["摩擦力", "靜電力", "反作用力", "以上皆是"], "ans": "C", "exp": "航空器藉空氣之反作用力飛航。"}, {"cat": "專業", "ch": 2, "n": 24, "q": "遙控無人機比空氣重，無法只藉由空氣的浮力而上升，需要相對應的下列哪個項目在空中飛行？", "opts": ["能量", "機身外表顏色", "起落架材質", "以上皆是"], "ans": "A", "exp": "重於空氣的飛行需要能量產生升力與推力，故選能量。"}, {"cat": "專業", "ch": 2, "n": 25, "q": "航空器利用噴射推力或是螺旋槳的拉力，使航空器產生下列哪種力而在空中飛行？", "opts": ["內力", "升力", "彈力", "以上皆是"], "ans": "B", "exp": "推進系統配合翼面產生升力使其飛行。"}, {"cat": "專業", "ch": 2, "n": 26, "q": "飛行速度快、酬載大、飛行效率高，不需太複雜控制，就可自行抵抗氣流而自行保持穩定的飛行的遙控無人機，是下列哪種遙控無人機？", "opts": ["遙控無人直昇機", "遙控無人飛機", "遙控無人多旋翼機", "以上皆是"], "ans": "B", "exp": "固定翼無人飛機速度快、效率高、氣動自穩，故選遙控無人飛機。"}, {"cat": "專業", "ch": 2, "n": 27, "q": "遙控無人飛機缺點是需要有下列哪個項目供起降之用？", "opts": ["相當的跑道高度", "相當的跑道溫度", "相當的跑道長度", "以上皆是"], "ans": "C", "exp": "固定翼多需一定跑道長度起降。"}, {"cat": "專業", "ch": 2, "n": 28, "q": "透過旋翼槳葉產生升力，同時也能產生推力的遙控無人機，是下列哪種遙控無人機？", "opts": ["遙控無人直昇機", "遙控無人飛機", "遙控無人多旋翼機", "以上皆是"], "ans": "A", "exp": "直昇機主旋翼可同時提供升力與推力。"}, {"cat": "專業", "ch": 2, "n": 29, "q": "無人直昇機可以執行下列哪個動作？", "opts": ["自由調整姿態", "定點盤旋", "起飛與落地", "以上皆是"], "ans": "D", "exp": "直昇機可調姿態、定點懸停與垂直起降。"}, {"cat": "專業", "ch": 2, "n": 30, "q": "透過三個以上垂直旋翼間協調來控制姿態，同樣不需跑道，可垂直起降、空中懸停等的遙控無人機，是下列哪種遙控無人機？", "opts": ["無人多旋翼機", "無人直昇機", "無人飛機", "以上皆是"], "ans": "A", "exp": "此為多旋翼機的特性。"}, {"cat": "專業", "ch": 2, "n": 31, "q": "操作人只要在遙控設備上施加桿力，就可改變遙控無人機的下列哪些性能？", "opts": ["重量或重心", "外形或顏色", "方向或速度", "翼展與翼弦"], "ans": "C", "exp": "操縱改變的是方向與速度（姿態/運動）。"}, {"cat": "專業", "ch": 2, "n": 32, "q": "若無人飛機在地面上靜止，依牛頓運動定律，下列哪個特性會使得飛機保持靜止？", "opts": ["慣性", "磁性", "氣壓", "空氣濕度"], "ans": "A", "exp": "慣性（第一定律）使靜者恆靜。"}, {"cat": "專業", "ch": 2, "n": 33, "q": "若無人飛機保持固定的空速以直線行進，依牛頓運動定律，下列哪個特性會使得飛機持續保持穩定的直線飛行？", "opts": ["磁性", "氣壓", "慣性", "空氣濕度"], "ans": "C", "exp": "慣性使等速直線運動維持。"}, {"cat": "專業", "ch": 2, "n": 34, "q": "無人飛機於頂風飛行時，地面速度就會有下列哪種變化？", "opts": ["變快", "不變", "變慢", "以上皆非"], "ans": "C", "exp": "頂（逆）風時對地速度變慢。"}, {"cat": "專業", "ch": 2, "n": 35, "q": "若風從無人飛機前方的任一方向吹來，倘若飛行員沒有隨之修正，那下列哪個特性就會受到風所施加的力而改變？", "opts": ["重量", "重心", "航向", "推力"], "ans": "C", "exp": "側／逆風未修正會使航向偏移。"}, {"cat": "專業", "ch": 2, "n": 36, "q": "噴射機將燃燒的熱氣體往後推送以施加作用力，相對的有相等且相反的下列哪種力，將飛機往前推進？", "opts": ["反作用力", "摩擦力", "靜電力", "磁力"], "ans": "A", "exp": "牛頓第三定律：反作用力推進。"}, {"cat": "專業", "ch": 2, "n": 37, "q": "遙控無人機在空中飛行時，會受到下列哪些力相互作用的影響？", "opts": ["升力、推力", "推力、阻力", "阻力、重力", "以上皆是"], "ans": "D", "exp": "受升力、推力、阻力、重力四力作用。"}, {"cat": "專業", "ch": 2, "n": 38, "q": "無人飛機推力由下列哪個組件提供？", "opts": ["發動機", "起落架", "機翼", "機身"], "ans": "A", "exp": "推力由發動機（含螺旋槳）提供。"}, {"cat": "專業", "ch": 2, "n": 39, "q": "無人飛機阻力由下列哪個項目產生？", "opts": ["地心引力", "重心", "空氣", "發動機"], "ans": "C", "exp": "阻力由空氣作用產生。"}, {"cat": "專業", "ch": 2, "n": 40, "q": "無人飛機升力由下列哪個項目提供？", "opts": ["起落架", "機翼", "重心", "地心引力"], "ans": "B", "exp": "升力由機翼產生。"}, {"cat": "專業", "ch": 2, "n": 41, "q": "重力由下列哪個項目產生？", "opts": ["空氣", "地心引力", "發動機", "機翼"], "ans": "B", "exp": "重力來自地心引力。"}, {"cat": "專業", "ch": 2, "n": 42, "q": "飛機等速直線飛行時，縱軸(X 軸)方向阻力與推力大小相同方向相反，所以有下列哪種情況？", "opts": ["橫軸(Y 軸)方向合力為零，飛機無升降起伏", "垂直軸(Z 軸)方向合力為零，飛機無偏航的姿態", "縱軸(X 軸)方向合力為零，飛機速度不變", "以上皆是"], "ans": "C", "exp": "縱軸(X)方向合力為零，故速度不變。"}, {"cat": "專業", "ch": 2, "n": 43, "q": "飛機高度保持時，垂直軸(Z 軸)方向升力與重力大小相同方向相反，所以有下列哪種情況？", "opts": ["橫軸(Y 軸)方向合力為零，飛機無偏航的姿態", "垂直軸(Z 軸)方向合力為零，飛機無升降起伏", "縱軸(X 軸)方向合力為零，飛機速度不變", "以上皆是"], "ans": "B", "exp": "垂直軸(Z)方向合力為零，故無升降起伏。"}, {"cat": "專業", "ch": 2, "n": 44, "q": "連續性定理闡述了流體在流動中，下列哪些項目之間的關係？", "opts": ["流速和管道切面", "流速和溫度", "管道切面和溫度", "溫度和壓力"], "ans": "A", "exp": "連續方程式：流速與管道截面積相關（截面小流速快）。"}, {"cat": "專業", "ch": 2, "n": 45, "q": "連續性定理闡述了流體在流動中，流速和管道切面相關，而且下列哪些項目也相關？", "opts": ["流速和壓力", "流速和溫度", "管道切面和溫度", "溫度和壓力"], "ans": "A", "exp": "結合柏努利，流速與壓力相關。"}, {"cat": "專業", "ch": 2, "n": 46, "q": "柏努利定律說明流體在一個管道中流動時，有下列哪種現象？", "opts": ["流速大的地方壓力大，流速小的地方壓力小", "流速大的地方壓力大，流速小的地方壓力也大", "流速大的地方壓力小，流速小的地方壓力大", "流速大的地方壓力小，流速小的地方壓力也小"], "ans": "C", "exp": "柏努利定律：流速大處壓力小、流速小處壓力大。"}, {"cat": "專業", "ch": 2, "n": 47, "q": "柏努利定律目的是要闡述流體在流動中時，下列哪些項目間的關係？", "opts": ["流速和溫度", "流速和壓力", "溫度和壓力", "以上皆非"], "ans": "B", "exp": "描述流速與壓力的關係。"}, {"cat": "專業", "ch": 2, "n": 48, "q": "柏努利定律中提到，如果流體的速度越快，流體中的壓力就會有下列哪種現象？", "opts": ["越小", "越大", "不變", "有時越小有時越大"], "ans": "A", "exp": "流速越快，壓力越小。"}, {"cat": "專業", "ch": 2, "n": 49, "q": "遙控無人機的機翼或旋翼是下列哪種外力主要產生的地方？", "opts": ["阻力", "升力", "推力", "重力"], "ans": "B", "exp": "機翼主要產生升力。"}, {"cat": "專業", "ch": 2, "n": 50, "q": "基於連續性定理、柏努利定律兩個理論，我們可以知道機翼上、下表面會出現下列哪種現象？", "opts": ["溫度差", "壓力差", "濕度差", "比熱差"], "ans": "B", "exp": "上表面流速快壓力小、下表面壓力大，形成壓力差。"}, {"cat": "專業", "ch": 2, "n": 51, "q": "垂直於相對氣流方向的壓力差之總和就是下列哪種外力？", "opts": ["槳葉本身的攻角設計", "空氣的阻力", "機翼的升力", "地心引力"], "ans": "C", "exp": "垂直於相對氣流的壓力差總和即為機翼升力。"}, {"cat": "專業", "ch": 2, "n": 52, "q": "螺旋槳產生的推力是藉由下列哪個項目而成？", "opts": ["槳葉本身的攻角設計", "螺旋槳轉速", "以上皆是", "以上皆非"], "ans": "C", "exp": "推力由槳葉攻角設計配合轉速產生，故選以上皆是。"}, {"cat": "專業", "ch": 2, "n": 53, "q": "螺旋槳轉速通常以下列哪個項目來表示？", "opts": ["每秒徑度（rad/s）", "每分鐘轉數（RPM）", "赫茲 (Hz)", "每分鐘徑度（rad/min）"], "ans": "B", "exp": "轉速常以每分鐘轉數 RPM 表示。"}, {"cat": "專業", "ch": 2, "n": 54, "q": "一般螺旋槳攻角最大的位置在槳葉的下列哪個位置？", "opts": ["槳葉根部", "槳葉葉尖", "槳葉中尖", "以上皆是"], "ans": "A", "exp": "越靠根部線速度小，需較大攻角，故根部攻角最大。"}, {"cat": "專業", "ch": 2, "n": 55, "q": "飛機螺旋槳在原廠設計時，為了設計出高效率的槳葉角度，係依據發動機及飛機的下列哪些特性做為基礎？", "opts": ["銷量和價格", "耗油量和扭力", "壓縮比和衝程", "轉速和空速"], "ans": "D", "exp": "依轉速與空速設計最佳槳葉角度。"}, {"cat": "專業", "ch": 2, "n": 56, "q": "航空器於飛行中，在空氣裡會有下列哪種外力？", "opts": ["各種彈力", "各種阻力", "各種磁力", "各種正向力"], "ans": "B", "exp": "飛行中受各種空氣阻力。"}, {"cat": "專業", "ch": 2, "n": 57, "q": "某外力係與飛機運動方向相反的空氣動力，會阻礙飛機的前進，它是下列哪種外力？", "opts": ["阻力", "升力", "重力", "推力"], "ans": "A", "exp": "與運動方向相反者為阻力。"}, {"cat": "專業", "ch": 2, "n": 58, "q": "寄生阻力可分為下列哪幾種？", "opts": ["摩擦阻力", "形狀阻力", "干擾阻力", "以上皆是"], "ans": "D", "exp": "寄生阻力含摩擦、形狀、干擾阻力。"}, {"cat": "專業", "ch": 2, "n": 59, "q": "對於高速遙控無人機而言，除了摩擦阻力、形狀阻力、誘導阻力和干擾阻力外，還會另外產生下列哪種阻力？", "opts": ["震波阻力", "布斯曼阻力", "達倫伯特阻力", "雷諾阻力"], "ans": "A", "exp": "接近音速時產生震波阻力。"}, {"cat": "專業", "ch": 2, "n": 60, "q": "下列哪個項目是空氣產生摩擦力的主要物理特性？", "opts": ["粘性", "低汙染", "PM2.5", "高揮發性"], "ans": "A", "exp": "空氣的黏性造成摩擦阻力。"}, {"cat": "專業", "ch": 2, "n": 61, "q": "空氣流經飛機表面發生摩擦，產生一個阻止飛機前進的力，這個力就是下列哪種阻力？", "opts": ["形狀阻力", "誘導阻力", "摩擦阻力", "干擾阻力"], "ans": "C", "exp": "表面粗糙度主要影響摩擦阻力。"}, {"cat": "專業", "ch": 2, "n": 62, "q": "摩擦阻力的大小，決定於下列哪個特性？", "opts": ["空氣的粘性", "飛機的表面狀況", "同空氣相接觸的飛機表面積", "以上皆是"], "ans": "D", "exp": "摩擦阻力取決於空氣黏性、表面狀況與接觸面積，故選以上皆是。"}, {"cat": "專業", "ch": 2, "n": 63, "q": "空氣粘性越大，摩擦阻力就會有下列哪種變化？", "opts": ["越小", "越大", "不變", "以上皆非"], "ans": "B", "exp": "黏性越大摩擦阻力越大。"}, {"cat": "專業", "ch": 2, "n": 64, "q": "飛機表面越粗糙，摩擦阻力就會有下列哪種變化？", "opts": ["越小", "不變", "越大", "以上皆非"], "ans": "C", "exp": "越粗糙摩擦阻力越大。"}, {"cat": "專業", "ch": 2, "n": 65, "q": "飛機表面積越大，摩擦阻力就會有下列哪種變化？", "opts": ["越大", "越小", "不變", "以上皆非"], "ans": "A", "exp": "接觸面積越大摩擦阻力越大。"}, {"cat": "專業", "ch": 2, "n": 66, "q": "由前後壓力差形成的阻力叫下列哪種阻力？", "opts": ["摩擦阻力", "形狀阻力", "誘導阻力", "干擾阻力"], "ans": "B", "exp": "前後壓力差形成形狀（壓差）阻力。"}, {"cat": "專業", "ch": 2, "n": 67, "q": "人在逆風中行走，會感到阻力的作用，這就是下列哪種阻力？", "opts": ["摩擦阻力", "誘導阻力", "形狀阻力", "干擾阻力"], "ans": "C", "exp": "身體前後壓差造成形狀阻力。"}, {"cat": "專業", "ch": 2, "n": 68, "q": "遙控無人飛機的機身與尾翼接合部分因氣流相互干擾，都會產生下列哪種阻力？", "opts": ["摩擦阻力", "形狀阻力", "誘導阻力", "干擾阻力"], "ans": "D", "exp": "接合處氣流干擾為干擾阻力。"}, {"cat": "專業", "ch": 2, "n": 69, "q": "因升力產生渦流而發生的阻力稱為下列哪種阻力？", "opts": ["摩擦阻力", "誘導阻力", "形狀阻力", "干擾阻力"], "ans": "B", "exp": "翼尖渦流伴隨升力產生誘導阻力。"}, {"cat": "專業", "ch": 2, "n": 70, "q": "誘導阻力是遙控無人機為產生下列哪種外力而須付出的一種代價？", "opts": ["磁力", "推力", "升力", "重力"], "ans": "C", "exp": "誘導阻力是產生升力的副產物。"}, {"cat": "專業", "ch": 2, "n": 71, "q": "干擾阻力是遙控無人機各部分之間因下列哪種因素而產生的一種額外阻力？", "opts": ["氣流相互干擾", "熱流相互作用", "濕度相互作用", "磁力相互作用"], "ans": "A", "exp": "各部件氣流互相干擾形成干擾阻力。"}, {"cat": "專業", "ch": 2, "n": 72, "q": "干擾阻力容易產生在下列哪些組件之間？", "opts": ["機身和機翼、機身和尾翼", "機翼和外掛載", "機翼、發動機短艙", "以上皆是"], "ans": "D", "exp": "各接合與交會處都可能產生干擾阻力。"}, {"cat": "專業", "ch": 2, "n": 73, "q": "重力是航空器本身之質量所受的下列哪種外力？", "opts": ["磁力", "地心引力", "摩擦力", "靜電力"], "ans": "B", "exp": "重力來自地心引力。"}, {"cat": "專業", "ch": 2, "n": 74, "q": "過重的重力對飛行有負面影響，故無人機機身的設計都是採用下列哪種材質？", "opts": ["較輕", "較重", "時重時輕", "以上皆非"], "ans": "A", "exp": "採用較輕材質以減重。"}, {"cat": "專業", "ch": 2, "n": 75, "q": "升力和阻力是飛機在空氣之間的下列哪種行為中產生？", "opts": ["分子光譜", "動量守恆", "相對運動 （相對氣流）", "雷諾傳輸"], "ans": "C", "exp": "由機翼與空氣的相對運動（相對氣流）產生。"}, {"cat": "專業", "ch": 2, "n": 76, "q": "影響升力和阻力的基本因素除了飛機本身的特點，還有下列哪個因素？", "opts": ["機翼在氣流中的相對位置（攻角）", "氣流的速度", "空氣密度", "以上皆是"], "ans": "D", "exp": "攻角、氣流速度與空氣密度都影響升力與阻力。"}, {"cat": "專業", "ch": 2, "n": 77, "q": "相對氣流方向與翼弦所夾的角度叫下列哪個角？", "opts": ["俯仰角", "滾轉角", "攻角", "偏航角"], "ans": "C", "exp": "相對氣流與翼弦的夾角為攻角。"}, {"cat": "專業", "ch": 2, "n": 78, "q": "在飛行速度等其它條件相同的情況下，得到最大升力的攻角，叫做下列哪個項目？", "opts": ["理想攻角", "臨界攻角", "牛頓攻角", "萊布尼茲攻角"], "ans": "B", "exp": "升力最大處為臨界攻角，超過即失速。"}, {"cat": "專業", "ch": 2, "n": 79, "q": "在小於臨界攻角範圍內增大攻角，會有下列哪種結果？", "opts": ["升力增大", "升力減少", "升力不變", "以上皆非"], "ans": "A", "exp": "臨界攻角前，攻角增大升力增大。"}, {"cat": "專業", "ch": 2, "n": 80, "q": "空氣密度大，相對氣流速度快，升力和阻力會有下列哪種變化？", "opts": ["升力越大、阻力越小", "升力越小、阻力越大", "升力和阻力越大", "升力和阻力越小"], "ans": "C", "exp": "空氣密度大、氣流速度快，升力與阻力都變大。"}, {"cat": "專業", "ch": 2, "n": 81, "q": "機翼面積大，升力和阻力會有下列哪種變化？", "opts": ["升力越大、阻力越小", "升力越小、阻力越大", "升力和阻力越小", "升力和阻力越大"], "ans": "D", "exp": "機翼面積越大，升力與阻力都越大。"}, {"cat": "專業", "ch": 2, "n": 82, "q": "升力和阻力與機翼面積大小的關係是下列哪種？", "opts": ["都與機翼面積大小成正比", "都與機翼面積大小成反比", "都與機翼面積大小的平方成正比", "都與機翼面積大小的平方成反比"], "ans": "A", "exp": "升力與阻力都與機翼面積成正比。"}, {"cat": "專業", "ch": 2, "n": 83, "q": "機翼形狀對下列哪個項目有很大影響？", "opts": ["磁力", "升力、阻力", "重力", "以上皆是"], "ans": "B", "exp": "翼形直接影響升力與阻力。"}, {"cat": "專業", "ch": 2, "n": 84, "q": "下列哪個項目對升力、阻力有影響？", "opts": ["機翼切面形狀的相對厚度、最大厚度位置", "機翼平面形狀、襟翼和前緣翼縫的位置", "機翼表面光滑狀況", "以上皆是"], "ans": "D", "exp": "翼型厚度、平面形狀、表面狀況都影響升阻力，故選以上皆是。"}, {"cat": "專業", "ch": 2, "n": 85, "q": "遙控無人機表面光滑狀況會影響下列哪種阻力？", "opts": ["形狀阻力", "誘導阻力", "摩擦阻力", "干擾阻力"], "ans": "C", "exp": "表面粗糙度主要影響摩擦阻力。"}, {"cat": "專業", "ch": 2, "n": 86, "q": "遙控無人機表面相對光滑，則阻力為下列哪種變化？", "opts": ["相對較小", "相對較大", "時大時小", "以上皆非"], "ans": "A", "exp": "越光滑摩擦阻力越小。"}, {"cat": "專業", "ch": 2, "n": 87, "q": "大多數遙控無人機都由下列哪個主要部分組成？", "opts": ["機翼、機身、尾翼", "起降裝置", "動力系統", "以上皆是"], "ans": "D", "exp": "含機翼機身尾翼、起降裝置與動力系統。"}, {"cat": "專業", "ch": 2, "n": 88, "q": "無人飛機機翼的主要功用是產生下列哪種外力？", "opts": ["阻力", "升力", "推力", "重力"], "ans": "B", "exp": "機翼主要產生升力。"}, {"cat": "專業", "ch": 2, "n": 89, "q": "無人飛機機翼除提供升力外，也有下列哪些作用？", "opts": ["美觀和舒適", "潤滑和保濕", "穩定和操作", "觀測和定位"], "ans": "C", "exp": "機翼也提供穩定與操縱（副翼、襟翼）。"}, {"cat": "專業", "ch": 2, "n": 90, "q": "在無人飛機機翼上一般安裝下列哪個物件？", "opts": ["光學酬載", "副翼和襟翼", "通訊設備", "導航設備"], "ans": "B", "exp": "機翼裝副翼與襟翼。"}, {"cat": "專業", "ch": 2, "n": 91, "q": "操縱無人飛機副翼可使飛機產生下列哪種結果？", "opts": ["滾轉", "爬升", "下降", "偏航"], "ans": "A", "exp": "副翼控制滾轉。"}, {"cat": "專業", "ch": 2, "n": 92, "q": "無人飛機機翼還可安裝下列哪個物件？", "opts": ["發動機", "起落架", "外掛載", "以上皆是"], "ans": "D", "exp": "機翼可掛發動機、起落架與外掛載。"}, {"cat": "專業", "ch": 2, "n": 93, "q": "無人飛機機身的主要功用是裝載下列哪個物件？", "opts": ["油箱", "酬載", "各種設備", "以上皆是"], "ans": "D", "exp": "機身裝載油箱、酬載與各種設備。"}, {"cat": "專業", "ch": 2, "n": 94, "q": "無人飛機尾翼包括下列哪些物件？", "opts": ["大尾翼和小尾翼", "高速尾翼和低速尾翼", "水平尾翼和垂直尾翼", "旋轉尾翼和固定尾翼"], "ans": "C", "exp": "尾翼含水平尾翼與垂直尾翼。"}, {"cat": "專業", "ch": 2, "n": 95, "q": "無人飛機水平尾翼包括下列哪些物件？", "opts": ["固定的升降舵和可動的水平安定面", "固定的水平安定面和可動的升降舵", "固定的升降舵和水平安定面", "可動的升降舵和水平安定面"], "ans": "B", "exp": "水平尾翼＝固定的水平安定面＋可動的升降舵。"}, {"cat": "專業", "ch": 2, "n": 96, "q": "無人飛機垂直尾翼包括下列哪些物件？", "opts": ["固定的方向舵和可動的垂直安定面", "固定的垂直安定面和可動的方向舵", "固定的方向舵和垂直安定面", "可動的方向舵和垂直安定面"], "ans": "B", "exp": "垂直尾翼＝固定的垂直安定面＋可動的方向舵。"}, {"cat": "專業", "ch": 2, "n": 97, "q": "無人飛機的起落架大都由下列哪些物件組成？", "opts": ["減震支柱和機輪", "蒙皮和鉚釘", "坡頂桁架和平行弦桁架", "拉力元件和扭力元件"], "ans": "A", "exp": "起落架含減震支柱與機輪。"}, {"cat": "專業", "ch": 2, "n": 98, "q": "起落架的作用是在下列哪個時機支撐無人飛機?", "opts": ["起飛時", "著陸滑跑時", "地面滑行和停放時", "以上皆是"], "ans": "D", "exp": "起飛、著陸滑跑、滑行停放時皆支撐機體。"}, {"cat": "專業", "ch": 2, "n": 99, "q": "動力系統主要用來產生使遙控無人機前進的下列哪些力？", "opts": ["重力與升力", "重力與阻力", "拉力和推力", "升力與阻力"], "ans": "C", "exp": "動力系統產生拉力／推力使其前進。"}, {"cat": "專業", "ch": 2, "n": 100, "q": "無人飛機常見的動力系統有下列哪個項目？", "opts": ["航空活塞式發動機加螺旋槳推進器", "渦輪噴氣發動機", "渦輪螺旋槳發動機和渦輪扇或導風扇發動機", "以上皆是"], "ans": "D", "exp": "活塞、渦噴、渦槳/渦扇等發動機皆為常見動力，故選以上皆是。"}, {"cat": "專業", "ch": 2, "n": 101, "q": "無人飛機上通常不會安裝下列哪種設備？", "opts": ["飛行儀表", "通訊設備、導航設備", "安全設備", "以上皆是"], "ans": "A", "exp": "無人機由地面操作，機上通常不裝供人判讀的飛行儀表。"}, {"cat": "專業", "ch": 2, "n": 102, "q": "操作人操作油門和操縱桿，控制無人機的操縱面，來達到所想要的下列哪個目的？", "opts": ["飛行姿態", "發動機溫度", "環境濕度", "酬載功能"], "ans": "A", "exp": "控制操縱面以改變飛行姿態。"}, {"cat": "專業", "ch": 2, "n": 103, "q": "想像為一條由前往後穿過航空器的軸，稱之為下列哪個軸？", "opts": ["航空器縱軸（X 軸）", "航空器橫軸（Y 軸）", "航空器垂直軸（Z 軸）", "以上皆非"], "ans": "A", "exp": "由前往後穿過航空器者為縱軸 X 軸（滾轉軸）。"}, {"cat": "專業", "ch": 2, "n": 104, "q": "除了副翼，航空器的下列哪個組件對於航空器的滾轉也會有影響？", "opts": ["升降舵", "襟翼", "方向舵", "小翼"], "ans": "C", "exp": "方向舵造成的偏航會耦合影響滾轉。"}, {"cat": "專業", "ch": 2, "n": 105, "q": "想像為一條上下兩面垂直地穿過航空器的軸，稱之為下列哪個軸？", "opts": ["航空器垂直軸（Z 軸）", "航空器縱軸（X 軸）", "航空器橫軸（Y 軸）", "以上皆非"], "ans": "A", "exp": "上下垂直穿過航空器者為垂直軸 Z 軸（偏航軸）。"}, {"cat": "專業", "ch": 2, "n": 106, "q": "關於遙控無人機的的操作原理，我們首要了解遙控無人飛機的下列哪種特性？", "opts": ["平衡性", "穩定性", "操縱性", "以上皆是"], "ans": "D", "exp": "須了解平衡性、穩定性與操縱性。"}, {"cat": "專業", "ch": 2, "n": 107, "q": "遙控無人機處於平衡狀態時，是表示下列哪種狀況？", "opts": ["其速度的大小和方向都保持不變", "其發動機的轉速和馬力都保持不變", "其所有翼面的角度和方向都保持不變", "其酬載的方向和功能都保持不變"], "ans": "A", "exp": "平衡狀態＝合力為零，速度大小與方向都不變。"}, {"cat": "專業", "ch": 2, "n": 108, "q": "遙控無人機穩定性的強弱，一般由下列哪個現象來衡量？", "opts": ["擺動衰減時間", "擺動幅度", "擺動次數", "以上皆是"], "ans": "D", "exp": "以衰減時間、擺動幅度與次數衡量。"}, {"cat": "專業", "ch": 2, "n": 109, "q": "遙控無人機的穩定性強，表示下列哪個現象？", "opts": ["擺動衰減時間短", "擺動幅度小", "擺動次數少", "以上皆是"], "ans": "D", "exp": "穩定性強：衰減時間短、幅度小、次數少，故選以上皆是。"}, {"cat": "專業", "ch": 2, "n": 110, "q": "遙控無人機穩定性的強弱，主要取決於遙控無人機的下列哪個特性？", "opts": ["重心位置", "飛行速度和高度", "攻角的變化", "以上皆是"], "ans": "D", "exp": "重心、速度高度與攻角變化都影響穩定性。"}, {"cat": "專業", "ch": 2, "n": 111, "q": "遙控無人機在操作人操縱升降舵、方向舵和副翼下改變其飛行狀態的俯仰、方向和橫向之特性，是指遙控無人機的下列哪種特性？", "opts": ["操縱性", "平衡性", "穩定性", "以上皆非"], "ans": "A", "exp": "此為操縱性。"}, {"cat": "專業", "ch": 2, "n": 112, "q": "遙控無人機操縱性好，表示下列哪個現象？", "opts": ["操縱動作簡單", "操縱省力", "操縱反應快", "以上皆是"], "ans": "D", "exp": "操縱性好：動作簡單、省力、反應快，故選以上皆是。"}, {"cat": "專業", "ch": 2, "n": 113, "q": "遙控無人機操作有哪四大基本動作？", "opts": ["平直飛行、側滑、爬升、下降", "平直飛行、轉彎、爬升、倒飛", "平直飛行、轉彎、爬升、下降", "平直飛行、側滑、懸停、倒飛"], "ans": "C", "exp": "四大基本動作：平直飛行、轉彎、爬升、下降。"}, {"cat": "專業", "ch": 2, "n": 114, "q": "操作遙控無人飛機時，當副翼控制右上左下，機體相對於「機體中心」作下列哪種動作？", "opts": ["向上俯仰", "右偏航", "右滾", "左滾"], "ans": "C", "exp": "右副翼上、左副翼下→右滾。"}, {"cat": "專業", "ch": 2, "n": 115, "q": "操作遙控無人飛機時，當副翼控制右下左上，機體相對於「機體中心」作下列哪種動作？", "opts": ["向上俯仰", "右偏航", "左滾", "右滾"], "ans": "C", "exp": "右副翼下、左副翼上→左滾。"}, {"cat": "專業", "ch": 2, "n": 116, "q": "操作遙控無人飛機時，當方向舵控制往右，機體相對於「機體中心」作下列哪種動作？", "opts": ["向上俯仰", "右偏航", "左偏航", "右滾"], "ans": "B", "exp": "方向舵右偏→右偏航。"}, {"cat": "專業", "ch": 2, "n": 117, "q": "操作遙控無人飛機時，當方向舵控制往左，機體相對於「機體中心」作下列哪種動作？", "opts": ["右滾", "左偏航", "右偏航", "左滾"], "ans": "B", "exp": "方向舵左偏→左偏航。"}, {"cat": "專業", "ch": 2, "n": 118, "q": "控制遙控無人機時，操作人應以相對於下列哪個項目來思考「上」、「下」、「左」、「右」？", "opts": ["機體中心", "地平面", "操作人自己的虛擬座標", "以上皆是"], "ans": "A", "exp": "應以機體中心（機頭朝向）為基準思考上下左右。"}, {"cat": "專業", "ch": 2, "n": 119, "q": "無人直昇機，其主旋翼在旋轉時主要產生下列哪種力？", "opts": ["向上的升力", "向下的升力", "向前的升力", "向後的升力"], "ans": "A", "exp": "主旋翼主要產生向上的升力。"}, {"cat": "專業", "ch": 2, "n": 120, "q": "無人直昇機主旋翼產生升力的原理，類似於下列哪個原理？", "opts": ["無人飛機機翼產生升力的原理", "螺旋槳產生推力的原理", "以上皆是", "以上皆非"], "ans": "C", "exp": "主旋翼兼具機翼升力與螺旋槳推力原理，故選以上皆是。"}, {"cat": "專業", "ch": 2, "n": 121, "q": "若無人直昇機主旋翼的旋轉面保持在水平位置，則所產生的力是下列哪個方向？", "opts": ["垂直向下", "垂直向上", "傾斜向下", "傾斜向上"], "ans": "B", "exp": "旋轉面水平時升力垂直向上。"}, {"cat": "專業", "ch": 2, "n": 122, "q": "無人直昇機利用主旋翼產生升力的原理執行下列哪些動作？", "opts": ["起飛離地", "爬升", "懸停", "以上皆是"], "ans": "D", "exp": "起飛、爬升、懸停都靠主旋翼升力。"}, {"cat": "專業", "ch": 2, "n": 123, "q": "如果升力與推力大於重力與阻力，遙控無人機的運動方向是下列哪個方向？", "opts": ["垂直向上", "垂直向下", "傾斜向上", "傾斜向下"], "ans": "A", "exp": "升＞重且推＞阻，合力向上→垂直向上。"}, {"cat": "專業", "ch": 2, "n": 124, "q": "無人直昇機主旋翼的槳葉片的俯仰角愈大，就會有下列哪種情形？", "opts": ["升力愈大，扭力愈小", "升力愈大，扭力也愈大", "升力愈小，也扭力愈小", "升力愈小，扭力愈大"], "ans": "B", "exp": "槳葉俯仰角（攻角）越大，升力增大、反扭力也增大。"}, {"cat": "專業", "ch": 2, "n": 125, "q": "無人直昇機的尾旋翼主要功能為何？", "opts": ["抵消升力，控制機頭方向", "抵消阻力，控制機頭方向", "抵消扭力，控制機頭方向", "抵消重力，控制機頭方向"], "ans": "C", "exp": "尾旋翼抵消主旋翼反扭力，並控制機頭方向。"}, {"cat": "專業", "ch": 2, "n": 126, "q": "無人直昇機有下列哪些基本飛行動作？", "opts": ["平直飛行", "轉彎", "爬升及下降", "以上皆是"], "ans": "D", "exp": "含平直飛行、轉彎、爬升下降等。"}, {"cat": "專業", "ch": 2, "n": 127, "q": "無人直昇機「垂直起飛到懸停」，係指垂直飛離地面約 2~3 呎，並保持下列哪種狀態？", "opts": ["航向不變", "向左的傾斜狀態", "向右的傾斜狀態", "主旋翼轉速不變"], "ans": "A", "exp": "垂直起飛到懸停須保持航向不變地離地。"}, {"cat": "專業", "ch": 2, "n": 128, "q": "無人直昇機「懸停轉彎」，係指在懸停高度執行機鼻向左轉或向右轉，並保持下列哪種狀態不變？", "opts": ["相對於其他遙控無人直昇機的位置", "相對於地面的位置", "相對於最低雲層的位置", "以上皆是"], "ans": "B", "exp": "懸停轉彎時保持相對地面位置不變，僅轉機頭。"}, {"cat": "專業", "ch": 2, "n": 129, "q": "無人直昇機「懸停轉彎」，係指保持不變的下列哪種狀態？", "opts": ["高度", "轉彎率", "轉速", "以上皆是"], "ans": "D", "exp": "保持高度、轉彎率、轉速等穩定。"}, {"cat": "專業", "ch": 2, "n": 130, "q": "無人直昇機向前移動到另一特定位置，稱之為無人直昇機的下列哪種動作？", "opts": ["懸停", "側向懸停飛行", "向前懸停飛行", "向後懸停飛行"], "ans": "C", "exp": "向前移動至定點為向前懸停飛行。"}, {"cat": "專業", "ch": 2, "n": 131, "q": "無人直昇機「向前懸停飛行」，係指保持不變的下列哪種狀態？", "opts": ["地面速度", "高度", "航向", "以上皆是"], "ans": "D", "exp": "保持地速、高度、航向不變地後移。"}, {"cat": "專業", "ch": 2, "n": 132, "q": "當必須移動無人直昇機到另一特定位置，但當時狀況不可能執行向前飛行時，就要使用下列哪種動作？", "opts": ["側向懸停飛行或向後懸停飛行", "懸停轉彎", "平直飛行", "懸停"], "ans": "A", "exp": "無法向前飛時，改用側向或向後懸停飛行。"}, {"cat": "專業", "ch": 2, "n": 133, "q": "無人直昇機「側向懸停飛行」，係指保持不變的下列哪種狀態？", "opts": ["地面速度", "高度", "航向", "以上皆是"], "ans": "D", "exp": "保持地速、高度、航向不變地後移。"}, {"cat": "專業", "ch": 2, "n": 134, "q": "當必須移動無人直昇機到另一特定位置，但當時狀況不可能執行向前或側向懸停飛行時，就要使用下列哪種動作？", "opts": ["平直飛行", "向後懸停飛行", "懸停轉彎", "傾斜轉彎"], "ans": "B", "exp": "改用向後懸停飛行。"}, {"cat": "專業", "ch": 2, "n": 135, "q": "無人直昇機「向後懸停飛行」，係指保持不變的下列哪種狀態？", "opts": ["地面速度", "高度", "航向", "以上皆是"], "ans": "D", "exp": "保持地速、高度、航向不變地後移。"}, {"cat": "專業", "ch": 2, "n": 136, "q": "無人直昇機「平直飛行」，係指保持下列哪種狀態？", "opts": ["高度不變和航向不變", "高度不變和地面速度不變", "地面速度不變和航向不變", "主旋翼轉速不變和航向不變"], "ans": "A", "exp": "平直飛行＝維持高度與航向。"}, {"cat": "專業", "ch": 2, "n": 137, "q": "無人直昇機「傾斜轉彎」，係指保持在向左或向右的傾斜狀態，保持下列哪種狀態之飛行？", "opts": ["高度不變和航向不變", "高度改變，但航向不變", "高度不變，但航向改變", "高度改變和航向改變"], "ans": "C", "exp": "傾斜轉彎：高度不變但航向改變。"}, {"cat": "專業", "ch": 2, "n": 138, "q": "無人直昇機「偏航」，係指利用尾旋翼推力執行下列哪種操縱？", "opts": ["改變高度", "改變航向", "改變地面速度", "改變升力"], "ans": "B", "exp": "偏航由尾旋翼推力改變航向。"}, {"cat": "專業", "ch": 2, "n": 139, "q": "無人多旋翼機可以下列哪種方式來做區分？", "opts": ["旋翼數量", "旋翼分布位置", "旋翼是否能夠傾斜", "以上皆可"], "ans": "D", "exp": "多旋翼機可依旋翼數量、分布、可否傾斜區分，故選以上皆可。"}, {"cat": "專業", "ch": 2, "n": 140, "q": "無人多旋翼機能夠垂直且穩定的執行下列哪種動作？", "opts": ["滾轉及水平平移", "升降及偏航", "偏航及水平平移", "俯仰及水平平移"], "ans": "B", "exp": "多旋翼可穩定垂直升降與偏航。"}, {"cat": "專業", "ch": 2, "n": 141, "q": "無人多旋翼機具備優秀的下列哪種能力是一般無人飛機望塵莫及的？", "opts": ["垂直起降能力", "定點懸停能力", "穩定升降及偏航", "以上皆是"], "ans": "D", "exp": "垂直起降、定點懸停、穩定升降偏航皆為多旋翼強項，故選以上皆是。"}, {"cat": "專業", "ch": 2, "n": 142, "q": "無人多旋翼機的下列哪種旋翼設計使得操控簡單且直接？", "opts": ["參差配置的", "對稱的", "不對稱的", "偏一邊的"], "ans": "B", "exp": "對稱旋翼配置使操控簡單且直接。"}, {"cat": "專業", "ch": 2, "n": 143, "q": "定距槳無人多旋翼機與無人直昇機相比，在下列哪個方面有很大提升？", "opts": ["機械設計結構", "控制難度", "姿態平穩", "以上皆是"], "ans": "D", "exp": "定距槳多旋翼在結構、控制、姿態穩定上都較直昇機提升，故選以上皆是。"}, {"cat": "專業", "ch": 2, "n": 144, "q": "無人多旋翼機對飛行的影響是下列哪項？", "opts": ["沒有影響", "變得複雜", "變得簡單", "有時變得複雜，有時變得簡單"], "ans": "C", "exp": "靠電子控制，使多旋翼飛行操作變得簡單。"}, {"cat": "專業", "ch": 2, "n": 145, "q": "無人多旋翼機同時增加或減少每個旋翼的升力，來實現下列哪種飛行狀態？", "opts": ["垂直的升降姿態", "俯仰的姿態", "偏航的姿態", "滾轉的姿態"], "ans": "A", "exp": "同時增減所有旋翼升力→垂直升降姿態。"}, {"cat": "專業", "ch": 2, "n": 146, "q": "同時影響遙控無人機飛行性能與飛航安全的重要因素是下列哪些項目？", "opts": ["機體大小", "電池容量", "重量和重心位置", "以上皆是"], "ans": "C", "exp": "重量與重心位置同時影響性能與安全。"}, {"cat": "專業", "ch": 2, "n": 147, "q": "操作人在飛行前應確認下列何者在合理範圍內？", "opts": ["重量", "重心", "酬載", "以上皆是"], "ans": "D", "exp": "重量、重心、酬載都須在合理範圍。"}, {"cat": "專業", "ch": 2, "n": 148, "q": "遙控無人機操作人在飛行前應詳細考量在下列哪種情況下可能降低飛行性能的載重因素？", "opts": ["高海拔", "高溫", "高濕度", "以上皆是"], "ans": "D", "exp": "高海拔、高溫、高濕都降低性能（高密度高度）。"}, {"cat": "專業", "ch": 2, "n": 149, "q": "遙控無人機重力的著力點稱為下列哪個項目？", "opts": ["形心", "氣動力中心", "重心", "升力中心"], "ans": "C", "exp": "重力著力點為重心。"}, {"cat": "專業", "ch": 2, "n": 150, "q": "遙控無人機的下列哪個項目與穩定性有很大的關聯？", "opts": ["外觀", "重心", "大小", "顏色"], "ans": "B", "exp": "重心位置與穩定性密切相關。"}, {"cat": "專業", "ch": 2, "n": 151, "q": "當遙控無人機重心位置超出允許範圍時，可能導致遙控無人機發生下列哪種情形？", "opts": ["無法穩定起飛", "無法穩定落地", "失速", "以上皆是"], "ans": "D", "exp": "重心失當可能無法穩定起降甚至失速。"}, {"cat": "專業", "ch": 2, "n": 152, "q": "遙控無人機飛行時，為產生各種姿態，作用於機身上的力為下列哪種情形？", "opts": ["升力通常較重量為大", "升力通常較重量為小", "有時升力較大，有時重量較大", "以上皆非"], "ans": "A", "exp": "操縱機動產生各種姿態時，升力通常大於重量。"}, {"cat": "專業", "ch": 2, "n": 153, "q": "遙控無人機的轉彎率因不同的速度而隨之不同，這是為了要抵銷所增加的下列哪種力，以保持負載係數不變？", "opts": ["向心力", "離心力", "正向力", "扭力"], "ans": "B", "exp": "轉彎時抵銷離心力以維持負載係數。"}, {"cat": "專業", "ch": 2, "n": 154, "q": "遙控無人機轉彎時，需執行下列哪個動作以補償升力的不足？", "opts": ["增加正向力", "增加攻角", "增加扭力", "增加離心力"], "ans": "B", "exp": "傾斜轉彎升力垂直分量減少，需增加攻角補償。"}, {"cat": "專業", "ch": 2, "n": 155, "q": "無人飛機重心位置靠前時，為維持遙控無人機的俯仰平衡，需要尾翼提供下列哪種力？", "opts": ["更大的向前的推力", "更大的向上的升力", "更大的向下的升力", "更大的向外的離心力"], "ans": "C", "exp": "重心靠前，需尾翼提供更大的向下的力以維持俯仰平衡。"}, {"cat": "專業", "ch": 2, "n": 156, "q": "遙控無人機重心位置靠前時，機頭較為沉重，起飛離地時有下列哪種情形？", "opts": ["較為困難", "較為容易", "有時容易有時困難", "以上皆非"], "ans": "A", "exp": "機頭重，仰轉離地較困難。"}, {"cat": "專業", "ch": 2, "n": 157, "q": "無人飛機重心位置靠前時，會有下列哪種情形？", "opts": ["減少誘導阻力", "增大誘導阻力", "誘導阻力不變", "以上皆非"], "ans": "B", "exp": "須較大攻角平衡，誘導阻力增大。"}, {"cat": "專業", "ch": 2, "n": 158, "q": "無人飛機重心位置靠前時，會有下列哪種情形？", "opts": ["油耗增加", "航程距離降低", "以上皆是", "以上皆非"], "ans": "C", "exp": "阻力增加使油耗增加、航程降低。"}, {"cat": "專業", "ch": 2, "n": 159, "q": "無人飛機重心位置靠前時，提高了下列哪種風險？", "opts": ["不穩定進場的風險", "穩定進場的風險", "非精確進場的風險", "精確進場的風險"], "ans": "A", "exp": "重心靠前提高不穩定進場的風險。"}, {"cat": "專業", "ch": 2, "n": 160, "q": "無人飛機重心後移時，由於機頭較輕，可能會使得起飛時發生下列哪種情形？", "opts": ["偏離跑道", "左右搖擺", "提前仰轉", "延後離地"], "ans": "C", "exp": "機頭輕易提前仰轉。"}, {"cat": "專業", "ch": 2, "n": 161, "q": "無人飛機重心後移時，起飛爬升時可能會因仰角過大，而造成下列哪種情形？", "opts": ["起飛速度增加", "起飛重量降低", "失速與機尾擦地", "以上皆是"], "ans": "C", "exp": "仰角過大導致失速與機尾擦地。"}, {"cat": "專業", "ch": 2, "n": 162, "q": "無人飛機重心後移時，配平及總阻力減小，也進而導致下列哪種情形？", "opts": ["油耗減少", "續航能力增加", "失速速度減小", "以上皆是"], "ans": "D", "exp": "阻力小→省油、續航增、失速速度降。"}, {"cat": "專業", "ch": 2, "n": 163, "q": "無人直昇機重心太靠後，會影響下列哪種性能？", "opts": ["高速前飛性能及穩定", "從地面到正常起飛", "平直飛行", "以上皆是"], "ans": "A", "exp": "重心後移主要影響高速前飛性能與穩定。"}, {"cat": "專業", "ch": 2, "n": 164, "q": "無人多旋翼機重心移動可能造成下列哪種結果？", "opts": ["升力增加", "操控較為困難", "阻力減少", "以上皆是"], "ans": "B", "exp": "重心偏移使操控變困難。"}, {"cat": "專業", "ch": 2, "n": 165, "q": "遙控無人機重量增加可能對起飛速度造成下列哪種結果？", "opts": ["降低起飛速度", "起飛速度不變", "提高起飛速度", "以上皆非"], "ans": "C", "exp": "越重需越快才能離地，起飛速度提高。"}, {"cat": "專業", "ch": 2, "n": 166, "q": "遙控無人機重量增加可能對滑行距離造成下列哪種結果？", "opts": ["縮短起飛滑行距離", "加長起飛滑行距離", "起飛滑行距離不變", "以上皆非"], "ans": "B", "exp": "重量增加使起飛滑行距離加長。"}, {"cat": "專業", "ch": 2, "n": 167, "q": "遙控無人機重量增加可能對爬升率及爬升角造成下列哪種結果？", "opts": ["降低爬升率和爬升角度", "增加爬升率和爬升角度", "爬升率和爬升角度不變", "以上皆非"], "ans": "A", "exp": "重量增加使爬升率與爬升角降低。"}, {"cat": "專業", "ch": 2, "n": 168, "q": "遙控無人機重量增加可能對飛航最高高度造成下列哪種結果？", "opts": ["降低飛航最高高度", "增加飛航最高高度", "飛航最高高度不變", "以上皆非"], "ans": "A", "exp": "重量增加使飛航最高高度（升限）降低。"}, {"cat": "專業", "ch": 2, "n": 169, "q": "遙控無人機重量增加可能對操作性能造成下列哪種結果？", "opts": ["操作性能不變", "增加操作性能", "降低操作性能", "以上皆非"], "ans": "C", "exp": "重量增加使操作性能降低。"}, {"cat": "專業", "ch": 2, "n": 170, "q": "遙控無人機重量增加可能對進場及降落速度造成下列哪種結果？", "opts": ["降低進場和降落速度", "提高進場和降落速度", "進場和降落速度不變", "以上皆非"], "ans": "B", "exp": "重量增加使進場與降落速度提高。"}, {"cat": "專業", "ch": 2, "n": 171, "q": "遙控無人機重量增加可能對降落滾行距離造成下列哪種結果？", "opts": ["加長降落滾行距離", "縮短降落滾行距離", "降落滾行距離不變", "以上皆非"], "ans": "A", "exp": "重量增加使降落滾行距離加長。"}, {"cat": "專業", "ch": 2, "n": 172, "q": "為確保飛行安全，操作人須審慎確認遙控無人機的下列哪個特性？", "opts": ["外觀", "重量與載重平衡", "價格", "以上皆是"], "ans": "B", "exp": "須確認重量與載重平衡（W&B）。"}, {"cat": "專業", "ch": 2, "n": 173, "q": "低速、低空的中型無人機的動力裝置，使用下列哪種發動機？", "opts": ["往復式（活塞）發動機", "無刷電動馬達", "渦輪螺旋槳發動機", "渦輪發動機"], "ans": "A", "exp": "低速、低空的中型無人機多用往復式（活塞）發動機。"}, {"cat": "專業", "ch": 2, "n": 174, "q": "使用於高速無人機上，推重比高但壽命短的動力裝置是下列哪種發動機？", "opts": ["渦輪發動機", "無刷電動馬達", "渦輪螺旋槳發動機", "往復式（活塞）發動機"], "ans": "A", "exp": "高速無人機用渦輪發動機，推重比高但壽命較短。"}, {"cat": "專業", "ch": 2, "n": 175, "q": "高空或長滯空的大型無人機的動力裝置，使用下列哪種發動機？", "opts": ["渦輪發動機", "無刷電動馬達", "渦輪風扇或渦輪螺旋槳發動機", "往復式（活塞）發動機"], "ans": "C", "exp": "高空或長滯空大型無人機用渦輪風扇或渦輪螺旋槳發動機。"}, {"cat": "專業", "ch": 2, "n": 176, "q": "娛樂/運動級航空模型或小型無人機的動力裝置，一般使用下列哪種發動機？", "opts": ["渦輪發動機", "無刷電動馬達", "渦輪風扇或渦輪螺旋槳發動機", "往復式（活塞）發動機"], "ans": "B", "exp": "娛樂/運動級或小型無人機多用無刷電動馬達。"}, {"cat": "專業", "ch": 2, "n": 177, "q": "隨著渦輪發動機推重比、壽命不斷提高、油耗降低，未來渦輪發動機可能取代下列哪種發動機成為 25 公斤至 150 公斤級的無人機之主要動力？", "opts": ["無刷電動馬達", "渦輪風扇發動機", "渦輪螺旋槳發動機", "活塞發動機"], "ans": "D", "exp": "渦輪發動機性能提升後，未來可能取代活塞發動機成為 25~150 公斤級主要動力。"}, {"cat": "專業", "ch": 2, "n": 178, "q": "一般遙控無人機目前多以下列哪些頻段進行控制與圖傳？", "opts": ["300MHz 或 500MHz", "500MHz 或 600MHz", "2.4GHz 或 5.8GHz", "100GHz 或 220GHz"], "ans": "C", "exp": "目前多以 2.4GHz 或 5.8GHz 頻段進行控制與圖傳。"}, {"cat": "專業", "ch": 2, "n": 179, "q": "頻段 2.4GHz 主要為下列哪種鏈路實現對遙控無人機控制？", "opts": ["下行鏈路", "上行控制鏈路", "加密鏈路", "以上皆是"], "ans": "B", "exp": "2.4GHz 主要作為上行控制鏈路。"}, {"cat": "專業", "ch": 2, "n": 180, "q": "頻段 5.8GHz 主要為下列哪種鏈路執行圖像或數據傳輸等遙測功能？", "opts": ["下行鏈路", "上行控制鏈路", "加密鏈路", "以上皆是"], "ans": "A", "exp": "5.8GHz 主要作為下行鏈路（圖像/數據遙測）。"}, {"cat": "專業", "ch": 2, "n": 181, "q": "若無外力的影響，靜止的物體會保持靜止，行進的物體會保持直線運動，這就是下列哪個定律？", "opts": ["牛頓第二定律又稱「加速度定律」", "牛頓第三定律", "牛頓第一定律又稱「慣性定律」", "以上皆非"], "ans": "C", "exp": "靜者恆靜、動者恆作等速直線運動——牛頓第一定律（慣性定律）。"}, {"cat": "專業", "ch": 2, "n": 182, "q": "當物體受到所施加的力等於每次的動量變化，這就是下列哪個定律？", "opts": ["牛頓第一定律又稱「慣性定律」", "牛頓第二定律又稱「加速度定律」", "牛頓第三定律", "以上皆非"], "ans": "B", "exp": "施力等於動量變化率——牛頓第二定律（加速度定律）。"}, {"cat": "專業", "ch": 2, "n": 183, "q": "牛頓第二定律說明加速度與物體的質量為下列哪種關係？", "opts": ["成反比", "成正比", "沒有關係", "以上皆非"], "ans": "A", "exp": "牛頓第二定律：加速度與質量成反比。"}, {"cat": "專業", "ch": 2, "n": 184, "q": "牛頓第二定律說明加速度與所施加的力為下列哪種關係？", "opts": ["成反比", "成正比", "沒有關係", "以上皆非"], "ans": "B", "exp": "牛頓第二定律：加速度與施力成正比。"}, {"cat": "專業", "ch": 2, "n": 185, "q": "對於每一個作用力，都有一個相等且相反的反作用力，這就是下列哪個定律？", "opts": ["牛頓第一定律又稱「慣性定律」", "牛頓第三定律", "牛頓第二定律又稱「加速度定律」", "以上皆非"], "ans": "B", "exp": "作用力與反作用力相等相反——牛頓第三定律。"}, {"cat": "專業", "ch": 2, "n": 186, "q": "下列哪些理論可以說明一個重於空氣的航空器如何產生升力飛行於空中？", "opts": ["流體的連續性和柏努利定律", "氣候學和大氣化學", "大氣動力學和大氣物理學", "材料力學和運動學"], "ans": "A", "exp": "重於空氣的升力由流體連續性與柏努利定律說明。"}, {"cat": "專業", "ch": 2, "n": 187, "q": "流體的連續性說明在同一時間內，流進任一切面和從另一切面流出的下列哪個項目是相等的？", "opts": ["流體溫度", "流體壓力", "流體質量", "流體速度"], "ans": "C", "exp": "連續性：同一時間流進與流出各切面的流體質量相等。"}, {"cat": "專業", "ch": 2, "n": 188, "q": "由螺旋槳所產生的拉力或噴射發動機所產生的推力，使航空器前進飛行，是依據下列哪個定律？", "opts": ["牛頓第三定律", "牛頓第一定律", "牛頓第二定律", "以上皆是"], "ans": "A", "exp": "螺旋槳拉力/噴射推力使航空器前進，依牛頓第三定律。"}, {"cat": "專業", "ch": 2, "n": 189, "q": "若螺旋槳整片槳葉的攻角都一樣，將使得槳葉的效率有下列哪種變化？", "opts": ["變得很好", "保持不變", "變得很差", "機時好時差"], "ans": "C", "exp": "若整片槳葉攻角一致（未隨半徑調整），槳葉效率會變差。"}, {"cat": "專業", "ch": 2, "n": 190, "q": "超過臨界攻角後，再增大攻角，會有下列哪種結果？", "opts": ["升力反而減小，阻力急劇增大", "升力持續增大，阻力急劇減小", "升力、阻力持續增大", "升力、阻力急劇減小"], "ans": "A", "exp": "超過臨界攻角後失速，升力反而減小、阻力急劇增大。"}, {"cat": "專業", "ch": 2, "n": 191, "q": "升力和阻力兩者與飛行速度的關係是下列哪種？", "opts": ["均與飛行速度成正比", "均與飛行速度成反比", "均與飛行速度的平方成正比", "均與飛行速度的平方成反比"], "ans": "C", "exp": "升力與阻力皆與飛行速度的平方成正比。"}, {"cat": "專業", "ch": 2, "n": 192, "q": "放下遙控無人飛機襟翼可產生下列哪種結果？", "opts": ["使升力增大", "使升力減少", "使升力不變", "以上皆非"], "ans": "A", "exp": "放下襟翼增加彎度與面積，使升力增大。"}, {"cat": "專業", "ch": 2, "n": 193, "q": "尾翼的作用是操縱無人飛機的下列哪些動作？", "opts": ["俯仰和滾轉", "滾轉和偏航", "俯仰和偏航", "以上皆非"], "ans": "C", "exp": "尾翼操縱俯仰（升降舵）與偏航（方向舵）。"}, {"cat": "專業", "ch": 2, "n": 194, "q": "航空器主要係利用副翼改變下列哪種姿態？", "opts": ["俯仰", "左右滾轉", "偏航", "以上皆是"], "ans": "B", "exp": "副翼主要改變左右滾轉姿態。"}, {"cat": "專業", "ch": 2, "n": 195, "q": "想像為一條左右兩側穿過航空器的軸，稱之為下列哪個軸？", "opts": ["航空器縱軸（X 軸）", "航空器垂直軸（Z 軸）", "航空器橫軸（Y 軸）", "以上皆非"], "ans": "C", "exp": "左右穿過航空器者為橫軸 Y 軸（俯仰軸）。"}, {"cat": "專業", "ch": 2, "n": 196, "q": "航空器利用升降舵改變下列哪種姿態？", "opts": ["左右滾轉", "俯仰", "偏航", "以上皆非"], "ans": "B", "exp": "升降舵改變俯仰姿態。"}, {"cat": "專業", "ch": 2, "n": 197, "q": "航空器利用方向舵改變下列哪種姿態？", "opts": ["俯仰", "偏航", "左右滾轉", "以上皆非"], "ans": "B", "exp": "方向舵改變偏航姿態。"}, {"cat": "專業", "ch": 2, "n": 198, "q": "作用於遙控無人機的各外力之和、各力矩之和都為零，是指遙控無人機的下列哪種特性？", "opts": ["穩定性", "操縱性", "平衡性", "以上皆非"], "ans": "C", "exp": "各外力和與各力矩和皆為零，指平衡性。"}, {"cat": "專業", "ch": 2, "n": 199, "q": "當遙控無人機受到微小擾動而偏離原來的平衡狀態時，在擾動消失後，不經操作人操縱，自動恢復原來平衡狀態的特性，是指遙控無人機的下列哪種特性？", "opts": ["平衡性", "穩定性", "操縱性", "以上皆非"], "ans": "B", "exp": "受擾動後能自動恢復原平衡的特性，指穩定性。"}, {"cat": "專業", "ch": 2, "n": 200, "q": "操作無人飛機時，當升降舵控制往上，相對於「機體中心」作下列哪種動作？", "opts": ["向下俯仰", "向上俯仰", "右滾", "左滾"], "ans": "B", "exp": "升降舵往上→機頭相對機體中心向上俯仰。"}, {"cat": "專業", "ch": 2, "n": 201, "q": "操作無人飛機時，當升降舵控制往下，飛機相對於「機體中心」作下列哪種動作？", "opts": ["向下俯仰", "向上俯仰", "右滾", "左滾"], "ans": "A", "exp": "升降舵往下→機頭向下俯仰。"}, {"cat": "專業", "ch": 2, "n": 202, "q": "當無人直昇機的發動機讓主旋翼以逆時針方向旋轉時，無人直昇機本身將以下列哪個方向旋轉？", "opts": ["以順時針方向旋轉", "以逆時針方向旋轉", "先以順時針方向旋轉，再以逆時針方向旋轉", "先以逆時針方向旋轉，再以順時針方向旋轉"], "ans": "A", "exp": "主旋翼逆時針轉，機身受反扭力以順時針方向旋轉。"}, {"cat": "專業", "ch": 2, "n": 203, "q": "無人直昇機為了抵銷扭力，在設計上使用尾旋翼在機尾產生一個向右的力，稱為下列哪種力？", "opts": ["尾旋翼升力", "尾旋翼阻力", "尾旋翼推力", "尾旋翼壓力"], "ans": "C", "exp": "尾旋翼在機尾產生的向右力為尾旋翼推力，用以抵銷扭力。"}, {"cat": "專業", "ch": 2, "n": 204, "q": "無人直昇機「懸停」，係指保持幾乎不動的飛行，並保持下列哪種狀態？", "opts": ["主旋翼轉速不變和航向不變", "高度不變和航向不變", "主旋翼轉速不變和高度不變", "以上皆非"], "ans": "B", "exp": "懸停＝保持高度不變與航向不變、幾乎不動。"}, {"cat": "專業", "ch": 2, "n": 205, "q": "無人直昇機「從懸停到正常起飛」，係指有順序的轉換到向前飛行，執行時應安全且迅速的採取下列哪種動作？", "opts": ["改變航向", "增加地面速度", "增加高度", "增加主旋翼轉速"], "ans": "C", "exp": "從懸停到正常起飛，應安全迅速地增加高度轉為前飛。"}, {"cat": "專業", "ch": 2, "n": 206, "q": "無人直昇機「從地面到正常起飛」，係指使用下列哪個動作，將直昇機從地面移動到有效轉換升力及正常爬升？", "opts": ["最小的所需動力", "最大的所需動力", "最小的地面速度", "最大的地面速度"], "ans": "A", "exp": "從地面到正常起飛，以最小所需動力完成有效轉換升力與正常爬升。"}, {"cat": "專業", "ch": 2, "n": 207, "q": "無人多旋翼機是一種經由多個定距槳的正反旋轉與轉速控制，提供下列哪些性能調整？", "opts": ["阻力與推力調整", "重心與阻力調整", "升力與姿態調整", "升力與重心調整"], "ans": "C", "exp": "多旋翼以定距槳正反轉與轉速控制，提供升力與姿態調整。"}, {"cat": "專業", "ch": 2, "n": 208, "q": "無人多旋翼機旋翼以不同方向旋轉，抵消反作用力，使產生下列哪項結果？", "opts": ["使總力矩為零", "使總推力為零", "使總升力為零", "使總阻力為零"], "ans": "A", "exp": "旋翼不同方向旋轉互相抵消反作用力，使總力矩為零。"}, {"cat": "專業", "ch": 2, "n": 209, "q": "無人多旋翼機可以直接採用下列哪種螺旋槳？", "opts": ["定距槳", "變距槳", "恆速槳", "以上皆非"], "ans": "A", "exp": "多旋翼機可直接採用定距槳。"}, {"cat": "專業", "ch": 2, "n": 210, "q": "無人多旋翼機改變前後兩端旋翼的升力，使之不平衡，來實現下列哪種姿態？", "opts": ["垂直的升降姿態", "俯仰的姿態", "偏航的姿態", "滾轉的姿態"], "ans": "B", "exp": "改變前後兩端旋翼升力使之不平衡→俯仰姿態。"}, {"cat": "專業", "ch": 2, "n": 211, "q": "無人多旋翼機同時減少或增加斜對角兩對旋翼轉速與升力，來實現下列哪種姿態？", "opts": ["垂直的升降姿態", "俯仰的姿態", "偏航的姿態", "滾轉的姿態"], "ans": "C", "exp": "同時增減斜對角兩對旋翼轉速與升力→偏航姿態。"}, {"cat": "專業", "ch": 2, "n": 212, "q": "無人多旋翼機改變橫向兩端旋翼的升力，使之不平衡，來實現下列哪種姿態？", "opts": ["垂直的升降姿態", "偏航的姿態", "俯仰的姿態", "滾轉的姿態"], "ans": "D", "exp": "改變橫向兩端旋翼升力使之不平衡→滾轉姿態。"}, {"cat": "專業", "ch": 2, "n": 213, "q": "在空氣動力學裡，負載係數定義為下列哪個比值？", "opts": ["升力與重力之比值", "阻力與重力之比值", "推力與重力之比值", "升力與阻力之比值"], "ans": "A", "exp": "負載係數＝升力與重力之比值。"}, {"cat": "專業", "ch": 2, "n": 214, "q": "遙控無人機飛行時會產生各種姿態，負載係數即能表達下列哪個項目？", "opts": ["巡航速度", "姿態動作的大小", "飛行距離", "續航時間"], "ans": "B", "exp": "負載係數表達姿態動作的大小。"}, {"cat": "專業", "ch": 2, "n": 215, "q": "遙控無人機在進行協調轉彎時，負載係數是基於下列哪些力的結果？", "opts": ["升力和重力", "推力和重力", "離心力和重力", "阻力和重力"], "ans": "C", "exp": "協調轉彎的負載係數基於離心力與重力的結果。"}, {"cat": "專業", "ch": 2, "n": 216, "q": "遙控無人機轉彎時，機翼必須產生足以與負載係數相等的升力，以達到下列哪個目的？", "opts": ["維持高度", "維持速度", "維持航向", "維持發動機轉速"], "ans": "A", "exp": "轉彎時機翼須產生與負載係數相等的升力，以維持高度。"}, {"cat": "專業", "ch": 2, "n": 217, "q": "無人飛機重心位置靠前時，受到配平以及總阻力的增加的影響，為了保持飛行速度不變，必須採取下列哪種手段？", "opts": ["增加發動機推力", "減少發動機推力", "先增加然後減少發動機推力", "先減少然後增加發動機推力"], "ans": "A", "exp": "重心靠前配平與總阻力增加，須增加發動機推力以維持速度。"}, {"cat": "專業", "ch": 2, "n": 218, "q": "無人飛機重心位置靠前時，低速飛行時，為了穩定較強的俯仰姿態，可能會有下列哪種情形導致提高不穩定進場的風險？", "opts": ["配平可能不足", "配平可能過大", "滾轉可能不足", "滾轉可能過大"], "ans": "A", "exp": "重心靠前低速飛行時配平可能不足，提高不穩定進場風險。"}, {"cat": "專業", "ch": 2, "n": 219, "q": "無人飛機重心後移時，若進入到下列哪種情形時，會較難改正？", "opts": ["滾轉角變小", "螺旋失速", "偏航角變小", "攻角變小"], "ans": "B", "exp": "重心後移若進入螺旋失速，會較難改正。"}, {"cat": "專業", "ch": 2, "n": 220, "q": "無人直昇機重心太前，會抑制下列哪種性能？", "opts": ["平直飛行", "向後飛及懸停低速", "從地面到正常起飛", "以上皆是"], "ans": "B", "exp": "直昇機重心太前，會抑制向後飛及低速懸停性能。"}, {"cat": "專業", "ch": 2, "n": 221, "q": "無人飛機重量增加可能造成下列哪種結果？", "opts": ["降低失速速度", "提高失速速度", "失速速度不變", "以上皆非"], "ans": "B", "exp": "重量增加使失速速度提高。"}, {"cat": "專業", "ch": 2, "n": 222, "q": "遙控無人機保持平飛，飛行速度越大則升力與阻力會有下列哪種結果？", "opts": ["升力、誘導阻力越小", "升力不變、寄生阻力越大", "升力越大、誘導阻力越小", "升力不變、誘導阻力越大"], "ans": "B", "exp": "平飛速度越大，升力維持（等於重量）不變，但寄生阻力越大。"}, {"cat": "專業", "ch": 2, "n": 223, "q": "無人機正以航向 90 接近機場，請問此無人機目前在機場的下列哪一個方向？", "opts": ["北方", "西方", "東方", "南方"], "ans": "B", "exp": "航向 090（往東飛）接近機場，代表無人機目前位於機場西方。"}, {"cat": "專業", "ch": 2, "n": 224, "q": "在作飛行規畫或操作無人機時，操作人手上有多項重量和平衡的資訊，依日期先後排列，包括 a. 2016/8/15（無人機出廠時），b. 2016/10/18，c. 2016/12/27，d. 2017/2/8，e.2017/6/19（無人機上次飛行時），f. 2017/9/20，操作人應使用下列哪一項？", "opts": ["2017/9/20 重量和平衡的資訊", "2016/8/15（無人機出廠時）重量和平衡資訊", "2017/6/19（無人機上次飛行時）重量和平衡資訊", "任一項的重量和平衡資訊"], "ans": "A", "exp": "應使用最新一次（2017/9/20）的重量與平衡資訊。"}, {"cat": "專業", "ch": 2, "n": 225, "q": "請問下列哪一種情況，可以視為上傳鏈路失效？", "opts": ["操作人無法目視到無人機", "無人機不執行地面控制站上傳的控制命令", "操作人與塔台間的通訊斷訊", "無人機無法將自身狀態（速度、高度、位置、設備狀態等）以及相關任務數據發回地面控制站"], "ans": "B", "exp": "上傳鏈路失效＝無人機不執行地面控制站上傳的控制命令。"}, {"cat": "專業", "ch": 2, "n": 226, "q": "請問上傳鏈路失效通常是下列哪一種原因？", "opts": ["GPS 失效", "地面控制站天線附近站了太多人", "無人機飛出操作人目視範圍以外", "頻率干擾"], "ans": "D", "exp": "上傳鏈路失效通常肇因於頻率干擾。"}, {"cat": "專業", "ch": 2, "n": 227, "q": "慣性導航系統（Inertial Navigation System，INS）是一種不依賴於外部資訊、也不向外部輻射能量（如無線電導航那樣）的自主式導航系統。慣性導航的基本工作原理是下列哪一項？", "opts": ["以天體力學定律為基礎，以星座獲得位置，經幾何運算得到速度、加速度等資訊", "以幾何力學定律為基礎，以磁場獲得位置，經三角運算得到速度、加速度等資訊", "以牛頓力學定律為基礎，以 GPS 獲得位置，微分得到速度，再微分得到加速度等資訊", "以牛頓力學定律為基礎，以加速度計獲得加速度，積分得到速度，再積分得到位置等資訊"], "ans": "D", "exp": "慣性導航以牛頓力學為基礎：加速度計測加速度，積分得速度，再積分得位置。"}, {"cat": "專業", "ch": 2, "n": 228, "q": "下列何者為遙控無人機運作之核心，主要執行起飛、航行、返場降落及回收等動作？", "opts": ["導航系統", "動力系統", "飛行控制系統", "無線遙控系統"], "ans": "C", "exp": "執行起飛、航行、返場降落回收的核心是飛行控制系統。"}, {"cat": "專業", "ch": 2, "n": 229, "q": "航空模型上沒有 GPS，也沒有高度計，請問操作人應如何判斷 400 英呎飛行高度？", "opts": ["在飛行前獲得地面上離無人機 400 英呎的目測概念作飛行高度參考", "該無人機飛行時，操作另一架有高度計的無人機到 400 英呎作飛行高度參考", "操作該無人機到 400 英呎高塔旁邊作飛行高度參考", "操作該無人機到兩座已知高度建築物中間作飛行高度參考"], "ans": "A", "exp": "無 GPS/高度計時，應於飛行前先取得離地 400 呎的目測概念作參考。"}, {"cat": "專業", "ch": 2, "n": 230, "q": "當準備在無人機上安裝攝影機或其他酬載時，操作人應有如何的認知？", "opts": ["超出無人機重量限制和重心範圍一點點，不影響安全", "先測試看看，只要飛的起來就沒問題", "即使超出重心範圍，但只要在重量限制內，透過高超的操作技巧一樣能夠飛行", "不超出無人機重量限制和重心範圍"], "ans": "D", "exp": "安裝酬載不得超出無人機的重量限制與重心範圍。"}, {"cat": "專業", "ch": 2, "n": 231, "q": "假設無人飛機最大起飛重量 102 磅，重心範圍（參考面在機鼻）25~27 英吋。某次飛行前稱重，空重（含燃油）50 磅、力臂 20 英吋，前艙酬載 20 磅、力臂 10 英吋，後艙酬載 30 磅、力臂 40 英吋，總重 100 磅，重心 24 英吋，請問操作人應採取下列哪一項動作？", "opts": ["前艙酬載往前移動 2.6 英吋", "後艙酬載往後移動 3.4 英吋", "後艙酬載配重增加 2.5 磅", "前艙酬載配重增加 1.2 磅"], "ans": "B", "exp": "目前重心 24 吋偏前（範圍 25~27），將後艙酬載後移約 3.4 吋可使重心進入範圍。"}, {"cat": "專業", "ch": 2, "n": 232, "q": "無人機正以空速保持（40 kts）及姿態保持在往東飛行，無人機經緯度為 E 121∘10′00\"，N 22∘20′30\"，此時為靜風，無人機要飛到 E 121∘30′00\"，N 22∘20′30\"執行任務，請問無人機還要約多少時間才會抵達？", "opts": ["10 分鐘", "20 分鐘", "30 分鐘", "40 分鐘"], "ans": "C", "exp": "經度差 20′（約 20 浬），以 40 kts 飛行約需 30 分鐘。"}, {"cat": "專業", "ch": 2, "n": 233, "q": "無人機正在平直飛行時，因任務需要必須快速增加高度，請問操作人應採取下列哪一項動作？", "opts": ["將動力加到最大，攻角越大越好，以得到最大爬升率", "保持動力，快速增大攻角，注意不超過臨界攻角", "將動力加到最大，以最佳爬升角空速執行爬升，在一定距離產生最大高度增加", "將動力加到最大，以最佳爬升率空速執行爬升，注意不超過臨界攻角"], "ans": "D", "exp": "快速增加高度應全動力、以最佳爬升率空速爬升，並注意不超過臨界攻角。"}, {"cat": "專業", "ch": 2, "n": 234, "q": "機場跑道地面風約為正南風，使用跑道為南北向，請問一般航空器在操作時應選擇哪一方向的跑道？", "opts": ["18 跑道", "27 跑道", "09 跑道", "36 跑道"], "ans": "A", "exp": "正南風應迎風起降，面向南方，選 18 跑道。"}, {"cat": "專業", "ch": 3, "n": 1, "q": "當空氣密度增加時，對飛機升力的影響為何者？", "opts": ["升力增加", "升力降低", "升力不變", "升力有時增加有時降低"], "ans": "A", "exp": "空氣密度增加，同速下升力增加。"}, {"cat": "專業", "ch": 3, "n": 2, "q": "下列何者非影響空氣密度之因素？", "opts": ["高度", "溫度", "濕度", "應力"], "ans": "D", "exp": "密度受高度、溫度、濕度影響；應力與密度無關。"}, {"cat": "專業", "ch": 3, "n": 3, "q": "當空氣中分子較少且稀薄，表示其密度高度為何？", "opts": ["越高", "越低", "可能高也可能低", "無法判斷"], "ans": "A", "exp": "空氣稀薄＝密度高度越高。"}, {"cat": "專業", "ch": 3, "n": 4, "q": "當空氣中分子較多且濃厚，表示其密度高度為何？", "opts": ["越高", "越低", "可能高也可能低", "無法判斷"], "ans": "B", "exp": "空氣濃厚＝密度高度越低。"}, {"cat": "專業", "ch": 3, "n": 5, "q": "高密度高度之環境比較不會出現於下列何處？", "opts": ["低海拔處", "高溫處", "非常潮濕之處", "低大氣壓力之處"], "ans": "A", "exp": "低海拔空氣濃、密度高度低，故高密度高度不易出現於低海拔。"}, {"cat": "專業", "ch": 3, "n": 6, "q": "低密度高度之環境比較不會出現於下列何處？", "opts": ["大氣壓力極高之處", "低海拔處", "乾燥處", "高溫處"], "ans": "D", "exp": "高溫使空氣稀、密度高度升高，故高溫處不易出現低密度高度。"}, {"cat": "專業", "ch": 3, "n": 7, "q": "空氣可藉由外界的作功達到下列哪種效果？", "opts": ["加工成形", "染色", "壓縮及膨脹", "以上皆是"], "ans": "C", "exp": "空氣可被壓縮及膨脹。"}, {"cat": "專業", "ch": 3, "n": 8, "q": "於固定空氣體積下，升溫時該體積空氣密度減少，降溫時該體積空氣密度為下列何種變化？", "opts": ["增加", "減少", "不變", "有時增加有時減少"], "ans": "A", "exp": "降溫使分子聚集，該體積空氣密度增加。"}, {"cat": "專業", "ch": 3, "n": 9, "q": "對流層裡，溫度及壓力均隨高度增加而有下列何種變化？", "opts": ["降低", "增加", "不變", "有時增加有時降低"], "ans": "A", "exp": "對流層中溫度與壓力都隨高度上升而降低。"}, {"cat": "專業", "ch": 3, "n": 10, "q": "下列有關大氣壓力量測之敘述，何者錯誤？", "opts": ["國際標準大氣(International Standard Atmosphere，ISA)為各國公認之參考校正基準", "海平面大氣壓力為 29.92 英吋汞柱(inHg)", "一標準大氣壓力等於 1017.2 毫巴值", "每上升 1,000 英呎，氣壓值減少約 1 英吋汞柱"], "ans": "C", "exp": "一標準大氣壓約 1013.2 毫巴，非 1017.2，故此敘述錯誤。"}, {"cat": "專業", "ch": 3, "n": 11, "q": "標準一大氣壓的 29.92 吋汞柱換算成毫巴值為下列哪個數值？", "opts": ["10.132", "101.32", "1013.2", "10132"], "ans": "C", "exp": "標準大氣壓約 1013.2 hPa（毫巴）。"}, {"cat": "專業", "ch": 3, "n": 12, "q": "大氣壓力之實際值與標準值存在差距，係由於哪項因素所影響？", "opts": ["壓力錶廠牌差異", "地面溫度不平均", "壓力錶讀法差異", "壓力錶校正值差異"], "ans": "B", "exp": "地面溫度分布不均，造成實際氣壓與標準值有差距。"}, {"cat": "專業", "ch": 3, "n": 13, "q": "若遙控無人機操作人未能注意大氣壓力實際值與標準值間之差距並適時修正，可能無法精確掌握何項資訊？", "opts": ["實際高度", "實際航向", "實際滾轉角", "實際引擎轉速"], "ans": "A", "exp": "氣壓高度計未修正將無法掌握實際高度。"}, {"cat": "專業", "ch": 3, "n": 14, "q": "氣象資料顯示某區域之氣壓值有向上提升之趨勢，代表該區域天氣狀況有何種變化？", "opts": ["天氣轉壞", "天氣可能轉好也可能轉壞", "天氣好轉", "以上皆非"], "ans": "C", "exp": "氣壓上升趨勢通常代表天氣好轉。"}, {"cat": "專業", "ch": 3, "n": 15, "q": "氣象資料顯示某區域之氣壓值有向下降低之趨勢，代表該區域天氣狀況有何種變化？", "opts": ["天氣好轉", "天氣轉壞", "天氣有時晴朗有時轉壞", "以上皆非"], "ans": "B", "exp": "氣壓下降趨勢通常代表天氣轉壞。"}, {"cat": "專業", "ch": 3, "n": 16, "q": "空氣的水平運動稱為？", "opts": ["「雲」", "「風」", "「霧」", "「霾」"], "ans": "B", "exp": "空氣的水平運動即為「風」。"}, {"cat": "專業", "ch": 3, "n": 17, "q": "有關風速的單位下列何者為非？", "opts": ["公尺/每秒 （m/s）", "公里/每小時 （km/h）", "海浬/每小時 （kts）", "公斤/每小時 （kg）"], "ans": "D", "exp": "公斤/小時是質量流率，非風速單位，故為非。"}, {"cat": "專業", "ch": 3, "n": 18, "q": "遙控無人機通常應於下列哪種風向下起降？", "opts": ["順風", "側風", "逆風", "任何風向"], "ans": "C", "exp": "逆風起降可增升力、縮短起降距離。"}, {"cat": "專業", "ch": 3, "n": 19, "q": "遙控無人飛機於逆風下起飛，不會有以下哪種特性？", "opts": ["增加穩定性", "增加操縱性", "減少起飛距離", "減少操縱性"], "ans": "D", "exp": "逆風增穩定、增操縱、縮短距離，故「減少操縱性」不會發生。"}, {"cat": "專業", "ch": 3, "n": 20, "q": "遙控無人機飛經下列哪個區域較易遭受亂流影響，且其亂流強度與周遭環境有密切關聯？", "opts": ["大草原區", "寬廣湖泊區", "平坦操場上空", "深山峽谷區"], "ans": "D", "exp": "峽谷地形使氣流紊亂，易生亂流。"}, {"cat": "專業", "ch": 3, "n": 21, "q": "當越強勁的風吹過多山地區時，背風面的風場會如何變化？", "opts": ["漸趨平穩", "有時平穩有時不平穩", "漸趨不平穩", "不變"], "ans": "C", "exp": "背風面易生亂流，越強風越不平穩。"}, {"cat": "專業", "ch": 3, "n": 22, "q": "遙控無人機飛航活動期間，可能於任何高度遭遇不同風切狀況，其中以哪一項對其操控性影響最大？", "opts": ["超高空風切", "高空風切", "向量風切", "低空風切"], "ans": "D", "exp": "起降位於低空，低空風切影響最大。"}, {"cat": "專業", "ch": 3, "n": 23, "q": "遙控無人機於起降階段突遇風速與風向之明顯改變，不會有下列哪種影響？", "opts": ["飛行姿態改變", "飛行軌跡改變", "所獲升力改變", "最大載重改變"], "ans": "D", "exp": "風切改變姿態、軌跡、升力，但不改變最大載重能力。"}, {"cat": "專業", "ch": 3, "n": 24, "q": "下列針對發生於臺灣地區低空風切之敘述，何者較為正確？", "opts": ["於鋒面過境時較為溫和，西南季風吹拂時較為強烈", "於鋒面過境時較為強烈，西南季風吹拂時較為溫和", "鋒面過境或西南季風吹拂時均為溫和", "鋒面過境或西南季風吹拂時均為強烈"], "ans": "B", "exp": "臺灣鋒面過境時低空風切較強烈，西南季風時較溫和。"}, {"cat": "專業", "ch": 3, "n": 25, "q": "遙控無人機操作人於操作前及操作時需隨時注意天氣狀況，因天氣因素可能對無人機產生何種影響？", "opts": ["外觀美感", "飛行航向", "品牌知名度", "重量大小"], "ans": "B", "exp": "風等天氣因素會影響飛行航向。"}, {"cat": "專業", "ch": 3, "n": 26, "q": "下列何種天氣現象，與大氣垂直運動無直接關係？", "opts": ["雷雨", "平流霧", "冰雹", "下爆氣流"], "ans": "B", "exp": "平流霧靠水平移流生成，與垂直運動無直接關係。"}, {"cat": "專業", "ch": 3, "n": 27, "q": "大氣穩定度與下列何項因子有直接關係？", "opts": ["空氣流動方向", "空氣中懸浮微粒大小", "水氣飽和程度", "空氣乾燥程度"], "ans": "A", "exp": "（官方答案）大氣穩定度與空氣流動方向有直接關係。"}, {"cat": "專業", "ch": 3, "n": 28, "q": "於地球表面某特殊地區所生成，具停留時間長且其水平方向之物理性質(如溫度及濕度)等均為一致之廣大空氣體，稱之？", "opts": ["鋒面", "氣團", "颶風", "塔狀積雲"], "ans": "B", "exp": "此即氣團。"}, {"cat": "專業", "ch": 3, "n": 29, "q": "下列哪個城市所處位置之氣候條件，較易發生午後雷陣雨？", "opts": ["東京", "新加坡", "莫斯科", "倫敦"], "ans": "B", "exp": "新加坡近赤道、高溫高濕，午後對流旺盛。"}, {"cat": "專業", "ch": 3, "n": 30, "q": "一定量空氣於一定溫度下，所能容納之下列何者亦有其限度？", "opts": ["PM2.5", "微生物", "水氣量", "細菌"], "ans": "C", "exp": "空氣容納水氣量有其上限（飽和）。"}, {"cat": "專業", "ch": 3, "n": 31, "q": "當空氣中水氣含量已達其最高限度時，此時相對溼度為何？", "opts": ["0.2", "0.4", "0.8", "1"], "ans": "D", "exp": "飽和時相對濕度為 1（100%）。"}, {"cat": "專業", "ch": 3, "n": 32, "q": "空氣能容納水氣量之多寡與下列何者有密切關係？", "opts": ["空氣含氧量", "空氣雜質含量", "溫度", "空氣惰性氣體成份"], "ans": "C", "exp": "空氣可容納的水氣量與溫度密切相關（溫度越高容納越多）。"}, {"cat": "專業", "ch": 3, "n": 33, "q": "已飽和之水氣如遇溫度持續下降，不會產生下列哪種現象？", "opts": ["霧", "雲", "雨滴", "風"], "ans": "D", "exp": "降溫凝結成霧雲雨；風是氣壓差造成，與此無關。"}, {"cat": "專業", "ch": 3, "n": 34, "q": "空氣中實際所含水氣量，與相同溫度下可含最大水氣量之百分比，稱為？", "opts": ["絕對濕度", "相對濕度", "同溫濕度", "實際濕度"], "ans": "B", "exp": "此即相對濕度。"}, {"cat": "專業", "ch": 3, "n": 35, "q": "空氣中濕度越高，會導致下列哪種情形？", "opts": ["空氣的壓力越大", "空氣密度越低", "飛行器升力增加", "涼爽度提高"], "ans": "B", "exp": "水氣比乾空氣輕，濕度越高空氣密度越低。"}, {"cat": "專業", "ch": 3, "n": 36, "q": "當空氣溫度等於露點溫度時，即達到何種狀況？", "opts": ["水氣沸點", "水氣飽和點", "水氣熔點", "水氣蒸發點"], "ans": "B", "exp": "溫度＝露點時達水氣飽和。"}, {"cat": "專業", "ch": 3, "n": 37, "q": "水汽飽和時不會產生下列哪種現象？", "opts": ["雲", "霧", "雨", "雷爆"], "ans": "D", "exp": "飽和生雲霧雨；雷爆需強對流，非僅飽和即成。"}, {"cat": "專業", "ch": 3, "n": 38, "q": "「霧」依其形成條件及特性分有不同種類，下列何者非常用之分類？", "opts": ["平流霧", "蒸氣霧", "鋒面霧", "高空霧"], "ans": "D", "exp": "常用分類無「高空霧」。"}, {"cat": "專業", "ch": 3, "n": 39, "q": "有關平流霧之特點，下列何者為非？", "opts": ["日出後消散快速", "相對濕度較高", "不容易消散", "可能發生於沿海區域"], "ans": "A", "exp": "平流霧不易消散，故「日出後消散快速」為非。"}, {"cat": "專業", "ch": 3, "n": 40, "q": "下列哪一種情況能有助於平流霧之消散？", "opts": ["風速變小", "風向轉變", "溫度升高", "濕度增高"], "ans": "B", "exp": "風向轉變（帶走潮濕氣流）有助平流霧消散。"}, {"cat": "專業", "ch": 3, "n": 41, "q": "有關輻射霧之特點，下列何者為非？", "opts": ["日出後漸漸消散", "大都發生於冬季", "相較於平流霧比較不容易消散", "通常地面風速微弱、空氣穩定"], "ans": "C", "exp": "輻射霧日出後漸消散，故「比平流霧不易消散」為非。"}, {"cat": "專業", "ch": 3, "n": 42, "q": "冷空氣因流經溫暖水面之蒸發作用使其中水氣增加，因而凝結成下列哪種霧的型態？", "opts": ["蒸氣霧", "輻射霧", "山坡霧", "鋒面霧"], "ans": "A", "exp": "此為蒸氣霧（如寒冷水面上冒煙）。"}, {"cat": "專業", "ch": 3, "n": 43, "q": "蒸氣霧常出現於下列哪個季節？", "opts": ["春夏季節", "夏末季節", "秋冬季節", "春末季節"], "ans": "C", "exp": "秋冬冷空氣流經暖水面，易生蒸氣霧。"}, {"cat": "專業", "ch": 3, "n": 44, "q": "於兩股不同性質氣團之交界面，當空氣自高空往下移動自近地面較冷空氣而凝結所成之霧，稱之？", "opts": ["鋒面霧", "山坡霧", "輻射霧", "蒸氣霧"], "ans": "A", "exp": "鋒面交界處凝結為鋒面霧。"}, {"cat": "專業", "ch": 3, "n": 45, "q": "鋒面霧多伴隨何種天氣現象發生？", "opts": ["颱風", "鋒面", "雷陣雨", "龍捲風"], "ans": "B", "exp": "鋒面霧伴隨鋒面過境發生。"}, {"cat": "專業", "ch": 3, "n": 46, "q": "平流和輻射兩種物理過程亦可相輔相成，造成下列哪種霧的發生？", "opts": ["平流輻射霧", "山坡霧", "蒸氣霧", "鋒面霧"], "ans": "A", "exp": "兩者結合成平流輻射霧。"}, {"cat": "專業", "ch": 3, "n": 47, "q": "當周遭空氣溫度下降至低於露點，水氣因此凝結成水滴並附著於地表或建築物上，其稱之？", "opts": ["雲", "露", "霧", "霜"], "ans": "B", "exp": "凝結成水滴附著者為露。"}, {"cat": "專業", "ch": 3, "n": 48, "q": "附著於航空器上之露珠若凝結成固態霜，對飛航安全有何影響？", "opts": ["對飛安有幫助", "對飛安可能造成危害", "對飛安並無影響", "對飛安有時可能造成危害有時無影響"], "ans": "B", "exp": "結霜破壞氣流、降低升力，可能危害飛安。"}, {"cat": "專業", "ch": 3, "n": 49, "q": "附著於機體表面的霜在飛行時不會產生下列哪種情形？", "opts": ["擾動流經機翼之空氣", "降低升力", "增加阻力", "增加飛航效率"], "ans": "D", "exp": "結霜降低飛航效率，故「增加飛航效率」不會發生。"}, {"cat": "專業", "ch": 3, "n": 50, "q": "於大陸型氣候區域執行深秋早晨之飛行任務前，務必進行下列哪個程序以確保安全？", "opts": ["暖身程序", "點名程序", "除霜程序", "冥想程序"], "ans": "C", "exp": "深秋早晨易結霜，須先除霜。"}, {"cat": "專業", "ch": 3, "n": 51, "q": "雲有下列哪幾種型態？", "opts": ["積狀雲", "層狀雲", "卷狀雲", "以上皆是"], "ans": "D", "exp": "雲型態分積狀、層狀、卷狀。"}, {"cat": "專業", "ch": 3, "n": 52, "q": "雲的型態依據雲所在的高度可以分成下列哪幾種？", "opts": ["高雲族", "中雲族", "低雲族", "以上皆是"], "ans": "D", "exp": "依高度分高、中、低雲族。"}, {"cat": "專業", "ch": 3, "n": 53, "q": "高雲族高度大約在 6,000 公尺以上，主要有下列哪幾種？", "opts": ["卷雲", "卷層雲", "卷積雲", "以上皆是"], "ans": "D", "exp": "高雲族含卷雲、卷層雲、卷積雲。"}, {"cat": "專業", "ch": 3, "n": 54, "q": "中雲族高度大約在 2,000~6,000 公尺，主要有下列哪幾種？", "opts": ["高積雲", "高層雲", "雨層雲", "以上皆是"], "ans": "D", "exp": "中雲族含高積雲、高層雲、雨層雲。"}, {"cat": "專業", "ch": 3, "n": 55, "q": "低雲族高度位於 2,000 公尺以下，包含下列哪幾種？", "opts": ["積雲", "層雲", "層積雲", "以上皆是"], "ans": "D", "exp": "低雲族含積雲、層雲、層積雲。"}, {"cat": "專業", "ch": 3, "n": 56, "q": "下列何者為常見氣團分類方式？", "opts": ["依其源地緯度高或低", "依其源地為大陸或海洋", "依其所經地面為冷空氣或暖空氣", "以上皆是"], "ans": "D", "exp": "可依緯度、海陸源地、所經地面冷暖分類，故選以上皆是。"}, {"cat": "專業", "ch": 3, "n": 57, "q": "氣團本身冷於周遭空氣稱為？", "opts": ["暖氣團", "冷氣團", "冰氣團", "熱氣團"], "ans": "B", "exp": "冷於周遭者為冷氣團。"}, {"cat": "專業", "ch": 3, "n": 58, "q": "氣團穩定度決定其籠罩區域的哪種形態？", "opts": ["社會形態", "經濟形態", "天氣形態", "政治形態"], "ans": "C", "exp": "氣團穩定度決定天氣形態。"}, {"cat": "專業", "ch": 3, "n": 59, "q": "在鋒面兩側的下列哪種現象通常均有明顯的差異？", "opts": ["溫度", "濕度", "風、天氣", "以上皆是"], "ans": "D", "exp": "鋒面兩側溫度、濕度、風與天氣皆明顯不同。"}, {"cat": "專業", "ch": 3, "n": 60, "q": "當冷空氣前進，迫使暖空氣後退而取代暖空氣原有位置，則此時產生之鋒面稱為？", "opts": ["滯留鋒", "暖鋒", "冷鋒", "囚錮鋒"], "ans": "C", "exp": "冷氣團推進為冷鋒。"}, {"cat": "專業", "ch": 3, "n": 61, "q": "當冷暖氣團勢均力敵以致使鋒面呈滯留狀態，此時之鋒面稱為？", "opts": ["暖鋒", "滯留鋒", "冷鋒", "囚錮鋒"], "ans": "B", "exp": "勢均力敵者為滯留鋒。"}, {"cat": "專業", "ch": 3, "n": 62, "q": "遙控無人機飛經各鋒面區時，可能遭遇下列何項劇烈變化？", "opts": ["溫度", "濕度", "風向", "以上皆是"], "ans": "D", "exp": "鋒面區溫度、濕度、風向皆劇烈變化。"}, {"cat": "專業", "ch": 3, "n": 63, "q": "遙控無人機於山區飛行時若遇強風，則可選擇何處飛行相較為平順？", "opts": ["背風面", "側風面", "迎風面", "以上皆非"], "ans": "C", "exp": "迎風面氣流較平順，背風面易亂流。"}, {"cat": "專業", "ch": 3, "n": 64, "q": "遙控無人機於山區飛行時，過了山巔需注意沿何方向所產生之亂流？", "opts": ["側風面", "背風面", "迎風面", "以上皆非"], "ans": "B", "exp": "過山巔後背風面易生亂流（山岳波）。"}, {"cat": "專業", "ch": 3, "n": 65, "q": "遙控無人機飛越可見水氣（如雨或雲）時，需注意哪個部位可能發生積冰現象？", "opts": ["機翼翼面", "尾翼翼面", "感測器", "以上皆是"], "ans": "D", "exp": "翼面與感測器等皆可能積冰。"}, {"cat": "專業", "ch": 3, "n": 66, "q": "遙控無人機飛行時，於下列哪種情形可能發生積冰現象？", "opts": ["機體周遭氣溫為攝氏零度", "機體周遭氣溫為攝氏零度以下", "有可見水氣", "以上皆是"], "ans": "D", "exp": "0℃或以下且有可見水氣時易積冰，故選以上皆是。"}, {"cat": "專業", "ch": 3, "n": 67, "q": "當遙控無人機飛越結冰區域時，可能發生下列哪種狀況？", "opts": ["影響或誤判遙控無人機飛行性能表現", "提升遙控無人機飛行性能表現", "遙控無人機飛行性能表現可能變好或變壞", "不太可能發生任何狀況"], "ans": "A", "exp": "積冰破壞氣動外形，會影響或誤判飛行性能。"}, {"cat": "專業", "ch": 3, "n": 68, "q": "雷雨的發展循環不包含下列何者？", "opts": ["發展期", "成熟期", "重疊期", "消散期"], "ans": "C", "exp": "雷雨分發展、成熟、消散三期；無「重疊期」。"}, {"cat": "專業", "ch": 3, "n": 69, "q": "雷雨成熟期具有的特徵為何？", "opts": ["下沉氣流", "開始降水", "打雷", "以上皆是"], "ans": "D", "exp": "成熟期有上升與下沉氣流、降水與打雷。"}, {"cat": "專業", "ch": 3, "n": 70, "q": "雷雨消散期具有的特徵為何？", "opts": ["降雨減緩", "下沉氣流減緩", "雷雨雹消散", "以上皆是"], "ans": "D", "exp": "消散期降雨與氣流趨緩、雷雨雹漸消。"}, {"cat": "專業", "ch": 3, "n": 71, "q": "臺北航空氣象中心隸屬於下列哪個機關？", "opts": ["交通部觀光局飛航服務總臺", "交通部民用航空局飛航服務總臺", "交通部中央氣象局飛航服務總臺", "交通部航政司飛航服務總臺"], "ans": "B", "exp": "臺北航空氣象中心隸屬交通部民用航空局飛航服務總臺。"}, {"cat": "專業", "ch": 3, "n": 72, "q": "遙控無人機操作人可透過中央氣象局網頁取得下列哪項資料？", "opts": ["天氣觀測資料", "天氣預報資料", "衛星雲圖", "以上皆是"], "ans": "D", "exp": "中央氣象局網頁提供觀測、預報與衛星雲圖，故選以上皆是。"}, {"cat": "專業", "ch": 3, "n": 73, "q": "遙控無人機操作人可透過飛航服務總臺所建置之航空氣象服務網(AOAWS)取得下列哪項資料？", "opts": ["國內外主要機場之即時觀測資料", "國內機場 6 小時天氣預報資料", "太平洋地區衛星雲圖", "高空風溫圖"], "ans": "A", "exp": "AOAWS 提供國內外主要機場即時觀測資料。"}, {"cat": "專業", "ch": 3, "n": 74, "q": "考量天氣條件對於遙控無人機操控行為之影響，遙控無人機操作人應具備下列何者之基礎判讀能力？", "opts": ["航空氣象報文", "國內城市氣象報文", "外國城市氣象報文", "觀光地區氣象報文"], "ans": "A", "exp": "應能判讀航空氣象報文（如 METAR/TAF）。"}, {"cat": "專業", "ch": 3, "n": 75, "q": "航空例行天氣報告中，所使用觀測日期與時間及其代碼說明為下列何者？", "opts": ["Z 字母指示碼；代表 UTC 時間", "L 字母指示碼；代表本地時間", "T 字母指示碼；代表 UTC 時間", "X 字母指示碼；代表本地時間"], "ans": "A", "exp": "報文以 Z 表示 UTC（協調世界時）。"}, {"cat": "專業", "ch": 3, "n": 76, "q": "航空例行天氣報告中，所觀測盛行能見度值，其編報方式及單位為何？", "opts": ["4 碼（公尺）", "6 碼（公尺）", "8 碼（公尺）", "10 碼（公尺）"], "ans": "A", "exp": "盛行能見度以 4 碼（公尺）編報。"}, {"cat": "專業", "ch": 3, "n": 77, "q": "航空氣象觀測員將天空劃分成 8 等份，若觀測到 1/8 至 2/8 的天空被雲層遮蓋，該雲量類別稱為下列何者？", "opts": ["稀雲", "疏雲", "裂雲", "密雲"], "ans": "A", "exp": "1~2/8 為稀雲(FEW)。"}, {"cat": "專業", "ch": 3, "n": 78, "q": "航空氣象觀測員將天空劃分成 8 等份，若觀測到 3/8 至 4/8 的天空被雲層遮蓋，該雲量類別稱為下列何者？", "opts": ["稀雲", "疏雲", "裂雲", "密雲"], "ans": "B", "exp": "3~4/8 為疏雲(SCT)。"}, {"cat": "專業", "ch": 3, "n": 79, "q": "航空氣象觀測員將天空劃分成 8 等份，若觀測到 5/8 至 7/8 的天空被雲層遮蓋，該雲量類別稱為下列何者？", "opts": ["稀雲", "疏雲", "裂雲", "密雲"], "ans": "C", "exp": "5~7/8 為裂雲(BKN)。"}, {"cat": "專業", "ch": 3, "n": 80, "q": "航空氣象觀測員將天空劃分成 8 等份，若觀測到 8/8 的天空被雲層遮蓋，該雲量類別稱為下列何者？", "opts": ["稀雲", "疏雲", "裂雲", "密雲"], "ans": "D", "exp": "8/8 全天遮蓋為密雲(OVC)。"}, {"cat": "專業", "ch": 3, "n": 81, "q": "航空例行天氣報告中，雲層之雲底高度單位為下列哪一個？", "opts": ["公尺", "公里", "呎", "浬"], "ans": "C", "exp": "雲底高度以呎為單位。"}, {"cat": "專業", "ch": 3, "n": 82, "q": "終端機場天氣觀測報中，盛行天氣現象包括下列哪個項目？", "opts": ["風向風速", "能見度", "天氣狀況及雲組", "以上皆是"], "ans": "D", "exp": "含風、能見度、天氣狀況及雲組等。"}, {"cat": "專業", "ch": 3, "n": 83, "q": "某一特定容積氣體的密度換算成標準大氣壓力狀態下的高度，稱之為下列哪種高度？", "opts": ["指示高度", "壓力高度", "密度高度", "絕對高度"], "ans": "C", "exp": "某容積氣體密度換算成標準大氣壓下的高度，即密度高度。"}, {"cat": "專業", "ch": 3, "n": 84, "q": "相同體積下，在低壓力狀態的氣體，其特徵為？", "opts": ["質量較高", "密度較低", "質量密度均高", "無法判斷"], "ans": "B", "exp": "相同體積、低壓力狀態，氣體密度較低。"}, {"cat": "專業", "ch": 3, "n": 85, "q": "相同體積下，當壓力加倍，則空氣密度將為哪種變化？", "opts": ["亦為加倍", "減半", "增加 4 倍", "減少為 1/4"], "ans": "A", "exp": "等溫下密度與壓力成正比，壓力加倍則密度加倍。"}, {"cat": "專業", "ch": 3, "n": 86, "q": "於一定體積下，空氣之溫度與密度成何項關係？", "opts": ["溫度與密度成正比", "溫度與密度成反比", "溫度與密度的平方成正比", "溫度與密度的平方成反比"], "ans": "B", "exp": "一定體積下，溫度與密度成反比。"}, {"cat": "專業", "ch": 3, "n": 87, "q": "「國際標準大氣」是指在假設大氣環境下，海平面之大氣壓力和溫度分別為何？", "opts": ["29.92 吋汞柱/攝氏 25 度", "29.92 吋汞柱/攝氏 15 度", "39.92 吋汞柱/攝氏 15 度", "39.92 吋汞柱/攝氏 25 度"], "ans": "B", "exp": "國際標準大氣海平面：29.92 吋汞柱、攝氏 15 度。"}, {"cat": "專業", "ch": 3, "n": 88, "q": "於對流層中，高度每上升 1,000 呎，溫度如何變化？", "opts": ["降低約攝氏 2 度", "升高約攝氏 2 度", "降低約攝氏 20 度", "升高約攝氏 20 度"], "ans": "A", "exp": "對流層每上升 1,000 呎，溫度約降低攝氏 2 度。"}, {"cat": "專業", "ch": 3, "n": 89, "q": "高度每上升 1,000 呎，氣壓值如何變化？", "opts": ["減少約 10 吋汞柱", "增加約 10 吋汞柱", "減少約 1 吋汞柱", "增加約 1 吋汞柱"], "ans": "C", "exp": "每上升 1,000 呎，氣壓約減少 1 吋汞柱。"}, {"cat": "專業", "ch": 3, "n": 90, "q": "氣象上定義風的來向為風向，例如風自東邊吹來，稱其為？", "opts": ["西風", "東風", "南風", "北風"], "ans": "B", "exp": "風的來向為風向，自東邊吹來稱東風。"}, {"cat": "專業", "ch": 3, "n": 91, "q": "當遙控無人飛機於起飛時遭遇較強之正側風，可能導致下列哪種風險？", "opts": ["操作人視線不清", "導控距離變短", "翼面與地面接觸", "起飛距離變短"], "ans": "C", "exp": "起飛遇強正側風，可能使翼面與地面接觸。"}, {"cat": "專業", "ch": 3, "n": 92, "q": "當遙控無人飛機於降落時遭遇較強之正側風，可能導致下列哪種風險？", "opts": ["落地後偏離跑道", "操作人視線不清", "導控距離變短", "降落距離變短"], "ans": "A", "exp": "降落遇強正側風，可能落地後偏離跑道。"}, {"cat": "專業", "ch": 3, "n": 93, "q": "遙控無人直昇機及遙控無人多旋翼機，由於可垂直起降，因此對於風向之考量多著重於下列何者？", "opts": ["起降時遇到較強的正側風", "滯空飛行時的穩定度", "避免順風起降", "不要遮蔽操作人視線"], "ans": "B", "exp": "可垂直起降的直昇機/多旋翼，風向考量多著重滯空飛行時的穩定度。"}, {"cat": "專業", "ch": 3, "n": 94, "q": "大氣中不同兩點間風速或風向之劇烈變化，稱之為何？", "opts": ["風流", "風切", "風格", "風氣"], "ans": "B", "exp": "兩點間風速或風向的劇烈變化稱為風切。"}, {"cat": "專業", "ch": 3, "n": 95, "q": "風切可能伴隨下列哪種現象？", "opts": ["垂直氣流", "焚風氣流", "旋風氣流", "離心氣流"], "ans": "A", "exp": "風切常伴隨垂直氣流。"}, {"cat": "專業", "ch": 3, "n": 96, "q": "所謂低空風切，我國定義係指下列哪個高度範圍之空氣層中，其風向或風速之突然變化？", "opts": ["10,000~15,000 呎", "5,000~10,000 呎", "1,600~5,000 呎", "1,600 呎以下"], "ans": "D", "exp": "我國低空風切定義為 1,600 呎以下空氣層的風向風速突變。"}, {"cat": "專業", "ch": 3, "n": 97, "q": "微爆氣流的循環約在 5 到 15 分鐘之間，所產生之下沉氣流可達下列何項速度？", "opts": ["每分鐘 600 呎", "每分鐘 6,000 呎", "每分鐘 20,000 呎", "每分鐘 50,000 呎"], "ans": "B", "exp": "微爆氣流下沉氣流可達每分鐘 6,000 呎。"}, {"cat": "專業", "ch": 3, "n": 98, "q": "微爆氣流頂風與尾風的速度差距可達哪項範圍？", "opts": ["30 到 90 節", "5 到 10 節", "10 到 20 節", "20 到 30 節"], "ans": "A", "exp": "微爆氣流頂風與尾風速度差可達 30 到 90 節。"}, {"cat": "專業", "ch": 3, "n": 99, "q": "淺層的逆溫層一般來說高度為下列何者？", "opts": ["約離地 5,000 公尺", "約離地 3,000 公尺", "約離地 1,000 公尺", "約離地 300 公尺"], "ans": "D", "exp": "淺層逆溫層高度一般約離地 300 公尺。"}, {"cat": "專業", "ch": 3, "n": 100, "q": "同樣體積之空氣溫度愈高，能容納之水氣為何？", "opts": ["愈多", "愈少", "不變", "有時愈多有時愈少"], "ans": "A", "exp": "同體積空氣溫度越高，能容納的水氣越多。"}, {"cat": "專業", "ch": 3, "n": 101, "q": "在一定大氣壓力下，空氣中水氣含量固定不變時，若氣溫降至相當溫度使空氣飽和，氣溫再稍低，水氣即行凝結，此時之溫度，稱為下列哪種狀況？", "opts": ["露點", "沸點", "霜點", "熔點"], "ans": "A", "exp": "降溫至飽和再稍低即凝結，該溫度稱露點。"}, {"cat": "專業", "ch": 3, "n": 102, "q": "暖空氣經過冷地表時，暖空氣受地表影響降溫，可使水氣達到下列哪個狀態？", "opts": ["不飽和狀態", "半飽和狀態", "飽和狀態", "超飽和狀態"], "ans": "C", "exp": "暖空氣經冷地表降溫，可使水氣達飽和狀態。"}, {"cat": "專業", "ch": 3, "n": 103, "q": "當空氣溫度達到或接近露點時，空氣中的水氣就會逐漸凝結，進而發生會影響能見度的下列哪種狀況？", "opts": ["霜", "露", "霧", "以上皆是"], "ans": "C", "exp": "溫度接近露點使水氣凝結，形成影響能見度的「霧」。"}, {"cat": "專業", "ch": 3, "n": 104, "q": "當溫暖且潮溼的空氣流經較冷的地面時，低層空氣中的水氣會因冷卻作用而凝結形成霧，稱之為下列哪種霧？", "opts": ["平流霧", "山坡霧", "鋒面霧", "蒸氣霧"], "ans": "A", "exp": "暖濕空氣流經較冷地面冷卻凝結成霧，為平流霧。"}, {"cat": "專業", "ch": 3, "n": 105, "q": "通常出現在冬季晴朗、微風、近地面水氣充沛的夜間或清晨的霧，稱之為下列哪種霧？", "opts": ["輻射霧", "山坡霧", "鋒面霧", "蒸氣霧"], "ans": "A", "exp": "冬季晴朗微風夜間或清晨近地面成的霧，為輻射霧。"}, {"cat": "專業", "ch": 3, "n": 106, "q": "當濕空氣沿山坡上升時，經絕熱冷卻而成的霧，稱之為下列哪種霧？", "opts": ["山坡霧", "輻射霧", "蒸氣霧", "鋒面霧"], "ans": "A", "exp": "濕空氣沿山坡上升絕熱冷卻成的霧，為山坡霧。"}, {"cat": "專業", "ch": 3, "n": 107, "q": "平流輻射霧好發生於下列哪種季節地點？", "opts": ["春末夏初台灣東部地區", "夏末秋初台灣北部地區", "冬末春初台灣西部地區", "秋末冬初台灣南部地區"], "ans": "C", "exp": "平流輻射霧好發於冬末春初台灣西部地區。"}, {"cat": "專業", "ch": 3, "n": 108, "q": "水氣若溫度低於冰點即凝結成下列哪種現象？", "opts": ["雲", "霜", "露", "霧"], "ans": "B", "exp": "水氣於低於冰點時凝結成霜。"}, {"cat": "專業", "ch": 3, "n": 109, "q": "氣團從發源地移出後，與不同屬性的氣團相遇，而性質不同之冷暖兩氣團相遇時，其交界處稱為下列哪種現象？", "opts": ["鋒面", "界面", "團面", "表面"], "ans": "A", "exp": "冷暖兩不同氣團相遇的交界處稱鋒面。"}, {"cat": "專業", "ch": 3, "n": 110, "q": "遙控無人機若是嚴重結冰則可能會導致下列哪種狀況？", "opts": ["推力不足而失速", "重心偏移而失速", "升力不足而失速", "以上皆是"], "ans": "C", "exp": "嚴重結冰破壞翼面氣流，導致升力不足而失速。"}, {"cat": "專業", "ch": 3, "n": 111, "q": "雷雨發展期的特徵是下列哪種現象？", "opts": ["下沉氣流", "上升氣流", "垂直風切", "水平風切"], "ans": "B", "exp": "雷雨發展期以上升氣流為特徵。"}, {"cat": "專業", "ch": 3, "n": 112, "q": "不宜在下列哪個範圍操作遙控無人機？", "opts": ["成長快速的積雲附近", "遠離成長快速的積雲", "不明顯且成長停滯的積雲附近", "以上皆非"], "ans": "A", "exp": "成長快速的積雲對流旺盛，不宜於其附近操作。"}, {"cat": "專業", "ch": 3, "n": 113, "q": "雷雨成熟期的上升氣流及下沉氣流互相交錯，產生下列哪種現象？", "opts": ["水平風切", "垂直風切", "低空風切", "微爆氣流"], "ans": "B", "exp": "雷雨成熟期上升與下沉氣流交錯，產生垂直風切。"}, {"cat": "專業", "ch": 3, "n": 114, "q": "航空氣象裡的機場觀測項目中，觀測人員就機場現時觀測之結果，原則上在下列哪個時間間隔編報「航空例行天氣報告（METAR）」？", "opts": ["每 5 分鐘或 10 分鐘", "每 30 分鐘或 60 分鐘", "每 6 小時或 12 小時", "每 24 小時或 36 小時"], "ans": "B", "exp": "METAR 原則上每 30 分鐘或 60 分鐘編報一次。"}, {"cat": "專業", "ch": 3, "n": 115, "q": "航空氣象裡的預報資料項目中，針對機場的天氣預報原則上在下列哪個時間間隔編報「終端機場天氣預報（TAF）」？", "opts": ["每 24 小時", "每 12 小時", "每 6 小時", "每 2 小時"], "ans": "C", "exp": "TAF 原則上每 6 小時編報一次。"}, {"cat": "專業", "ch": 3, "n": 116, "q": "航空例行天氣報告中，觀測場站之識別碼：觀測發生之機場，我國機場識別碼前兩碼均為下列哪兩個英文字母？", "opts": ["QQ", "RC", "AA", "BB"], "ans": "B", "exp": "我國機場 ICAO 識別碼前兩碼為 RC。"}, {"cat": "專業", "ch": 3, "n": 117, "q": "航空例行天氣報告中，風向及風速：機場風向風速之觀測值，使用觀測下列哪個期間之平均風向與平均風速之編報？", "opts": ["前 1 分鐘", "前 10 分鐘", "前 60 分鐘", "前 180 分鐘"], "ans": "B", "exp": "METAR 風向風速採前 10 分鐘之平均值編報。"}, {"cat": "專業", "ch": 3, "n": 118, "q": "航空例行天氣報告中，雲量是指下列哪個定義？", "opts": ["雲在天空中的烏黑程度", "雲在天空中的高度", "雲在天空中遮蓋的份數", "雲在天空中的移動速度"], "ans": "C", "exp": "雲量指雲在天空中遮蓋的份數（以八分數表示）。"}, {"cat": "專業", "ch": 3, "n": 119, "q": "遙控無人機操作人針對不同壓力高度對於無人機起降滑行距離之影響，應有何種正確認知？", "opts": ["只要載重固定，起降滑行距離不受壓力高度變化影響", "起降滑行距離與跑道鋪面、坡度及地面風向有關，無關壓力高度", "壓力高度影響空氣密度，進而影響爬升率，對於起降滑行距離有直接影響", "起降滑行距離與無人機動力來源有關，無關壓力高度"], "ans": "C", "exp": "壓力高度影響空氣密度與爬升率，對起降滑行距離有直接影響。"}, {"cat": "專業", "ch": 3, "n": 120, "q": "「霧」對於無人機起降活動之影響顯而易見，請問下列針對「霧」的成因判斷，何者最為恰當？", "opts": ["注意風（空氣水平運動）的狀況，風速增加就可能形成「霧」", "注意對流（空氣垂直運動）的狀況，對流增強就可能形成「霧」", "注意大氣壓力值是否降低，降低就可能形成「霧」", "注意空氣溫度是否接近露點溫度，接近就可能形成「霧」"], "ans": "D", "exp": "空氣溫度接近露點時就可能形成霧，為最恰當判斷。"}, {"cat": "專業", "ch": 3, "n": 121, "q": "無人機結束任務正準備返場，團隊藉由氣象資料得知 5 邊航線上有風切現象，風速及風向變化劇烈，請問操作人應特別注意風切對無人機之何項影響？", "opts": ["引擎轉數可能因此而不穩定", "資料鏈和 GPS 可能因此而失效", "重心可能因此而偏移", "可能造成升力損失，影響飛航穩定性，甚至無法安全降落"], "ans": "D", "exp": "風切可能造成升力損失、影響飛航穩定，甚至無法安全降落。"}, {"cat": "專業", "ch": 3, "n": 122, "q": "無人機正於高聳建物附近飛行，因地面上障礙物會影響風的流動，故操作人應特別注意下列何種情形？", "opts": ["風速及風向快速變化所產生之亂流", "加強無人機穩定性及視線", "發揮無人機性能表現", "避免資料鏈和 GPS 可能因風速及風向之變化而失效"], "ans": "A", "exp": "高聳建物附近應特別注意風速風向快速變化所生之亂流。"}, {"cat": "專業", "ch": 3, "n": 123, "q": "當氣團行經水面和陸地，最終將與另一不同特性的氣團接觸。此兩種不同類型的氣團的邊界層稱為鋒面。請問操作人最容易辨認下列哪一種鋒面中的不連續現象？", "opts": ["雲層的增加", "相對濕度的增加", "溫度的變化", "能見度的變化"], "ans": "C", "exp": "操作人最容易由溫度的變化辨認鋒面的不連續現象。"}, {"cat": "專業", "ch": 3, "n": 124, "q": "當無人機須穿越鋒面進行飛航任務時，操作人應特別注意下列哪一種天氣現象之變化？", "opts": ["降水型態之改變", "風向之改變", "氣團穩定性之改變", "相對濕度之改變"], "ans": "B", "exp": "穿越鋒面時應特別注意風向之改變。"}, {"cat": "專業", "ch": 3, "n": 125, "q": "無人機正以定速（40 kts/時）及定姿態方式保持往東飛行，此時 GPS 速度（地速）顯示為 44 kts/時，GPS 航向為 116 度，請問風速和風向約略為何？", "opts": ["東風 20 kts", "北風 20 kts", "南風 20 kts", "西風 20 kts"], "ans": "B", "exp": "空速40kt向東、地速44kt/航向116°，回推風為北風約20kt。"}, {"cat": "專業", "ch": 3, "n": 126, "q": "當無人機飛行於標準大氣壓力之環境下，其高度表指示高度（壓力高度）為 3,000 英呎，請問此時大氣壓力約為多少？", "opts": ["28.86 英吋汞柱高", "27.82 英吋汞柱高", "26.82 英吋汞柱高", "25.84 英吋汞柱高"], "ans": "C", "exp": "標準大氣下壓力高度 3,000 呎，氣壓約 26.82 吋汞柱（29.92−3）。"}, {"cat": "專業", "ch": 3, "n": 127, "q": "於標準大氣壓力環境下，無人機正於機場(位於水平面)跑道頭準備起飛，此時高度表指示高度（壓力高度）為 200 英呎，為使無人機壓力高度與機場跑道高度一致，請問操作人應採取下列哪一項動作？", "opts": ["壓力高度修正為 29.72 英吋汞柱高", "壓力高度修正為 27.92 英吋汞柱高", "壓力高度修正為 29.52 英吋汞柱高", "壓力高度修正為 25.92 英吋汞柱高"], "ans": "A", "exp": "指示高度 200 呎需修正為 0，撥定值 29.92−0.20＝29.72 吋汞柱。"}, {"cat": "專業", "ch": 3, "n": 128, "q": "無人機正往南的方向飛行前往任務目標區，根據氣象資料顯示，飛行航線上吹著穩定而強勁之北風，其區域及鄰近並無明顯障礙物，請問下列所述狀況何者為操作人較無須擔心事項？", "opts": ["強風所持續之時間", "風速是否超出無人機飛航性能限制", "是否受到側風過大而影響飛航操作", "是否因於強風中飛行而消耗更多動力來源，進而降低續航力"], "ans": "C", "exp": "向南飛遇強北風屬順（尾）風，較無須擔心側風過大的問題。"}, {"cat": "專業", "ch": 3, "n": 129, "q": "依據雲層佔據整個天空的比例，一般將雲區分成稀雲、疏雲、裂雲、密雲等 4 個種類。現在收到氣象預報：「早晨疏雲，上午密雲，下午裂雲，晚上稀雲」，請問下列哪一個時段的降雨機率比較大？", "opts": ["早晨", "晚上", "上午", "下午"], "ans": "C", "exp": "密雲（全天遮蓋）時降雨機率最大，對應上午。"}, {"cat": "專業", "ch": 4, "n": 1, "q": "遙控無人機操作人在執行任務前及過程中，需確保參與執行的成員不受下列哪種狀況的影響？", "opts": ["娛樂圈八卦和謠言", "國內股市行情", "酒精及藥物", "世界經濟發展情勢"], "ans": "C", "exp": "執行任務前後須確保成員不受酒精及藥物影響。"}, {"cat": "專業", "ch": 4, "n": 2, "q": "遙控無人機操作人在執行任務前及過程中，下列哪種狀況也可能影響操作安全？", "opts": ["娛樂圈八卦和謠言", "一般的成藥如抗組織胺或解除充血劑", "國內股市行情", "世界經濟發展情勢"], "ans": "B", "exp": "抗組織胺、解除充血劑等成藥可能造成嗜睡，影響操作安全。"}, {"cat": "專業", "ch": 4, "n": 3, "q": "有關可能影響操作人安全操作遙控無人機的因素主要有下列哪種狀況？", "opts": ["過度換氣、壓力、疲勞", "脫水、熱中暑", "酒精與藥物", "以上皆是"], "ans": "D", "exp": "生理心理各項狀況都可能影響操作。"}, {"cat": "專業", "ch": 4, "n": 4, "q": "過度換氣若無法善加控制，可能讓遙控無人機操作人進入下列哪個狀態？", "opts": ["神經緊張", "意識不清", "心情鬱悶", "懷疑心重"], "ans": "B", "exp": "過度換氣可能導致意識不清。"}, {"cat": "專業", "ch": 4, "n": 5, "q": "過度換氣的常見症狀有下列哪種狀況？", "opts": ["視界窄化、意識不清", "輕快或暈眩感、肢體末稍有刺痛感", "對冷熱敏感、肌肉痙攣感", "以上皆是"], "ans": "D", "exp": "視界窄化、暈眩刺痛、對冷熱敏感肌肉痙攣皆為過度換氣症狀，故選以上皆是。"}, {"cat": "專業", "ch": 4, "n": 6, "q": "過度換氣的改善方法是下列哪種方式？", "opts": ["多閱讀、多聽音樂", "適當的飲食", "血液裡的二氧化碳濃度恢復到正常狀態", "擴展社交範圍"], "ans": "C", "exp": "使血中二氧化碳濃度恢復正常即可改善過度換氣。"}, {"cat": "專業", "ch": 4, "n": 7, "q": "最好的預防及矯治過度換氣的方法就是下列哪種方式？", "opts": ["讓呼吸保持正常、朝向紙袋呼吸或大聲交談", "多閱讀、多聽音樂", "適當的飲食", "擴展社交範圍"], "ans": "A", "exp": "放慢呼吸、朝紙袋呼吸或大聲交談，可提高血中 CO₂，為最佳矯治法。"}, {"cat": "專業", "ch": 4, "n": 8, "q": "下列哪種狀況是人體對於生理及心理的需求所做出的反應？", "opts": ["脫水", "壓力", "熱中暑", "酒醉"], "ans": "B", "exp": "壓力是身心對需求的反應。"}, {"cat": "專業", "ch": 4, "n": 9, "q": "壓力源包括下列哪種狀況？", "opts": ["物理的壓力（如噪音及振動）", "生理的壓力（如疲勞）", "心理的壓力（如工作困難或個人情緒因素）", "以上皆是"], "ans": "D", "exp": "物理、生理、心理壓力皆為壓力源，故選以上皆是。"}, {"cat": "專業", "ch": 4, "n": 10, "q": "持續性的急性壓力可能發展成下列哪種狀況？", "opts": ["不定期的過度換氣壓力", "不定期的疲勞壓力", "長期的慢性壓力", "不定期的酒精壓力"], "ans": "C", "exp": "持續性急性壓力可能發展成長期慢性壓力。"}, {"cat": "專業", "ch": 4, "n": 11, "q": "慢性壓力在長期累積或壓抑下，會導致下列哪種狀況？", "opts": ["個人能力大幅提升", "個人能力時好時壞", "個人能力大幅下滑", "個人能力保持不變"], "ans": "C", "exp": "慢性壓力長期累積會使個人能力大幅下滑。"}, {"cat": "專業", "ch": 4, "n": 12, "q": "遙控無人機操作人若體驗到壓力已導致己身能力下滑時即應採取下列哪種作為？", "opts": ["暫停執行任務、適當休息", "堅持到底、繼續執行任務", "順其自然、不必大驚小怪", "邊聽音樂舒壓、邊執行任務"], "ans": "A", "exp": "壓力導致能力下滑時，應暫停任務、適當休息。"}, {"cat": "專業", "ch": 4, "n": 13, "q": "狀況警覺是對哪些風險元素的認知與瞭解？", "opts": ["飛行作業", "操作人、航空器", "環境及任務種類", "以上皆是"], "ans": "D", "exp": "涵蓋作業、人、機、環境與任務。"}, {"cat": "專業", "ch": 4, "n": 14, "q": "下列哪種狀況可能使遙控無人機操作人過度集中注意力在某件事物而失去對整體任務的掌握？", "opts": ["疲勞", "壓力", "工作量過多", "以上皆是"], "ans": "D", "exp": "疲勞、壓力、工作量過多都會造成注意力窄化。"}, {"cat": "專業", "ch": 4, "n": 15, "q": "操作遙控無人機前藉由下列哪些有效的工作量管理，以確保飛行任務安全執行？", "opts": ["計畫", "整理", "排序工作任務", "以上皆是"], "ans": "D", "exp": "計畫、整理、排序皆為工作量管理。"}, {"cat": "專業", "ch": 4, "n": 16, "q": "疲勞可分為下列哪幾種？", "opts": ["生理性疲勞", "心理性疲勞", "急性與慢性疲勞", "以上皆是"], "ans": "D", "exp": "疲勞含生理、心理與急/慢性。"}, {"cat": "專業", "ch": 4, "n": 17, "q": "疲勞會導致下列哪幾種症狀，影響遙控無人機操作人的判斷力？", "opts": ["注意力渙散", "專注力下降", "協調性及溝通性降低", "以上皆是"], "ans": "D", "exp": "疲勞使注意力渙散、專注力下降、協調溝通降低，故選以上皆是。"}, {"cat": "專業", "ch": 4, "n": 18, "q": "急性疲勞通常是下列哪一種？", "opts": ["短期", "長期", "有時長期有時短期", "以上皆非"], "ans": "A", "exp": "急性疲勞通常是短期性的。"}, {"cat": "專業", "ch": 4, "n": 19, "q": "遙控無人機操作人若忽略或未及時改善急性疲勞，則會進一步造成下列哪種狀況？", "opts": ["過度疲勞", "慢性疲勞", "中度疲勞", "低度疲勞"], "ans": "B", "exp": "急性疲勞未改善會轉為慢性疲勞。"}, {"cat": "專業", "ch": 4, "n": 20, "q": "慢性疲勞可能出現的症狀包括下列哪種狀況？", "opts": ["虛弱、強烈的疲倦、倦怠感", "心悸、呼吸不順、頭痛", "其他身體的不適及沮喪與焦慮", "以上皆是"], "ans": "D", "exp": "虛弱倦怠、心悸頭痛、沮喪焦慮皆為慢性疲勞症狀，故選以上皆是。"}, {"cat": "專業", "ch": 4, "n": 21, "q": "急性疲勞中，有種特殊情況稱之為下列哪種疲勞，在操作方面的影響主要有時機掌握混亂及視域過度聚焦？", "opts": ["社會性疲勞", "經濟性疲勞", "技能疲勞", "教育性疲勞"], "ans": "C", "exp": "此為技能疲勞。"}, {"cat": "專業", "ch": 4, "n": 22, "q": "下列哪種狀況是身體組織水分不足的情況？", "opts": ["脫水", "失眠", "低血糖", "缺氧"], "ans": "A", "exp": "水分不足即脫水。"}, {"cat": "專業", "ch": 4, "n": 23, "q": "下列哪種狀況可能會造成水分補充不及導致脫水？", "opts": ["長時間處於高溫、高溼度、高海拔環境", "心理壓力", "飲用過多刺激性飲料", "以上皆是"], "ans": "D", "exp": "高溫高濕高海拔、心理壓力、過量刺激性飲料都可能導致脫水。"}, {"cat": "專業", "ch": 4, "n": 24, "q": "脫水最先出現的症狀是下列哪種狀況，將導致遙控無人機操作人的生理及心智表現下滑？", "opts": ["口乾", "舌燥", "較強的疲勞感", "以上皆是"], "ans": "D", "exp": "口乾、舌燥、疲勞感皆為初期症狀。"}, {"cat": "專業", "ch": 4, "n": 25, "q": "為避免脫水，遙控無人機操作人應隨時掌握己身之生理狀況，並採取下列哪個動作？", "opts": ["隨時閱讀", "適時補充水分", "適時上廁所", "隨時聽音樂"], "ans": "B", "exp": "適時補充水分可避免脫水。"}, {"cat": "專業", "ch": 4, "n": 26, "q": "下列哪種狀況是指身體無法對體溫進行控制？", "opts": ["缺氧", "低血糖", "熱中暑", "失眠"], "ans": "C", "exp": "體溫調節失控為熱中暑。"}, {"cat": "專業", "ch": 4, "n": 27, "q": "熱中暑原因是下列哪種狀況？", "opts": ["身體的熱無法排出", "飲酒過量", "失眠", "低血糖"], "ans": "A", "exp": "體熱無法排出導致熱中暑。"}, {"cat": "專業", "ch": 4, "n": 28, "q": "避免熱中暑的方法是採取下列哪個動作？", "opts": ["勿飲酒過量", "充分的睡眠", "規律攝取足量水份", "按時用餐"], "ans": "C", "exp": "規律攝取足量水分可避免熱中暑。"}, {"cat": "專業", "ch": 4, "n": 29, "q": "若遙控無人機操作人服用下列哪種藥物，可能會產生暈眩或是感知功能不全的情況？", "opts": ["成藥", "抗組織胺", "解除充血劑", "以上皆是"], "ans": "D", "exp": "上述藥物皆可能造成暈眩或感知障礙。"}, {"cat": "專業", "ch": 4, "n": 30, "q": "酒精可能對下列哪種狀況造成影響？", "opts": ["影響操作及判斷、較難掌握周邊環境的變化", "身體協調性變差、視界窄化", "降低邏輯能力及注意力低落", "以上皆是"], "ans": "D", "exp": "酒精影響判斷、協調、視野與注意力，故選以上皆是。"}, {"cat": "專業", "ch": 4, "n": 31, "q": "在下列哪個時機，遙控無人機操作人應對遙控無人機進行起飛前檢查？", "opts": ["每次操作前", "遙控無人機有明顯異狀時", "天氣變壞時", "操作人感覺不對時"], "ans": "A", "exp": "每次操作前都應執行起飛前檢查。"}, {"cat": "專業", "ch": 4, "n": 32, "q": "遙控無人機起飛前檢查中發現任何異常狀況，應採取下列哪個動作？", "opts": ["暫時忽略異常狀況，繼續操作", "應立即修正以確保安全", "記錄異常狀況就好，不必大驚小怪，繼續操作", "任務重要就繼續操作，任務不重要就暫停操作"], "ans": "B", "exp": "起飛前檢查發現異常，應立即修正以確保安全。"}, {"cat": "專業", "ch": 4, "n": 33, "q": "緊急落地可依類型區分為下列哪幾種？", "opts": ["迫降", "預防性緊急著陸", "水上迫降", "以上皆是"], "ans": "D", "exp": "含迫降、預防性緊急著陸與水上迫降。"}, {"cat": "專業", "ch": 4, "n": 34, "q": "當面對緊急狀況時，若平時沒有熟悉緊急應變之處置程序，操作人可能會陷入下列哪種情境中？", "opts": ["遙控無人機即將墜地", "遙控無人機不會出事", "遙控無人機的緊急狀況會自動消失", "遙控無人機會自動處理緊急狀況"], "ans": "A", "exp": "未熟悉緊急處置程序，緊急時恐致無人機墜地。"}, {"cat": "專業", "ch": 4, "n": 35, "q": "當遙控無人機發生異常或緊急事件時，應先穩定操作，掌握無人機位置及高度，再採取下列哪個動作？", "opts": ["通報有關機關", "依檢查表，啟動或關閉相關裝備", "尋找最佳的緊急落地處", "以上皆是"], "ans": "C", "exp": "穩定並掌握位置高度後，應優先尋找最佳緊急落地處。"}, {"cat": "專業", "ch": 4, "n": 36, "q": "飛行決策是基於經驗的累積及判斷集合而成，著重於下列哪種決策方案？", "opts": ["學習決策方案", "評估決策方案", "選擇決策方案", "以上皆是"], "ans": "D", "exp": "含學習、評估與選擇決策方案。"}, {"cat": "專業", "ch": 4, "n": 37, "q": "風險管理的目的是為能夠主動辨識與飛航安全有關的危害因子，並透過下列哪個手段降低到可接受之程度？", "opts": ["迴避", "減少", "隔離", "以上皆是"], "ans": "D", "exp": "以迴避、減少、隔離等手段降低風險。"}, {"cat": "專業", "ch": 4, "n": 38, "q": "飛行決策的過程中應掌握下列哪個基本原則？", "opts": ["不接受非相關的風險、將風險設定在合適的層級", "在獲益超過危害時接受風險", "將風險管理整合在飛行各階段的計劃過程中", "以上皆是"], "ans": "D", "exp": "不接受非相關風險、獲益大於危害才接受、將風險管理融入各階段，故選以上皆是。"}, {"cat": "專業", "ch": 4, "n": 39, "q": "操作人執行遙控無人機操作時，下列哪種心態干擾會降低飛行決策的品質？", "opts": ["反威權、衝動及僥倖", "衝動、僥倖及服從", "英雄主義及積極順應", "以上皆是"], "ans": "A", "exp": "反威權、衝動、僥倖等為危害心態(hazardous attitudes)。"}, {"cat": "專業", "ch": 4, "n": 40, "q": "遙控無人機操作人降低風險的方法，包括下列哪種？", "opts": ["辨識己身風險", "預知己身風險", "覺察己身風險", "以上皆是"], "ans": "D", "exp": "含辨識、預知與覺察風險。"}, {"cat": "專業", "ch": 4, "n": 41, "q": "下列哪個因素與飛航安全密切相關，已成為維修部門及飛航管理部門關切的焦點？", "opts": ["政治因素", "人為因素", "社會因素", "經濟因素"], "ans": "B", "exp": "人為因素為飛安關切焦點。"}, {"cat": "專業", "ch": 4, "n": 42, "q": "自動決策模式基本上是一種反射性的模式，其形成的重要基礎是下列哪種方式？", "opts": ["大量的訓練及經驗", "擴大參與人數", "正確的政治指導", "高深的哲學思想"], "ans": "A", "exp": "自動決策為反射性模式，建立於大量訓練與經驗。"}, {"cat": "專業", "ch": 4, "n": 43, "q": "自動決策模式常用於下列哪種情況？", "opts": ["緊急情況", "無法預作分析的情況", "無法沙盤推演的情況", "以上皆是"], "ans": "D", "exp": "自動決策常用於緊急、無法預先分析或推演的情況，故選以上皆是。"}, {"cat": "專業", "ch": 4, "n": 44, "q": "呼吸頻率過快以致血液裡二氧化碳的濃度過低所導致的結果，稱之為下列哪種狀況？", "opts": ["過度換氣", "壓力", "疲勞", "熱中暑"], "ans": "A", "exp": "呼吸過快使血中二氧化碳過低，稱過度換氣。"}, {"cat": "專業", "ch": 4, "n": 45, "q": "壓力基本上可以分做下列哪兩大類？", "opts": ["急性及慢性", "經濟性及社會性", "個人性及團體性", "有害性及無害性"], "ans": "A", "exp": "壓力可分為急性與慢性兩大類。"}, {"cat": "專業", "ch": 4, "n": 46, "q": "急性的壓力包括下列哪種狀況，可能觸發抵抗或逃避的反應？", "opts": ["可能潛在的威脅", "立即的威脅（如危險、緊急情境）", "想像的威脅", "未來的威脅"], "ans": "B", "exp": "急性壓力包含立即的威脅（危險、緊急情境），可觸發抵抗或逃避反應。"}, {"cat": "專業", "ch": 4, "n": 47, "q": "疲勞是一種身心耗弱狀態，乃是長期處在高度壓力之下的下列哪種反應？", "opts": ["直覺反應", "生理或心理反應", "情緒反應", "鬱悶反應"], "ans": "B", "exp": "疲勞是長期高壓下的生理或心理反應。"}, {"cat": "專業", "ch": 4, "n": 48, "q": "操作人於操作前，可利用下列哪方法的自我檢測方法，來瞭解己身的身心狀態？", "opts": ["IMSAFE", "簡易 ABC", "PAVE", "以上皆是"], "ans": "A", "exp": "操作前可用 IMSAFE 自我檢測身心狀態。"}, {"cat": "專業", "ch": 4, "n": 49, "q": "操作遙控無人機時若發生非預期的緊急情況時，操作人首要的任務為下列哪種作為？", "opts": ["堅持到底、繼續執行任務", "暫停執行任務、適當休息", "應先確保己身及周邊環境及其他人員的安全", "應先確保遙控無人機的安全"], "ans": "C", "exp": "發生緊急情況，首要任務是確保己身、周邊環境及他人的安全。"}, {"cat": "專業", "ch": 4, "n": 50, "q": "若製造商沒有提供起飛前檢查表或操作自製遙控無人機，則遙控無人機操作人應採取下列哪個動作？", "opts": ["省略起飛前檢查", "應自行設計檢查表以確保能夠安全操作", "聯絡製造商提供起飛前檢查表，同時繼續操作", "借用其他型式的遙控無人機起飛前檢查表"], "ans": "B", "exp": "無檢查表或自製無人機時，應自行設計檢查表以確保安全操作。"}, {"cat": "專業", "ch": 4, "n": 51, "q": "遙控無人機操作人在飛航操作環境下，以系統性的評估風險及處理壓力的方法，來達成最適宜的結果，稱之為何種方法？", "opts": ["腦力激盪", "人因工程", "飛行決策", "以上皆是"], "ans": "C", "exp": "系統性評估風險、處理壓力以求最適結果，稱為飛行決策。"}, {"cat": "專業", "ch": 4, "n": 52, "q": "某種狀況、物體或活動，其可能造成人員傷亡、裝備損壞或降低運作效能，稱之為下列哪種狀況？", "opts": ["風險", "危害", "災難", "事故"], "ans": "B", "exp": "可能造成傷亡、損壞或降低效能的狀況、物體或活動，稱為危害。"}, {"cat": "專業", "ch": 4, "n": 53, "q": "危害所可能造成的後果，稱之為下列哪種狀況？", "opts": ["風險", "災難", "意外", "事故"], "a
